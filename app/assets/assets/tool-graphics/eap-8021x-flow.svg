<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- 802.1X authentication flow: Supplicant <-> Authenticator <-> Authentication Server (RADIUS).
       EAP over the first link, RADIUS over the second. Server authenticated by certificate (lime hero).
       Dark-baked palette per §8.20.7 allow-list. markerUnits=userSpaceOnUse on the arrowhead. -->

  <defs>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9C9C9C"/>
    </marker>
  </defs>

  <!-- ============================ HEADER ============================ -->
  <text x="360" y="32" fill="#E5E5E5" font-size="15" font-weight="600" text-anchor="middle">802.1X Port-Based Authentication</text>

  <!-- ============================ NODES (rounded rects, NOT pills) ============================ -->
  <!-- three node boxes 170 wide, 78 tall, centered on y=150. x-centers: 110, 360, 610 -->
  <!-- Supplicant -->
  <rect x="25" y="111" width="170" height="78" rx="6" stroke="#E5E5E5" stroke-width="1.8"/>
  <text x="110" y="146" fill="#E5E5E5" font-size="15" font-weight="600" text-anchor="middle">Supplicant</text>
  <text x="110" y="168" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">client device</text>

  <!-- Authenticator -->
  <rect x="275" y="111" width="170" height="78" rx="6" stroke="#E5E5E5" stroke-width="1.8"/>
  <text x="360" y="146" fill="#E5E5E5" font-size="15" font-weight="600" text-anchor="middle">Authenticator</text>
  <text x="360" y="168" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">AP / switch</text>

  <!-- Authentication Server -->
  <rect x="525" y="111" width="170" height="78" rx="6" stroke="#E5E5E5" stroke-width="1.8"/>
  <text x="610" y="146" fill="#E5E5E5" font-size="15" font-weight="600" text-anchor="middle">Auth Server</text>
  <text x="610" y="168" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">RADIUS</text>

  <!-- ============================ CONNECTOR LAYER ============================ -->
  <!-- Link 1: Supplicant <-> Authenticator, double-headed, gap 195..275 -->
  <line x1="199" y1="150" x2="271" y2="150" stroke="#9C9C9C" stroke-width="1.8"
        marker-start="url(#arrowHead)" marker-end="url(#arrowHead)"/>
  <!-- Link 2: Authenticator <-> Auth Server, double-headed, gap 445..525 -->
  <line x1="449" y1="150" x2="521" y2="150" stroke="#9C9C9C" stroke-width="1.8"
        marker-start="url(#arrowHead)" marker-end="url(#arrowHead)"/>

  <!-- link protocol labels ABOVE each link, clear of nodes and line -->
  <text x="235" y="138" fill="#E5E5E5" font-size="12.5" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">EAP</text>
  <text x="235" y="100" fill="#9C9C9C" font-size="10.5" font-weight="500" text-anchor="middle">EAPOL</text>
  <text x="485" y="138" fill="#E5E5E5" font-size="12.5" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">RADIUS</text>
  <text x="485" y="100" fill="#9C9C9C" font-size="10.5" font-weight="500" text-anchor="middle">EAP-in-RADIUS</text>

  <!-- ============================ CERTIFICATE NOTE (lime hero) ============================ -->
  <!-- small certificate glyph below the server, with lime leader and note. Kept well clear of node box. -->
  <g stroke="#A1CC3A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- cert page -->
    <rect x="592" y="214" width="36" height="30" rx="2"/>
    <line x1="599" y1="223" x2="621" y2="223"/>
    <line x1="599" y1="230" x2="615" y2="230"/>
    <!-- seal ribbon -->
    <circle cx="620" cy="240" r="6"/>
  </g>
  <!-- leader from cert up to server box bottom -->
  <line x1="610" y1="214" x2="610" y2="189" stroke="#A1CC3A" stroke-width="1.4" stroke-dasharray="3 3"/>

  <text x="565" y="228" fill="#A1CC3A" font-size="12.5" font-weight="600" text-anchor="end">Server proves identity</text>
  <text x="565" y="246" fill="#A1CC3A" font-size="12.5" font-weight="600" text-anchor="end">by X.509 certificate</text>

  <!-- ============================ FOOTER ============================ -->
  <text x="290" y="276" fill="#9C9C9C" font-size="11.5" font-weight="500" text-anchor="middle">EAP rides between supplicant and server; the authenticator only relays it.</text>
</svg>
