<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" width="640" height="560" font-family="IBM Plex Sans, sans-serif" fill="none">
  <!-- C5 / C6 cloverleaf ("Mickey Mouse") FEMALE coupler face, drawn LARGE & centered.
       REDRAW 2026-06-08 (v3): prior v2 placed ONE lobe up + two lower lobes too CLOSE
       (centers 268,306 and 372,306, only 104 apart) so the two lower lobes fused into a
       single wide bottom bulge with no bottom-center neck -> read as circle-on-mass = snowman.
       v3 fix: TRUE TREFOIL. Three EQUAL lobes (r=62) at a real 120 deg around a common
       center (320,270), each lobe center 56 from center:
         top lobe         center (320,214)      angle -90  (earth)
         lower-left lobe  center (271.503,298)  angle 150  (line)
         lower-right lobe center (368.497,298)  angle  30  (neutral)
       Adjacent center distance = 97.0 (< 2r=124) so EVERY adjacent pair overlaps and the
       union outline pinches inward at all THREE junctions -> three visible concave necks:
         upper-left neck  (262.300,236.687)
         upper-right neck (377.700,236.687)
         bottom-center neck (320.000,336.626)
       UNION OUTLINE only (single merged silhouette, NO interior Venn arcs). Each lobe arc
       is the MAJOR (outward-bulging) arc: large-arc-flag=1, sweep-flag=1, continuous CW.
       Apex y=152, bottom y=360, left x=209.5, right x=430.5 -> labels placed clear of all.
       Palette: §8.20.7 swap-list only - scaffold #E5E5E5, muted #9C9C9C, ONE lime #A1CC3A
       highlight on the earth (top) lobe arc. Type: DM Mono on face, IBM Plex Sans header.
       STANDING RULE: no label sits over any outline, hole, or other label (coordinate-checked). -->

  <!-- Header -->
  <text x="320" y="48" fill="#E5E5E5" font-size="30" font-weight="600" text-anchor="middle">C5 / C6 Cloverleaf</text>
  <text x="320" y="80" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">Female coupler face (cord end) &#183; IEC 60320</text>

  <!-- ============ FACE: TREFOIL UNION OUTLINE (three distinct equal lobes, three necks) ============ -->
  <g>
    <!-- full union silhouette in scaffold: top arc -> lower-right arc -> lower-left arc, CW -->
    <path d="M 262.300 236.687
             A 62 62 0 1 1 377.700 236.687
             A 62 62 0 1 1 320.000 336.626
             A 62 62 0 1 1 262.300 236.687 Z"
          stroke="#E5E5E5" stroke-width="4" stroke-linejoin="round"/>
    <!-- earth (TOP) lobe highlighted in lime: just the top major arc, neck to neck -->
    <path d="M 262.300 236.687
             A 62 62 0 1 1 377.700 236.687"
          stroke="#A1CC3A" stroke-width="4" stroke-linecap="round"/>
    <!-- recessed female contact holes, one centered in EACH lobe -->
    <circle cx="320.000" cy="214.000" r="16" fill="#9C9C9C"/>   <!-- earth pin (top lobe) -->
    <circle cx="271.503" cy="298.000" r="16" fill="#9C9C9C"/>   <!-- line  (lower-left lobe) -->
    <circle cx="368.497" cy="298.000" r="16" fill="#9C9C9C"/>   <!-- neutral (lower-right lobe) -->
  </g>

  <!-- earth-lobe callout: lime, clear ABOVE the top lobe (apex y=152) -->
  <text x="320" y="132" fill="#A1CC3A" font-size="16" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">earth pin (top lobe)</text>
  <!-- line / neutral callouts, clear to the OUTER sides of the lower lobes (lobes reach x 209.5 / 430.5) -->
  <text x="180" y="304" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="end" font-family="DM Mono, monospace">L</text>
  <text x="460" y="304" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">N</text>

  <!-- ============ LABELS ============ -->
  <text x="320" y="434" fill="#E5E5E5" font-size="34" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">2.5 A</text>
  <text x="320" y="468" fill="#9C9C9C" font-size="18" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">2.5 A &#183; 70 &#176;C &#183; 3-pin (with earth)</text>
  <text x="320" y="498" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">Low-power kit &#183; laptop bricks, consoles</text>
</svg>
