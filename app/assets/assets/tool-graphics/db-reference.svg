<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- dB to ratio: a dB axis with ratio anchors (3 dB = 2x, 10 dB = 10x); lime = the ratio values. Archetype B. -->

  <!-- dB axis -->
  <line x1="40" y1="96" x2="288" y2="96" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <path d="M282 92 l6 4 l-6 4" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- anchor ticks (even spacing on the dB axis) -->
  <g stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round">
    <line x1="60"  y1="90" x2="60"  y2="102"/>
    <line x1="128" y1="90" x2="128" y2="102"/>
    <line x1="196" y1="90" x2="196" y2="102"/>
    <line x1="264" y1="90" x2="264" y2="102"/>
  </g>

  <!-- dB labels (below) -->
  <g fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="60"  y="120">0 dB</text>
    <text x="128" y="120">3 dB</text>
    <text x="196" y="120">6 dB</text>
    <text x="264" y="120">10 dB</text>
  </g>

  <!-- ratio anchors (above, lime = the mapped ratio) -->
  <g fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="60"  y="78">1&#215;</text>
    <text x="128" y="78">2&#215;</text>
    <text x="196" y="78">4&#215;</text>
    <text x="264" y="78">10&#215;</text>
  </g>

  <!-- doubling cues between the 3 dB steps -->
  <g fill="#A2CC3A" font-size="10" font-weight="500" text-anchor="middle" opacity="0.85">
    <text x="94"  y="56">&#215;2</text>
    <text x="162" y="56">&#215;2</text>
  </g>
  <g stroke="#A2CC3A" stroke-width="1" stroke-linecap="round" opacity="0.5" fill="none">
    <path d="M78 62 q16 -8 32 0"/>
    <path d="M146 62 q16 -8 32 0"/>
  </g>

  <!-- Header -->
  <text x="160" y="24" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">3 dB = 2&#215; &#183; 10 dB = 10&#215;</text>
  <!-- Footer -->
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="118.0" y="146.0" text-anchor="start">dB</text>
  <path d="M134.6 142.5 H142.6 M139.1 139.0 L142.6 142.5 L139.1 146.0" fill="none" stroke="#9C9C9C" stroke-width="1.2650000000000001" stroke-linecap="round" stroke-linejoin="round"/>
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="145.6" y="146.0" text-anchor="start">power ratio</text>
</svg>
