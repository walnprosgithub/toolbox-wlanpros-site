<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- EUI-48 MAC bit-field. 48 bits = 6 octets, split OUI (24) vs device/NIC (24).
       Zoom on octet 1's low two bits: bit 0 = I/G, bit 1 = U/L (the lime detail).
       Locally-administered example: low nibble of byte 1 = 2/6/A/E.
       Dark-baked palette per §8.20.7 allow-list. Lime marks ONLY the two special bits. -->

  <!-- ============================ HEADER ============================ -->
  <text x="380" y="30" fill="#E5E5E5" font-size="15" font-weight="600" text-anchor="middle">EUI-48 MAC Address &#8212; 48 bits, 6 octets</text>

  <!-- ============================ OUI / NIC SPAN BRACKETS (above the boxes) ============================ -->
  <!-- OUI bracket over octets 1-3 (x 60..360) -->
  <g stroke="#9C9C9C" stroke-width="1.4" stroke-linecap="round">
    <path d="M60 70 L60 62 L360 62 L360 70"/>
    <path d="M400 70 L400 62 L700 62 L700 70"/>
  </g>
  <text x="210" y="54" fill="#9C9C9C" font-size="12.5" font-weight="600" text-anchor="middle">OUI &#183; first 24 bits</text>
  <text x="550" y="54" fill="#9C9C9C" font-size="12.5" font-weight="600" text-anchor="middle">Device / NIC &#183; last 24 bits</text>

  <!-- ============================ SIX OCTET BOXES ============================ -->
  <!-- each octet box 100 wide, gap 20; row from x=60, y=78..118 -->
  <g stroke="#E5E5E5" stroke-width="1.6">
    <rect x="60"  y="78" width="100" height="40" rx="4"/>
    <rect x="160" y="78" width="100" height="40" rx="4"/>
    <rect x="260" y="78" width="100" height="40" rx="4"/>
    <rect x="400" y="78" width="100" height="40" rx="4"/>
    <rect x="500" y="78" width="100" height="40" rx="4"/>
    <rect x="600" y="78" width="100" height="40" rx="4"/>
  </g>
  <!-- divider between OUI and NIC halves -->
  <line x1="380" y1="74" x2="380" y2="122" stroke="#9C9C9C" stroke-width="1.4" stroke-dasharray="3 4"/>

  <!-- octet hex labels INSIDE the boxes (DM Mono) -->
  <g fill="#E5E5E5" font-size="17" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="110" y="104">0A</text>
    <text x="210" y="104">1B</text>
    <text x="310" y="104">2C</text>
    <text x="450" y="104">3D</text>
    <text x="550" y="104">4E</text>
    <text x="650" y="104">5F</text>
  </g>
  <!-- "8 bits" caption BELOW each box, clear of the boxes -->
  <g fill="#9C9C9C" font-size="10.5" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="110" y="135">octet 1</text>
    <text x="210" y="135">octet 2</text>
    <text x="310" y="135">octet 3</text>
    <text x="450" y="135">octet 4</text>
    <text x="550" y="135">octet 5</text>
    <text x="650" y="135">octet 6</text>
  </g>

  <!-- ============================ ZOOM CONNECTOR from octet 1 down to bit row ============================ -->
  <!-- guide brackets stay inside the octet-1 column (x 60..160) and drop to the bit strip's
       left corner only. The long fanning lines were removed to keep every caption clear; the
       explicit "Zoom: octet 1" label + position carry the relationship. -->
  <g stroke="#9C9C9C" stroke-width="1" stroke-dasharray="3 4" opacity="0.7">
    <path d="M60  118 L60  150 L80  186"/>
    <path d="M160 118 L160 150 L135 186"/>
  </g>
  <!-- Zoom label: rightwards arrow (was &#8594;) is a vector <path>; the line is
       split into two start-anchored runs with the arrow in the fixed center gap. -->
  <text x="258" y="172" fill="#9C9C9C" font-size="11.5" font-weight="600" text-anchor="start">Zoom: octet 1, bit 7 (MSB)</text>
  <path d="M400 168 H413 M409.5 164 L413 168 L409.5 172" fill="none" stroke="#9C9C9C" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="418" y="172" fill="#9C9C9C" font-size="11.5" font-weight="600" text-anchor="start">bit 0 (LSB)</text>

  <!-- ============================ EIGHT BIT-CELLS ============================ -->
  <!-- bit strip x=80..520 (440 wide), 8 cells of 55, y=188..230. Drawn MSB(left, bit7) -> LSB(right, bit0). -->
  <!-- six neutral cells (bits 7..2) -->
  <g stroke="#E5E5E5" stroke-width="1.6">
    <rect x="80"  y="188" width="55" height="42" rx="3"/>
    <rect x="135" y="188" width="55" height="42" rx="3"/>
    <rect x="190" y="188" width="55" height="42" rx="3"/>
    <rect x="245" y="188" width="55" height="42" rx="3"/>
    <rect x="300" y="188" width="55" height="42" rx="3"/>
    <rect x="355" y="188" width="55" height="42" rx="3"/>
  </g>
  <!-- two lime cells: bit 1 = U/L, bit 0 = I/G -->
  <g stroke="#A1CC3A" stroke-width="2">
    <rect x="410" y="188" width="55" height="42" rx="3"/>
    <rect x="465" y="188" width="55" height="42" rx="3"/>
  </g>

  <!-- bit values inside cells (example byte 0A = 0000 1010) -->
  <g font-size="18" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="107.5" y="216" fill="#9C9C9C">0</text>
    <text x="162.5" y="216" fill="#9C9C9C">0</text>
    <text x="217.5" y="216" fill="#9C9C9C">0</text>
    <text x="272.5" y="216" fill="#9C9C9C">0</text>
    <text x="327.5" y="216" fill="#9C9C9C">1</text>
    <text x="382.5" y="216" fill="#9C9C9C">0</text>
    <text x="437.5" y="216" fill="#A1CC3A">1</text>
    <text x="492.5" y="216" fill="#A1CC3A">0</text>
  </g>

  <!-- bit-position numbers BELOW the cells (clear space) -->
  <g fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="107.5" y="248">7</text>
    <text x="162.5" y="248">6</text>
    <text x="217.5" y="248">5</text>
    <text x="272.5" y="248">4</text>
    <text x="327.5" y="248">3</text>
    <text x="382.5" y="248">2</text>
    <text x="437.5" y="248" fill="#A1CC3A" font-weight="600">1</text>
    <text x="492.5" y="248" fill="#A1CC3A" font-weight="600">0</text>
  </g>

  <!-- lime leaders + labels for the two special bits, dropped well below the position numbers -->
  <g stroke="#A1CC3A" stroke-width="1.4" stroke-linecap="round">
    <path d="M437.5 254 L437.5 268 L320 268"/>
    <path d="M492.5 254 L492.5 286 L320 286"/>
  </g>
  <text x="312" y="272" fill="#A1CC3A" font-size="12.5" font-weight="600" text-anchor="end">bit 1 = U/L &#8212; Universal / Local</text>
  <text x="312" y="290" fill="#A1CC3A" font-size="12.5" font-weight="600" text-anchor="end">bit 0 = I/G &#8212; Individual / Group</text>

  <!-- U/L and I/G meaning, to the RIGHT, clear of cells and of each other.
       Each rightwards arrow (was &#8594;) is a vector <path>: the left and right
       text runs are split and left-anchored, the arrow sits in the fixed gap
       (GL-003 8.6.1 - arrows are paths, never <text>). -->
  <g font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, sans-serif" fill="#9C9C9C">
    <text x="540" y="200">U/L = 1</text>
    <text x="600" y="200">locally administered</text>
    <text x="540" y="218">U/L = 0</text>
    <text x="600" y="218">universal (OUI-based)</text>
    <text x="540" y="240">I/G = 0</text>
    <text x="600" y="240">unicast</text>
    <text x="540" y="258">I/G = 1</text>
    <text x="600" y="258">group / multicast</text>
  </g>
  <g stroke="#9C9C9C" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M581 196.5 H594 M590.5 192.5 L594 196.5 L590.5 200.5"/>
    <path d="M581 214.5 H594 M590.5 210.5 L594 214.5 L590.5 218.5"/>
    <path d="M580 236.5 H593 M589.5 232.5 L593 236.5 L589.5 240.5"/>
    <path d="M580 254.5 H593 M589.5 250.5 L593 254.5 L589.5 258.5"/>
  </g>

  <!-- ============================ FOOTER RULE: locally-administered low nibble ============================ -->
  <!-- Footer rules. Each U+21D2 double-arrow (&#8658;) tofu'd hard: no bundled
       font carries it. Replaced with a vector <path> double-arrow; the lines are
       re-flowed as start-anchored runs with the arrow paths in fixed gaps
       (GL-003 8.6.1). Middle dot (&#183;) stays as ASCII-safe typography. -->
  <text x="166" y="332" fill="#E5E5E5" font-size="13" font-weight="600" text-anchor="start">Low nibble of octet 1 = </text>
  <text x="303" y="332" fill="#A1CC3A" font-size="13" font-weight="600" text-anchor="start" font-family="DM Mono, monospace">2 / 6 / A / E</text>
  <path d="M412 329.7 H426 M412 334.3 H426 M421 325.5 L426.5 332 L421 338.5" fill="none" stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="434" y="332" fill="#E5E5E5" font-size="13" font-weight="600" text-anchor="start">locally administered unicast</text>

  <text x="158" y="356" fill="#9C9C9C" font-size="11.5" font-weight="500" text-anchor="start">(odd low nibble</text>
  <path d="M243 353.8 H255 M243 358.2 H255 M250.5 350 L256 356 L250.5 362" fill="none" stroke="#9C9C9C" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="261" y="356" fill="#9C9C9C" font-size="11.5" font-weight="500" text-anchor="start">group address &#183; 0 / 4 / 8 / C</text>
  <path d="M456 353.8 H468 M456 358.2 H468 M463.5 350 L469 356 L463.5 362" fill="none" stroke="#9C9C9C" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="474" y="356" fill="#9C9C9C" font-size="11.5" font-weight="500" text-anchor="start">universally administered unicast)</text>
</svg>
