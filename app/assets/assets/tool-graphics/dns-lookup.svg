<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- DNS lookup: a hostname query resolving to DNS records (A/AAAA/MX/TXT); lime = the resolved records. Archetype G. -->

  <!-- Hostname query field (left) -->
  <rect x="18" y="40" width="92" height="26" rx="4" stroke="#E5E5E5" stroke-width="1.5"/>
  <text x="28" y="57" fill="#A2CC3A" font-size="11" font-weight="500" font-family="DM Mono, monospace">wlanpros.com</text>

  <!-- query arrow into the record card -->
  <g stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="110" y1="53" x2="142" y2="53"/>
    <path d="M136 49 L142 53 L136 57"/>
  </g>

  <!-- returned DNS record card (right) -->
  <rect x="146" y="32" width="156" height="100" rx="4" stroke="#E5E5E5" stroke-width="1.5"/>
  <line x1="146" y1="52" x2="302" y2="52" stroke="#9C9C9C" stroke-width="1.25"/>
  <g font-family="DM Mono, monospace">
    <text x="156" y="47" fill="#9C9C9C" font-size="10" font-weight="500">type</text>
    <text x="210" y="47" fill="#9C9C9C" font-size="10" font-weight="500">answer</text>

    <!-- A record (matched, lime) -->
    <rect x="146" y="56" width="156" height="18" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="156" y="69" fill="#A2CC3A" font-size="11" font-weight="500">A</text>
    <text x="210" y="69" fill="#A2CC3A" font-size="11" font-weight="500">203.0.113.9</text>

    <text x="156" y="89" fill="#E5E5E5" font-size="11" font-weight="500">AAAA</text>
    <text x="210" y="89" fill="#E5E5E5" font-size="11" font-weight="500">2606:::1</text>

    <text x="156" y="107" fill="#E5E5E5" font-size="11" font-weight="500">MX</text>
    <text x="210" y="107" fill="#E5E5E5" font-size="11" font-weight="500">mail</text>

    <text x="156" y="125" fill="#E5E5E5" font-size="11" font-weight="500">TXT</text>
    <text x="210" y="125" fill="#E5E5E5" font-size="11" font-weight="500">v=spf1</text>
  </g>
  <g stroke="#3A3A3A" stroke-width="1">
    <line x1="146" y1="74" x2="302" y2="74"/>
    <line x1="146" y1="92" x2="302" y2="92"/>
    <line x1="146" y1="110" x2="302" y2="110"/>
  </g>

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">DNS lookup</text>
  <!-- Footer -->
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="87.0" y="150.0" text-anchor="start">hostname</text>
  <path d="M139.4 146.5 H147.4 M143.9 143.0 L147.4 146.5 L143.9 150.0" fill="none" stroke="#9C9C9C" stroke-width="1.2650000000000001" stroke-linecap="round" stroke-linejoin="round"/>
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="150.4" y="150.0" text-anchor="start">resolved records</text>
</svg>
