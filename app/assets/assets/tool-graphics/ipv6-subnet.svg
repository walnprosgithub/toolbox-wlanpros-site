<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- IPv6 Subnet: a 128-bit address split prefix | interface-ID by a /64 cut.
       Lime = the prefix (network) portion. Sibling of ipv4-subnet: longer address + /64 cue + subnet expansion.
       Archetype D (partition / block). -->

  <!-- The 128-bit address bar, split prefix | interface-ID -->
  <!-- Prefix portion (lime accent = the network part the /64 fixes) -->
  <rect x="22" y="42" width="146" height="30" rx="2" fill="#A2CC3A" fill-opacity="0.08" stroke="#A2CC3A" stroke-width="2"/>
  <!-- Interface-ID portion (neutral host part) -->
  <rect x="168" y="42" width="130" height="30" rx="2" stroke="#E5E5E5" stroke-width="1.75"/>

  <!-- Hextet tick dividers inside the bar (16-bit groups, kept subtle so the address reads) -->
  <g stroke="#9C9C9C" stroke-width="1" opacity="0.35">
    <line x1="200" y1="44" x2="200" y2="70"/>
    <line x1="233" y1="44" x2="233" y2="70"/>
    <line x1="266" y1="44" x2="266" y2="70"/>
  </g>

  <!-- Address value (DM Mono) overlaid -->
  <text x="95" y="62" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">2001:db8:1:a</text>
  <text x="233" y="62" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">::/64</text>

  <!-- Portion labels -->
  <text x="95" y="34" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">prefix (network)</text>
  <text x="233" y="34" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">interface ID</text>

  <!-- /64 prefix cut line at the boundary -->
  <line x1="168" y1="36" x2="168" y2="80" stroke="#A2CC3A" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="168" y="92" fill="#A2CC3A" font-size="13" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">/64</text>

  <!-- Subnet expansion: the prefix expands into many /64 subnets (distinguishes IPv6 from IPv4) -->
  <line x1="22" y1="104" x2="298" y2="104" stroke="#9C9C9C" stroke-width="1" opacity="0.4"/>
  <text x="22" y="126" fill="#9C9C9C" font-size="11" font-weight="500" font-family="DM Mono, monospace">subnets</text>
  <g font-family="DM Mono, monospace" font-size="11" font-weight="500">
    <rect x="92" y="114" width="58" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.5" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="121" y="126" fill="#A2CC3A" text-anchor="middle">:a::/64</text>
    <rect x="158" y="114" width="58" height="16" rx="2" stroke="#9C9C9C" stroke-width="1.25"/>
    <text x="187" y="126" fill="#9C9C9C" text-anchor="middle">:b::/64</text>
    <rect x="224" y="114" width="58" height="16" rx="2" stroke="#9C9C9C" stroke-width="1.25"/>
    <text x="253" y="126" fill="#9C9C9C" text-anchor="middle">:c::/64</text>
  </g>
  <text x="298" y="148" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="end">2^64 hosts each</text>
</svg>
