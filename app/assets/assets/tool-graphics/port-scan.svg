<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Port scan: probing a host's TCP ports; each slot is open or closed.
       Lime = the open ports found. Archetype G (lookup/record). -->

  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">scan host TCP ports</text>

  <!-- Target host (left) -->
  <rect x="22" y="48" width="54" height="64" rx="4" stroke="#E5E5E5" stroke-width="1.75"/>
  <line x1="35" y1="104" x2="63" y2="104" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>
  <text x="49" y="128" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">host</text>

  <!-- Scan probe line from host toward the port column (neutral, sweeping) -->
  <line x1="76" y1="80" x2="120" y2="80" stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 4"/>
  <path d="M114 76 L120 80 L114 84" stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Column of port slots: open = lime filled, closed = neutral hollow -->
  <g font-family="DM Mono, monospace" font-size="11" font-weight="500">
    <!-- open (lime) -->
    <rect x="128" y="34" width="118" height="18" rx="2" fill="#A2CC3A" fill-opacity="0.12" stroke="#A2CC3A" stroke-width="2"/>
    <text x="136" y="47" fill="#A2CC3A">22  ssh</text>
    <text x="240" y="47" fill="#A2CC3A" text-anchor="end">open</text>

    <rect x="128" y="58" width="118" height="18" rx="2" stroke="#9C9C9C" stroke-width="1.5"/>
    <text x="136" y="71" fill="#9C9C9C">23  telnet</text>
    <text x="240" y="71" fill="#9C9C9C" text-anchor="end">closed</text>

    <rect x="128" y="82" width="118" height="18" rx="2" fill="#A2CC3A" fill-opacity="0.12" stroke="#A2CC3A" stroke-width="2"/>
    <text x="136" y="95" fill="#A2CC3A">443 https</text>
    <text x="240" y="95" fill="#A2CC3A" text-anchor="end">open</text>

    <rect x="128" y="106" width="118" height="18" rx="2" stroke="#9C9C9C" stroke-width="1.5"/>
    <text x="136" y="119" fill="#9C9C9C">3389 rdp</text>
    <text x="240" y="119" fill="#9C9C9C" text-anchor="end">closed</text>
  </g>

  <!-- Legend -->
  <g font-size="11" font-weight="500">
    <rect x="128" y="134" width="10" height="10" rx="2" fill="#A2CC3A" fill-opacity="0.12" stroke="#A2CC3A" stroke-width="2"/>
    <text x="144" y="143" fill="#A2CC3A">open</text>
    <rect x="196" y="134" width="10" height="10" rx="2" stroke="#9C9C9C" stroke-width="1.5"/>
    <text x="212" y="143" fill="#9C9C9C">closed</text>
  </g>
</svg>
