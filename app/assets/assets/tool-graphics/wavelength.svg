<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Wavelength = c/f: one sine cycle with the lambda span dimensioned. Lime = the wavelength. -->

  <!-- Center axis (zero crossing baseline) -->
  <line x1="30" y1="74" x2="290" y2="74" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="4 4"/>

  <!-- Two full sine cycles (neutral wave), peak-to-peak around y=74, amplitude 34 -->
  <path d="M30 74
           C 62 16, 94 16, 126 74
           C 158 132, 190 132, 222 74
           C 246 30, 270 30, 290 60"
        stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- One marked wavelength span (lime): crest-to-crest of the first cycle -->
  <!-- crest1 ~ x=78, crest2 (next full cycle crest) ~ x=174 (bottom trough at 174 is a trough; use crest at start to start of next rise) -->
  <!-- Use zero-crossing x=30 to next matching zero-crossing x=222 = one full cycle (rise-fall) -->
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round">
    <line x1="30" y1="36" x2="30" y2="118"/>
    <line x1="222" y1="36" x2="222" y2="118"/>
  </g>
  <!-- lambda dimension line between the two markers -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round">
    <line x1="30" y1="118" x2="222" y2="118"/>
    <path d="M38 114 L30 118 L38 122 M214 114 L222 118 L214 122"/>
  </g>
  <!-- lambda symbol as a vector <path> (was &#955; in DM Mono <text>, which lacks
       lambda entirely so it tofu'd; GL-003 8.6.1: symbols = paths, never <text>). -->
  <path d="M126.9 124.5 L122.0 136.0 M125.0 128.7 L130.1 136.0" fill="none"
        stroke="#A2CC3A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Formula header: lambda is a <path>, the ASCII "= c / f" stays <text> at a
       fixed left anchor so no monospace alignment is lost (GL-003 8.6.1). -->
  <path d="M134.9 9.0 L130.0 20.5 M133.0 13.2 L138.1 20.5" fill="none"
        stroke="#E5E5E5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="142" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace"> = c / f</text>

  <!-- Frequency label: arrow and trailing lambda are <path>s; the ASCII text is
       split into two left-anchored runs so the arrow + lambda sit in fixed gaps. -->
  <text x="74" y="154" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="start">higher freq f</text>
  <!-- rightwards arrow (was &#8594;) -->
  <path d="M150 150.5 H165 M161 146.5 L165 150.5 L161 154.5" fill="none"
        stroke="#9C9C9C" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="170" y="154" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="start">shorter</text>
  <!-- trailing lambda (was &#955;) -->
  <path d="M222.6 145.0 L218.5 154.0 M221.0 148.3 L225.0 154.0" fill="none"
        stroke="#9C9C9C" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
