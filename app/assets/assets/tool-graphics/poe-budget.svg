<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- PoE budget: a switch with a total power budget bar; powered devices draw watts from it.
       Lime = the remaining headroom left in the budget. -->

  <!-- Switch chassis (neutral) -->
  <rect x="26" y="34" width="120" height="40" rx="3" stroke="#E5E5E5" stroke-width="1.75"/>
  <text x="86" y="28" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">PoE switch</text>
  <!-- Switch front ports -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <rect x="36" y="58" width="10" height="8" rx="1"/>
    <rect x="52" y="58" width="10" height="8" rx="1"/>
    <rect x="68" y="58" width="10" height="8" rx="1"/>
    <rect x="84" y="58" width="10" height="8" rx="1"/>
    <rect x="100" y="58" width="10" height="8" rx="1"/>
    <rect x="116" y="58" width="10" height="8" rx="1"/>
  </g>

  <!-- Budget bar outline (total power available) -->
  <rect x="26" y="92" width="268" height="22" rx="2" stroke="#E5E5E5" stroke-width="1.75"/>
  <text x="26" y="86" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="start">total budget</text>

  <!-- Consumed segments (powered devices drawing watts, neutral fill divisions) -->
  <g stroke="#9C9C9C" stroke-width="1.25">
    <line x1="84" y1="92" x2="84" y2="114"/>
    <line x1="134" y1="92" x2="134" y2="114"/>
    <line x1="178" y1="92" x2="178" y2="114"/>
  </g>
  <!-- Remaining headroom (lime) = the measured quantity -->
  <rect x="178" y="92" width="116" height="22" rx="0" fill="#A2CC3A" opacity="0.18"/>
  <line x1="178" y1="92" x2="178" y2="114" stroke="#A2CC3A" stroke-width="2"/>
  <text x="236" y="107" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">headroom W</text>

  <!-- Powered devices drawing from the switch (neutral) -->
  <g stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- device 1 -->
    <rect x="186" y="42" width="20" height="20" rx="2"/>
    <line x1="56" y1="62" x2="186" y2="52"/>
    <!-- device 2 -->
    <rect x="226" y="42" width="20" height="20" rx="2"/>
    <line x1="74" y1="62" x2="226" y2="52"/>
    <!-- device 3 -->
    <rect x="266" y="42" width="20" height="20" rx="2"/>
    <line x1="92" y1="62" x2="266" y2="52"/>
  </g>

  <!-- Header -->
  <text x="160" y="138" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">headroom = budget &#8722; sum of draws</text>
  <text x="160" y="154" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">draw W &#8804; budget W</text>
</svg>
