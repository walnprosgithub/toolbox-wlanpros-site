<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" fill="none">

  <!-- ===== Column headers ===== -->
  <text x="40" y="44" font-family="DM Mono, monospace" font-size="15" font-weight="500" fill="#9C9C9C" letter-spacing="1.5">YOU TYPE</text>
  <text x="372" y="44" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="#9C9C9C" letter-spacing="1.5">RENDERS AS</text>

  <!-- ===== LEFT: literal markdown source (DM Mono, bright) ===== -->
  <text x="40" y="92" font-family="DM Mono, monospace" font-size="16" fill="#E5E5E5"># Heading</text>
  <text x="40" y="138" font-family="DM Mono, monospace" font-size="16" fill="#E5E5E5">**bold**</text>
  <text x="40" y="184" font-family="DM Mono, monospace" font-size="16" fill="#E5E5E5">- list item</text>
  <text x="40" y="230" font-family="DM Mono, monospace" font-size="16" fill="#E5E5E5">[link](url)</text>
  <text x="40" y="276" font-family="DM Mono, monospace" font-size="16" fill="#E5E5E5">`code`</text>

  <!-- ===== CENTER: lime arrow ===== -->
  <line x1="278" y1="178" x2="342" y2="178" stroke="#A2CC3A" stroke-width="3" stroke-linecap="round"/>
  <path d="M334 170 L346 178 L334 186" fill="none" stroke="#A2CC3A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== RIGHT: rendered output ===== -->

  <!-- heading: large bold -->
  <text x="372" y="96" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="700" fill="#E5E5E5">Heading</text>

  <!-- bold text -->
  <text x="372" y="140" font-family="IBM Plex Sans, sans-serif" font-size="17" font-weight="700" fill="#E5E5E5">bold</text>

  <!-- bullet list item -->
  <circle cx="377" cy="180" r="3.5" fill="#E5E5E5"/>
  <text x="390" y="186" font-family="IBM Plex Sans, sans-serif" font-size="17" font-weight="400" fill="#E5E5E5">list item</text>

  <!-- link: lime, underlined -->
  <text x="372" y="232" font-family="IBM Plex Sans, sans-serif" font-size="17" font-weight="500" fill="#A2CC3A">link</text>
  <line x1="372" y1="240" x2="406" y2="240" stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- code chip -->
  <rect x="372" y="262" width="62" height="26" rx="5" ry="5" fill="none" stroke="#9C9C9C" stroke-width="1.5"/>
  <text x="385" y="280" font-family="DM Mono, monospace" font-size="15" font-weight="500" fill="#E5E5E5">code</text>

  <!-- ===== divider between columns ===== -->
  <line x1="310" y1="68" x2="310" y2="300" stroke="#9C9C9C" stroke-width="1" stroke-dasharray="3 5" opacity="0.5"/>

</svg>
