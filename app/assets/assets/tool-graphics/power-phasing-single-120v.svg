<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- 120V Single Phase: one sine wave between +120 / 0 / -120 VAC. Original WLAN Pros schematic. -->

  <!-- zero axis (0 VAC) -->
  <line x1="34" y1="84" x2="300" y2="84" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="2 4"/>
  <!-- vertical voltage axis -->
  <line x1="44" y1="42" x2="44" y2="126" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>

  <!-- the sine wave (one hot leg) -->
  <path d="M 50.0 84.0 L 52.08 79.61 L 54.17 75.27 L 56.25 71.02 L 58.33 66.92 L 60.42 63.0 L 62.5 59.31 L 64.58 55.9 L 66.67 52.79 L 68.75 50.02 L 70.83 47.63 L 72.92 45.63 L 75.0 44.06 L 77.08 42.92 L 79.17 42.23 L 81.25 42.0 L 83.33 42.23 L 85.42 42.92 L 87.5 44.06 L 89.58 45.63 L 91.67 47.63 L 93.75 50.02 L 95.83 52.79 L 97.92 55.9 L 100.0 59.31 L 102.08 63.0 L 104.17 66.92 L 106.25 71.02 L 108.33 75.27 L 110.42 79.61 L 112.5 84.0 L 114.58 88.39 L 116.67 92.73 L 118.75 96.98 L 120.83 101.08 L 122.92 105.0 L 125.0 108.69 L 127.08 112.1 L 129.17 115.21 L 131.25 117.98 L 133.33 120.37 L 135.42 122.37 L 137.5 123.94 L 139.58 125.08 L 141.67 125.77 L 143.75 126.0 L 145.83 125.77 L 147.92 125.08 L 150.0 123.94 L 152.08 122.37 L 154.17 120.37 L 156.25 117.98 L 158.33 115.21 L 160.42 112.1 L 162.5 108.69 L 164.58 105.0 L 166.67 101.08 L 168.75 96.98 L 170.83 92.73 L 172.92 88.39 L 175.0 84.0 L 177.08 79.61 L 179.17 75.27 L 181.25 71.02 L 183.33 66.92 L 185.42 63.0 L 187.5 59.31 L 189.58 55.9 L 191.67 52.79 L 193.75 50.02 L 195.83 47.63 L 197.92 45.63 L 200.0 44.06 L 202.08 42.92 L 204.17 42.23 L 206.25 42.0 L 208.33 42.23 L 210.42 42.92 L 212.5 44.06 L 214.58 45.63 L 216.67 47.63 L 218.75 50.02 L 220.83 52.79 L 222.92 55.9 L 225.0 59.31 L 227.08 63.0 L 229.17 66.92 L 231.25 71.02 L 233.33 75.27 L 235.42 79.61 L 237.5 84.0 L 239.58 88.39 L 241.67 92.73 L 243.75 96.98 L 245.83 101.08 L 247.92 105.0 L 250.0 108.69 L 252.08 112.1 L 254.17 115.21 L 256.25 117.98 L 258.33 120.37 L 260.42 122.37 L 262.5 123.94 L 264.58 125.08 L 266.67 125.77 L 268.75 126.0 L 270.83 125.77 L 272.92 125.08 L 275.0 123.94 L 277.08 122.37 L 279.17 120.37 L 281.25 117.98 L 283.33 115.21 L 285.42 112.1 L 287.5 108.69 L 289.58 105.0 L 291.67 101.08 L 293.75 96.98 L 295.83 92.73 L 297.92 88.39 L 300.0 84.0" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- peak / zero / trough tick + labels (DM Mono numerics) -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="40" y1="42" x2="48" y2="42"/>
    <line x1="40" y1="84" x2="48" y2="84"/>
    <line x1="40" y1="126" x2="48" y2="126"/>
  </g>
  <g fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="end" font-family="DM Mono, monospace">
    <text x="36" y="46">+120</text>
    <text x="36" y="88">0</text>
    <text x="36" y="130">-120</text>
  </g>
  <text x="20" y="88" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" transform="rotate(-90 20 84)">VAC</text>

  <!-- amplitude callout: peak-to-neutral = 120V (the measured quantity, lime) -->
  <g stroke="#A1CC3A" stroke-width="1.5" stroke-linecap="round">
    <line x1="81" y1="44" x2="81" y2="82"/>
    <path d="M78 48 L81 44 L84 48"/>
    <path d="M78 78 L81 82 L84 78"/>
  </g>
  <!-- label moved into the open band above the first trough (clear of the descending sine, which at this height sits near x=98) -->
  <text x="120" y="56" fill="#A1CC3A" font-size="11" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">120V peak</text>

  <!-- Header -->
  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">120V Single Phase</text>
  <!-- Footer: one hot + neutral -->
  <text x="172" y="150" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">one hot leg + neutral &#183; nominal 120 VAC</text>
</svg>
