<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Noise floor: a flat thermal noise-floor baseline with a signal peak above it.
       Lime = the SNR gap (signal above the floor). -->

  <!-- Power axis (dBm), vertical (neutral) -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="34" y1="26" x2="34" y2="120"/>
    <path d="M30 32 L34 26 L38 32"/>
  </g>
  <text x="22" y="30" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" transform="rotate(-90 22 30)">dBm</text>

  <!-- Baseline (axis floor for the band) -->
  <line x1="34" y1="120" x2="298" y2="120" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>

  <!-- Noise floor level (flat baseline, neutral, with grass-like thermal jitter) -->
  <path d="M40 100 L52 97 L60 102 L72 98 L84 101 L96 97 L108 100 L120 98 L132 101 L144 98 L156 100 L168 97 L180 101 L192 98 L204 100 L216 98 L228 101 L240 98 L252 100 L264 98 L276 101 L290 99"
        stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="290" y="113" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="end">noise floor</text>

  <!-- Signal peak rising above the floor (neutral envelope) -->
  <path d="M120 99 C140 99 150 44 168 44 C186 44 196 99 216 99"
        stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="168" y="38" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">signal</text>

  <!-- SNR gap (lime) = the measured quantity: floor level up to signal peak -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round">
    <line x1="168" y1="99" x2="168" y2="46"/>
    <path d="M164 52 L168 46 L172 52 M164 93 L168 99 L172 93"/>
  </g>
  <!-- reference dashed level lines for the gap -->
  <g stroke="#A2CC3A" stroke-width="1" stroke-dasharray="3 3" opacity="0.7">
    <line x1="118" y1="99" x2="178" y2="99"/>
    <line x1="150" y1="46" x2="186" y2="46"/>
  </g>
  <text x="180" y="76" fill="#A2CC3A" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">SNR</text>

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">SNR = signal &#8722; noise floor</text>
  <!-- Footer -->
  <text x="160" y="138" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">thermal noise sets the floor</text>
</svg>
