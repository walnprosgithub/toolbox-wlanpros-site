<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Fiber optic: a strand cross-section (core/cladding/coating) + light propagating by total
       internal reflection. Single-mode (straight ray) vs multimode (bouncing modes).
       Lime = the light path (the signal the fiber carries). -->

  <!-- ===== Strand cross-section (left) ===== -->
  <circle cx="56" cy="58" r="34" stroke="#E5E5E5" stroke-width="1.75"/>   <!-- coating/buffer -->
  <circle cx="56" cy="58" r="22" stroke="#9C9C9C" stroke-width="1.5"/>    <!-- cladding -->
  <circle cx="56" cy="58" r="9"  stroke="#A2CC3A" stroke-width="1.75" fill="rgba(162,204,58,0.08)"/> <!-- core (lime, carries light) -->

  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round">
    <line x1="56" y1="58" x2="104" y2="34"/>
    <line x1="74" y1="46" x2="104" y2="54"/>
    <line x1="84" y1="40" x2="104" y2="74"/>
  </g>
  <g font-size="11" font-weight="500">
    <text x="107" y="38" fill="#A2CC3A">core</text>
    <text x="107" y="58" fill="#9C9C9C">cladding</text>
    <text x="107" y="78" fill="#9C9C9C">coating</text>
  </g>

  <!-- ===== Light propagation (right) : two stacked guides ===== -->
  <!-- Single-mode: thin core, one near-axial ray -->
  <g stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round">
    <line x1="180" y1="48" x2="300" y2="48"/>
    <line x1="180" y1="62" x2="300" y2="62"/>
  </g>
  <line x1="182" y1="55" x2="298" y2="55" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round"/>
  <circle cx="298" cy="55" r="2.5" fill="#A2CC3A"/>
  <text x="174" y="42" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="end">single-mode</text>

  <!-- Multimode: wider core, a ray bouncing (total internal reflection) -->
  <g stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round">
    <line x1="180" y1="92" x2="300" y2="92"/>
    <line x1="180" y1="118" x2="300" y2="118"/>
  </g>
  <path d="M182 105 L210 94 L238 116 L266 94 L294 116 L298 113"
        stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="298" cy="113" r="2.5" fill="#A2CC3A"/>
  <text x="174" y="100" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="end">multi-</text>
  <text x="174" y="113" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="end">mode</text>

  <!-- grade strip (DM Mono): OS for single-mode, OM for multimode -->
  <text x="160" y="138" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">OS1/2 &#183; OM1-OM5</text>

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">light guided by total internal reflection</text>
  <!-- Footer -->
  <text x="160" y="152" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">single-mode = longest reach &#183; multimode = short runs</text>
</svg>
