<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- 802.11 frame exchange: client <-> AP association / 4-way handshake sequence; lime = the message arrows. Archetype C. -->

  <!-- Client (left) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="22" y="40" width="22" height="34" rx="2"/>
    <line x1="29" y1="78" x2="37" y2="78"/>
  </g>
  <text x="33" y="92" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">client</text>
  <!-- client lifeline -->
  <line x1="33" y1="96" x2="33" y2="148" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="4 4"/>

  <!-- AP (right) - access point, never "router" -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="276" y="46" width="22" height="22" rx="2"/>
    <path d="M283 42 a6 6 0 0 1 8 0 M280 38 a11 11 0 0 1 14 0"/>
  </g>
  <text x="287" y="92" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">AP</text>
  <!-- AP lifeline -->
  <line x1="287" y1="96" x2="287" y2="148" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="4 4"/>

  <!-- Frame sequence: numbered arrows between the two lifelines (lime = the exchange) -->
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. Auth req -> -->
    <line x1="33" y1="104" x2="287" y2="104"/>
    <path d="M281 100 L287 104 L281 108"/>
    <!-- 2. Assoc resp <- -->
    <line x1="287" y1="118" x2="33" y2="118"/>
    <path d="M39 114 L33 118 L39 122"/>
    <!-- 3. EAPOL key -> -->
    <line x1="33" y1="132" x2="287" y2="132"/>
    <path d="M281 128 L287 132 L281 136"/>
  </g>
  <!-- step numbers + labels (DM Mono numerics) -->
  <g font-family="DM Mono, monospace">
    <text x="160" y="101" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle">1 &#183; Auth / Assoc req</text>
    <text x="160" y="115" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle">2 &#183; Assoc resp</text>
    <text x="160" y="129" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle">3 &#183; 4-way handshake</text>
  </g>

  <!-- Header -->
  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">802.11 association frame exchange</text>
</svg>
