<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- ARP / NDP: discovering neighbors on the local LAN and mapping each IP to its MAC.
       Lime = the resolved MAC addresses (the answer the query produces). Archetype G (lookup/record). -->

  <text fill="#E5E5E5" font-size="13" font-weight="500" x="71.9" y="22.0" text-anchor="start">neighbor discovery (IP</text>
  <path d="M205.8 17.8 H213.8 M210.3 14.3 L213.8 17.8 L210.3 21.3" fill="none" stroke="#E5E5E5" stroke-width="1.495" stroke-linecap="round" stroke-linejoin="round"/>
  <text fill="#E5E5E5" font-size="13" font-weight="500" x="216.8" y="22.0" text-anchor="start">MAC)</text>

  <!-- This device (left) -->
  <rect x="22" y="58" width="48" height="44" rx="4" stroke="#E5E5E5" stroke-width="1.75"/>
  <line x1="34" y1="94" x2="58" y2="94" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>
  <text x="46" y="118" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">this device</text>

  <!-- "who has?" query out (neutral) toward the LAN / table -->
  <line x1="70" y1="80" x2="112" y2="80" stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 4"/>
  <path d="M106 76 L112 80 L106 84" stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="91" y="68" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">who has?</text>

  <!-- Neighbor table: IP column (neutral) -> MAC column (lime resolved answer) -->
  <rect x="116" y="40" width="182" height="92" rx="4" stroke="#E5E5E5" stroke-width="1.75"/>
  <line x1="116" y1="58" x2="298" y2="58" stroke="#9C9C9C" stroke-width="1" opacity="0.5"/>
  <line x1="208" y1="40" x2="208" y2="132" stroke="#9C9C9C" stroke-width="1" opacity="0.4"/>
  <text x="124" y="53" fill="#9C9C9C" font-size="11" font-weight="500">IP</text>
  <text x="216" y="53" fill="#A2CC3A" font-size="11" font-weight="500">MAC</text>

  <g font-family="DM Mono, monospace" font-size="11" font-weight="500">
    <text x="124" y="76" fill="#E5E5E5">.1</text>
    <text x="290" y="76" fill="#A2CC3A" text-anchor="end">e0:cb:4e:..</text>
    <text x="124" y="96" fill="#E5E5E5">.42</text>
    <text x="290" y="96" fill="#A2CC3A" text-anchor="end">a4:83:e7:..</text>
    <text x="124" y="116" fill="#E5E5E5">.77</text>
    <text x="290" y="116" fill="#A2CC3A" text-anchor="end">3c:22:fb:..</text>
  </g>

  <text x="160" y="150" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">ARP (IPv4) / NDP (IPv6) on the LAN</text>
</svg>
