<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" width="640" height="560" font-family="IBM Plex Sans, sans-serif" fill="none">
  <!-- NEMA 6-20R receptacle FACE, drawn LARGE & centered. Geometry reused from the
       Vera-passed composite (6-20 tile), scaled ~2.4x. 6-series = two hots, NO neutral
       + U-ground. The 20A mark = one HORIZONTAL hot + one VERTICAL hot (perpendicular).
       250V / 20A / 1-phase. The perpendicular hot blade -> ONE lime.
       Palette: §8.20.7 swap-list only — scaffold #E5E5E5, muted #9C9C9C, ONE lime #A1CC3A.
       STANDING RULE: no label over any slot, ground, or other label. -->

  <!-- Header -->
  <text x="320" y="44" fill="#E5E5E5" font-size="30" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">6-20</text>
  <text x="320" y="76" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">240V 20A outlet &#183; the two hots sit perpendicular</text>

  <!-- ============ FACE: round bezel, centered (320,250), r=110 ============ -->
  <circle cx="320" cy="250" r="110" stroke="#E5E5E5" stroke-width="5"/>
  <!-- HORIZONTAL hot (left) -->
  <rect x="260" y="243" width="48" height="15" rx="5" stroke="#E5E5E5" stroke-width="5"/>
  <!-- VERTICAL hot (right) — the 20A mark, LIME -->
  <rect x="351" y="219" width="15" height="48" rx="5" stroke="#A1CC3A" stroke-width="5"/>
  <!-- U-ground below center -->
  <path d="M 303 309 L 303 290 A 17 17 0 0 1 337 290 L 337 309"
        stroke="#E5E5E5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- pin callouts, outside the face / clear of slots / ground / ring -->
  <text x="172" y="254" fill="#9C9C9C" font-size="15" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">hot</text>
  <text x="472" y="234" fill="#A1CC3A" font-size="15" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">hot</text>
  <text x="320" y="392" fill="#9C9C9C" font-size="15" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">ground</text>

  <!-- ============ LABELS ============ -->
  <text x="320" y="448" fill="#E5E5E5" font-size="34" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">250 V &#183; 20 A</text>
  <text x="320" y="482" fill="#9C9C9C" font-size="18" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">single-phase &#183; 2-pole, 3-wire</text>
  <text x="320" y="514" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">240V 20A tools and equipment &#183; both slots hot</text>
</svg>
