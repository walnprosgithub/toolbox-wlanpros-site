<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Ethernet pinout. Redrawn to §8.6.2.1 Rule 4.1: a REAL 8P8C modular jack
       (RJ-45), drawn schematically but correctly — rectangular housing with the
       keyed latch-tab cutout at the bottom, 8 gold contacts seated in their
       channels, pins numbered 1..8. Below it, ENLARGED T568A / T568B wire-color
       strips so the canonical pair colors are clearly readable. Wire colors are
       domain-canonical DATA glyphs (the color IS the information, §8.20.7 pass-through).
       Lime marks only the pairs that differ between A and B. -->

  <!-- Header -->
  <text x="160" y="16" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">8P8C (RJ-45) &#183; 8 contacts, 4 pairs</text>

  <!-- ============================================================= -->
  <!-- 8P8C MODULAR JACK — front view, real geometry -->
  <!-- Housing = rectangle; the LATCH TAB is the keyed notch hanging  -->
  <!-- below the body (the part that clicks into the port).           -->
  <!-- ============================================================= -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <!-- main housing -->
    <rect x="106" y="26" width="108" height="40" rx="2"/>
    <!-- the spring latch tab: a small keyed nub centered on the bottom edge -->
    <path d="M146 66 L146 74 Q146 78 150 78 L170 78 Q174 78 174 74 L174 66"/>
    <!-- the 8 contact channels (vertical slots the gold pins sit in) -->
    <path d="M118 26 L118 50 M130 26 L130 50 M142 26 L142 50 M154 26 L154 50 M166 26 L166 50 M178 26 L178 50 M190 26 L190 50 M202 26 L202 50"/>
  </g>

  <!-- 8 gold contacts seated at the top of each channel (data glyph: pin metal) -->
  <g fill="#C9A227">
    <rect x="115" y="28" width="6" height="16" rx="1"/>
    <rect x="127" y="28" width="6" height="16" rx="1"/>
    <rect x="139" y="28" width="6" height="16" rx="1"/>
    <rect x="151" y="28" width="6" height="16" rx="1"/>
    <rect x="163" y="28" width="6" height="16" rx="1"/>
    <rect x="175" y="28" width="6" height="16" rx="1"/>
    <rect x="187" y="28" width="6" height="16" rx="1"/>
    <rect x="199" y="28" width="6" height="16" rx="1"/>
  </g>
  <!-- pin numbers 1..8 -->
  <g fill="#9C9C9C" font-size="8" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="118" y="62">1</text><text x="130" y="62">2</text><text x="142" y="62">3</text><text x="154" y="62">4</text>
    <text x="166" y="62">5</text><text x="178" y="62">6</text><text x="190" y="62">7</text><text x="202" y="62">8</text>
  </g>
  <!-- latch-tab callout -->
  <text x="160" y="90" fill="#9C9C9C" font-size="9" text-anchor="middle">latch tab</text>

  <!-- ============================================================= -->
  <!-- T568B color strip (enlarged so colors are clearly readable) -->
  <!-- 1 wht/org 2 org 3 wht/grn 4 blu 5 wht/blu 6 grn 7 wht/brn 8 brn -->
  <!-- ============================================================= -->
  <text x="14" y="112" fill="#A2CC3A" font-size="11" font-weight="500" font-family="DM Mono, monospace">T568B</text>
  <g stroke="#9C9C9C" stroke-width="1">
    <rect x="74"  y="102" width="16" height="14" fill="#F58A1F"/>
    <rect x="92"  y="102" width="16" height="14" fill="#F58A1F"/>
    <rect x="110" y="102" width="16" height="14" fill="#3CA03C"/>
    <rect x="128" y="102" width="16" height="14" fill="#2D6CDF"/>
    <rect x="146" y="102" width="16" height="14" fill="#2D6CDF"/>
    <rect x="164" y="102" width="16" height="14" fill="#3CA03C"/>
    <rect x="182" y="102" width="16" height="14" fill="#7A4A22"/>
    <rect x="200" y="102" width="16" height="14" fill="#7A4A22"/>
  </g>
  <!-- white stripe over the odd (white/) pins -->
  <g fill="#E5E5E5">
    <rect x="74"  y="102" width="16" height="5"/>
    <rect x="110" y="102" width="16" height="5"/>
    <rect x="146" y="102" width="16" height="5"/>
    <rect x="182" y="102" width="16" height="5"/>
  </g>

  <!-- ============================================================= -->
  <!-- T568A color strip (pairs 2 & 3 swapped) -->
  <!-- 1 wht/grn 2 grn 3 wht/org 4 blu 5 wht/blu 6 org 7 wht/brn 8 brn -->
  <!-- ============================================================= -->
  <text x="14" y="136" fill="#9C9C9C" font-size="11" font-weight="500" font-family="DM Mono, monospace">T568A</text>
  <g stroke="#9C9C9C" stroke-width="1">
    <rect x="74"  y="126" width="16" height="14" fill="#3CA03C"/>
    <rect x="92"  y="126" width="16" height="14" fill="#3CA03C"/>
    <rect x="110" y="126" width="16" height="14" fill="#F58A1F"/>
    <rect x="128" y="126" width="16" height="14" fill="#2D6CDF"/>
    <rect x="146" y="126" width="16" height="14" fill="#2D6CDF"/>
    <rect x="164" y="126" width="16" height="14" fill="#F58A1F"/>
    <rect x="182" y="126" width="16" height="14" fill="#7A4A22"/>
    <rect x="200" y="126" width="16" height="14" fill="#7A4A22"/>
  </g>
  <g fill="#E5E5E5">
    <rect x="74"  y="126" width="16" height="5"/>
    <rect x="110" y="126" width="16" height="5"/>
    <rect x="146" y="126" width="16" height="5"/>
    <rect x="182" y="126" width="16" height="5"/>
  </g>

  <!-- pin numbers under the strips -->
  <g fill="#9C9C9C" font-size="8" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="82" y="151">1</text><text x="100" y="151">2</text><text x="118" y="151">3</text><text x="136" y="151">4</text>
    <text x="154" y="151">5</text><text x="172" y="151">6</text><text x="190" y="151">7</text><text x="208" y="151">8</text>
  </g>

  <!-- swap callout: pairs 2 & 3 differ between A and B (lime = the differing pairs) -->
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round">
    <path d="M100 117 L118 125 M118 117 L100 125"/>
  </g>
  <text x="266" y="114" fill="#A2CC3A" font-size="10" font-weight="500" text-anchor="middle">pairs 2 &amp; 3</text>
  <!-- left-right arrow (was &#8596;) as a vector <path>; GL-003 8.6.1. -->
  <text x="241" y="128" fill="#A2CC3A" font-size="10" font-weight="500" text-anchor="start">swap A</text>
  <path d="M274.5 124.8 H282.5 M277 122.3 L274.5 124.8 L277 127.3 M280 122.3 L282.5 124.8 L280 127.3" fill="none" stroke="#A2CC3A" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="284.5" y="128" fill="#A2CC3A" font-size="10" font-weight="500" text-anchor="start">B</text>
</svg>
