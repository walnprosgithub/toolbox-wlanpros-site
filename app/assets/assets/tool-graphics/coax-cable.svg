<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Coax construction: concentric cross-section (left) + cutaway run (right).
       Lime = the impedance / velocity-factor spec, the quantity the tool reports. -->

  <!-- ===== Concentric cross-section (left) ===== -->
  <!-- jacket (outer) -->
  <circle cx="78" cy="84" r="46" stroke="#E5E5E5" stroke-width="1.75"/>
  <!-- shield (braid) ring -->
  <circle cx="78" cy="84" r="36" stroke="#9C9C9C" stroke-width="1.5"/>
  <!-- braid hatch suggestion on the shield ring -->
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round">
    <path d="M78 48 L78 56 M101 56 L96 62 M114 84 L106 84 M101 112 L96 106 M78 120 L78 112 M55 112 L60 106 M42 84 L50 84 M55 56 L60 62"/>
  </g>
  <!-- dielectric -->
  <circle cx="78" cy="84" r="24" stroke="#E5E5E5" stroke-width="1.5"/>
  <!-- center conductor (the core) -->
  <circle cx="78" cy="84" r="8" fill="#C9A227"/>

  <!-- Leader lines + labels for each layer -->
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round">
    <line x1="78" y1="84" x2="150" y2="40"/>   <!-- center conductor -->
    <line x1="92" y1="68" x2="150" y2="62"/>   <!-- dielectric -->
    <line x1="104" y1="60" x2="150" y2="84"/>  <!-- shield -->
    <line x1="110" y1="50" x2="150" y2="106"/> <!-- jacket -->
  </g>
  <g fill="#9C9C9C" font-size="11" font-weight="500">
    <text x="153" y="44">center conductor</text>
    <text x="153" y="66">dielectric</text>
    <text x="153" y="88">braid shield</text>
    <text x="153" y="110">outer jacket</text>
  </g>
  <!-- mark the core dot small lime so the "what" is anchored -->
  <circle cx="78" cy="84" r="2.5" fill="#1A1A1A"/>

  <!-- ===== Spec callout (lime = the measured spec) ===== -->
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round">
    <line x1="44" y1="84" x2="34" y2="84"/>
    <line x1="112" y1="84" x2="122" y2="84"/>
  </g>
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">coax construction</text>
  <!-- Ohm signs (was &#937; in DM Mono, which carries no Greek -> tofu) drawn as
       vector <path>s; the ASCII text is split into start-anchored monospace runs
       with each omega in its fixed gap (GL-003 8.6.1). -->
  <text x="104.8" y="138" fill="#A2CC3A" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">Z0 = 50</text>
  <text x="167.8" y="138" fill="#A2CC3A" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace"> / 75</text>
  <g fill="none" stroke="#A2CC3A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M160.3 135.1 A4.0 4.0 0 1 1 166.9 135.1 M160.3 135.1 L159.0 138.0 M166.9 135.1 L168.2 138.0"/>
    <path d="M207.7 135.1 A4.0 4.0 0 1 1 214.3 135.1 M207.7 135.1 L206.4 138.0 M214.3 135.1 L215.6 138.0"/>
  </g>
  <text x="160" y="152" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">impedance set by core/dielectric ratio &#183; VF</text>
</svg>
