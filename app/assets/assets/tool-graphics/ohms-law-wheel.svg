<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 520" width="480" height="520" font-family="IBM Plex Sans, sans-serif" fill="none">
  <!-- Ohm's Law / Power Wheel. §8.6.2.1 standard: literal, labeled, two-value model
       (neutral scaffold #E5E5E5 + muted #9C9C9C) plus ONE lime highlight (#A1CC3A) on the
       two anchor identities. DM Mono for every formula/numeric, IBM Plex Sans for words.
       Four quadrants around a center hub: V (top), I (right), R (bottom), P (left). Each
       quadrant lists the three forms that derive its quantity from the other two.
       Center=(220,250). Formula blocks sit in guaranteed-clear sectors, all upright,
       generously spaced — no formula sits over a ring line, spoke, or another label. -->

  <!-- ===================== RINGS ===================== -->
  <!-- outer band ring (cell boundary) -->
  <circle cx="220" cy="250" r="208" stroke="#9C9C9C" stroke-width="1.25"/>
  <!-- mid ring: divides hub from formula band.
       r tightened 120 -> 73 (Vera re-gate 2026-06-08): at r=120 the ring's left/right
       extent (x=100 / x=340) ran through the side-block glyphs. The side "derive ..."
       labels reach inward to ~65px from center, so the ring must sit well inside them.
       Paired with the side blocks pushed outboard (I-block +16, P-block -16): nearest
       side glyph is now 81px from center, so r=73 clears every glyph by ~8px (>>1 stroke). -->
  <circle cx="220" cy="250" r="73" stroke="#9C9C9C" stroke-width="1.25"/>
  <!-- inner hub ring -->
  <circle cx="220" cy="250" r="58" stroke="#E5E5E5" stroke-width="2"/>

  <!-- ===================== QUADRANT SPOKES ===================== -->
  <!-- the X cross splits the hub into four quadrants. Spokes run only from the hub
       edge to the mid ring (r=58 -> r=120) at 45/135/225/315 deg — deliberately NOT
       extended into the outer formula band, so no spoke can cross a formula or a
       quadrant heading. Quadrant grouping in the band is carried by the two ring
       circles and the block layout instead. Endpoints updated to terminate at the
       tightened mid ring (r=58 -> r=73) instead of the old r=120. -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="261.01" y1="208.99" x2="271.62" y2="198.38"/>
    <line x1="261.01" y1="291.01" x2="271.62" y2="301.62"/>
    <line x1="178.99" y1="291.01" x2="168.38" y2="301.62"/>
    <line x1="178.99" y1="208.99" x2="168.38" y2="198.38"/>
  </g>

  <!-- ===================== HUB: four quantities ===================== -->
  <!-- divider cross inside the hub only -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="178.99" y1="208.99" x2="261.01" y2="291.01"/>
    <line x1="261.01" y1="208.99" x2="178.99" y2="291.01"/>
  </g>

  <!-- V (top) -->
  <text x="220" y="214" fill="#A1CC3A" font-size="20" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">V</text>
  <text x="220" y="227" fill="#9C9C9C" font-size="9"  font-weight="500" text-anchor="middle">volts</text>
  <!-- I (right) -->
  <text x="250" y="250" fill="#A1CC3A" font-size="20" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">I</text>
  <text x="250" y="263" fill="#9C9C9C" font-size="9"  font-weight="500" text-anchor="middle">amps</text>
  <!-- R (bottom) -->
  <text x="220" y="276" fill="#A1CC3A" font-size="20" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">R</text>
  <text x="220" y="289" fill="#9C9C9C" font-size="9"  font-weight="500" text-anchor="middle">ohms</text>
  <!-- P (left) -->
  <text x="190" y="250" fill="#A1CC3A" font-size="20" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">P</text>
  <text x="190" y="263" fill="#9C9C9C" font-size="9"  font-weight="500" text-anchor="middle">watts</text>

  <!-- ===================== FORMULA BLOCKS ===================== -->
  <!-- each quadrant's three forms, upright, in the clear sector between mid and outer ring.
       Quadrant heading (the quantity) sits at the band's inner edge; the 3 forms stack below. -->

  <!-- TOP quadrant = V (sector spans ~315..45 deg, clear vertical band above center).
       Block centered on x=220, nudged down +12 (Vera re-gate 2026-06-08) so the wide
       "derive volts" label clears the outer ring (r=208) by ~7px instead of grazing it. -->
  <text x="220" y="90"  fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">V = I &#183; R</text>
  <text x="220" y="112" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">V = P / I</text>
  <text x="220" y="68"  fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">derive volts from any two</text>
  <text x="220" y="134" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">V = &#8730;(P &#183; R)</text>

  <!-- RIGHT quadrant = I (clear horizontal band right of center).
       Block centered on x=356 (pushed +16 outboard for mid-ring clearance), rows stacked vertically. -->
  <text x="356" y="222" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">derive amps from any two</text>
  <text x="356" y="244" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">I = V / R</text>
  <text x="356" y="266" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">I = P / V</text>
  <text x="356" y="288" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">I = &#8730;(P / R)</text>

  <!-- BOTTOM quadrant = R (clear vertical band below center).
       Block centered on x=220, nudged up -10 (Vera re-gate 2026-06-08) so the outermost
       "R = P / I²" row clears the outer ring (r=208) by ~11px instead of grazing it. -->
  <text x="220" y="372" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">derive ohms from any two</text>
  <text x="220" y="394" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">R = V / I</text>
  <text x="220" y="416" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">R = V&#178; / P</text>
  <text x="220" y="438" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">R = P / I&#178;</text>

  <!-- LEFT quadrant = P (clear horizontal band left of center).
       Block centered on x=84 (pushed -16 outboard for mid-ring clearance), rows stacked vertically.
       P = V · I neutralized to scaffold #E5E5E5 (Vera re-gate 2026-06-08): lime now marks ONLY
       the four hub quantities (V/I/R/P), the single conceptual anchor. No derivation is lime. -->
  <text x="84" y="222" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">derive watts from any two</text>
  <text x="84" y="244" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">P = V &#183; I</text>
  <text x="84" y="266" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">P = I&#178; &#183; R</text>
  <text x="84" y="288" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">P = V&#178; / R</text>

  <!-- ===================== HEADER ===================== -->
  <text x="220" y="26" fill="#E5E5E5" font-size="16" font-weight="600" text-anchor="middle">Ohm's Law &amp; Power Wheel</text>

  <!-- ===================== FOOTER: power-factor caveat (research-brief warning) ===================== -->
  <text x="220" y="486" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">P = V &#183; I gives watts only when PF = 1</text>
  <text x="220" y="504" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">true for DC and resistive loads &#183; in AC, V &#215; I = volt-amps (VA)</text>
</svg>
