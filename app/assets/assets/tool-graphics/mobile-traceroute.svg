<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Mobile traceroute: the same hop path as traceroute, drawn as a TTL staircase.
       Each probe walks one TTL further (1 -> 2 -> 3) until it reaches the destination.
       Lime = the incrementing TTL (what distinguishes this from desktop traceroute). Archetype C. -->

  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">TTL walk to destination</text>

  <!-- Start device (top-left) -->
  <rect x="20" y="40" width="22" height="22" rx="3" stroke="#E5E5E5" stroke-width="1.75"/>
  <text x="31" y="76" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">device</text>

  <!-- Staircase risers + treads (neutral path) descending left-to-right -->
  <g stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="42,51 90,51 90,79 158,79 158,107 226,107 226,118 286,118"/>
  </g>

  <!-- Hop nodes at each step (neutral) with TTL value (lime = the increment) -->
  <g>
    <circle cx="90"  cy="51"  r="8" fill="#A2CC3A" fill-opacity="0.12" stroke="#A2CC3A" stroke-width="2"/>
    <circle cx="158" cy="79"  r="8" fill="#A2CC3A" fill-opacity="0.12" stroke="#A2CC3A" stroke-width="2"/>
    <circle cx="226" cy="107" r="8" fill="#A2CC3A" fill-opacity="0.12" stroke="#A2CC3A" stroke-width="2"/>
  </g>

  <!-- TTL labels above each step (lime) -->
  <g font-family="DM Mono, monospace" font-size="11" font-weight="600" fill="#A2CC3A" text-anchor="middle">
    <text x="90"  y="40">TTL 1</text>
    <text x="158" y="68">TTL 2</text>
    <text x="226" y="96">TTL 3</text>
  </g>

  <!-- Destination (bottom-right) -->
  <rect x="286" y="107" width="22" height="22" rx="3" stroke="#E5E5E5" stroke-width="1.75"/>
  <text x="297" y="143" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">dest</text>

  <!-- increment cue -->
  <text x="60" y="138" fill="#A2CC3A" font-size="11" font-weight="500" font-family="DM Mono, monospace">TTL += 1 per probe</text>
</svg>
