<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Roaming: a client moving between two AP cells, handoff at the RSSI threshold.
       APs drawn as real APs (rounded-rect body + two dipoles). RF radiates OUTWARD
       (downward) from each AP. Lime = the roam trigger / handoff. 802.11r/k/v. -->

  <!-- Header -->
  <text x="160" y="18" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">802.11r / k / v handoff</text>

  <!-- Ceiling line -->
  <line x1="14" y1="34" x2="306" y2="34" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round" opacity="0.7"/>

  <!-- AP 1 (left): rounded-rect body + two dipoles on top -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="58" y1="34" x2="58" y2="42"/>
    <circle cx="58" cy="32" r="1.6" fill="#E5E5E5"/>
    <line x1="82" y1="34" x2="82" y2="42"/>
    <circle cx="82" cy="32" r="1.6" fill="#E5E5E5"/>
    <rect x="48" y="42" width="44" height="14" rx="4"/>
  </g>
  <text x="70" y="28" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">AP 1</text>
  <!-- AP1 RF radiating OUTWARD / downward (concentric arcs opening away from the AP) -->
  <g stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M52 62 A18 16 0 0 0 88 62" opacity="0.85"/>
    <path d="M44 70 A28 26 0 0 0 96 70" opacity="0.55"/>
  </g>

  <!-- AP 2 (right) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="238" y1="34" x2="238" y2="42"/>
    <circle cx="238" cy="32" r="1.6" fill="#E5E5E5"/>
    <line x1="262" y1="34" x2="262" y2="42"/>
    <circle cx="262" cy="32" r="1.6" fill="#E5E5E5"/>
    <rect x="228" y="42" width="44" height="14" rx="4"/>
  </g>
  <text x="250" y="28" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">AP 2</text>
  <!-- AP2 RF radiating OUTWARD / downward -->
  <g stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M232 62 A18 16 0 0 0 268 62" opacity="0.85"/>
    <path d="M224 70 A28 26 0 0 0 276 70" opacity="0.55"/>
  </g>

  <!-- Two coverage ellipses on the floor, overlapping in the middle -->
  <ellipse cx="92" cy="116" rx="80" ry="20" stroke="#9C9C9C" stroke-width="1.25"/>
  <ellipse cx="228" cy="116" rx="80" ry="20" stroke="#9C9C9C" stroke-width="1.25"/>

  <!-- Overlap zone: the handoff threshold (lime dashed marker) -->
  <line x1="160" y1="94" x2="160" y2="136" stroke="#A2CC3A" stroke-width="1.5" stroke-dasharray="4 4" stroke-linecap="round"/>

  <!-- Client roaming path: from AP1 cell into the overlap (lime = the roam trigger) -->
  <path d="M92 116 C124 116 136 116 160 116" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M155 111 L162 116 L155 121" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="92" cy="116" r="3" fill="#9C9C9C"/>
  <circle cx="160" cy="116" r="3.5" fill="#A2CC3A"/>

  <!-- RSSI threshold label at the overlap -->
  <text x="160" y="152" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">roam @ RSSI threshold</text>
</svg>
