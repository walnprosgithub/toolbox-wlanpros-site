<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- BGP / ASN lookup (type G): interconnected AS clouds with the queried AS highlighted,
       returning a record card (AS number, holder, prefix, peers). Lime = the queried ASN + record. -->

  <!-- Header -->
  <text fill="#E5E5E5" font-size="13" font-weight="500" x="92.7" y="20.0" text-anchor="start">IP</text>
  <path d="M108.8 15.8 H116.8 M113.3 12.3 L116.8 15.8 L113.3 19.3" fill="none" stroke="#E5E5E5" stroke-width="1.495" stroke-linecap="round" stroke-linejoin="round"/>
  <text fill="#E5E5E5" font-size="13" font-weight="500" x="119.8" y="20.0" text-anchor="start">AS number lookup</text>

  <!-- Peer AS clouds (neutral scaffold) -->
  <g stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 56 q-7 0 -7 -8 q0 -8 8 -8 q1 -8 10 -8 q7 0 9 6 q8 -1 8 7 q0 7 -8 7 z"/>
    <path d="M30 116 q-7 0 -7 -8 q0 -8 8 -8 q1 -8 10 -8 q7 0 9 6 q8 -1 8 7 q0 7 -8 7 z"/>
  </g>
  <g fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="38" y="52">AS174</text>
    <text x="38" y="112">AS3356</text>
  </g>

  <!-- Queried AS cloud (lime = the one being looked up) -->
  <path d="M76 86 q-8 0 -8 -9 q0 -9 9 -9 q1 -9 12 -9 q8 0 10 7 q9 -1 9 8 q0 8 -9 8 z"
        stroke="#A2CC3A" stroke-width="2" fill="#A2CC3A" fill-opacity="0.08" stroke-linejoin="round"/>
  <text x="90" y="82" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">AS15169</text>

  <!-- Peering links between AS clouds (lime, the BGP adjacencies) -->
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round" opacity="0.85">
    <line x1="48" y1="48" x2="74" y2="72"/>
    <line x1="48" y1="108" x2="74" y2="84"/>
  </g>

  <!-- Returned record card (lime border = the record) -->
  <rect x="148" y="40" width="150" height="86" rx="3" fill="#A2CC3A" fill-opacity="0.08" stroke="#A2CC3A" stroke-width="2"/>
  <line x1="148" y1="60" x2="298" y2="60" stroke="#A2CC3A" stroke-width="1" opacity="0.5"/>
  <text x="158" y="55" fill="#A2CC3A" font-size="12" font-weight="500" font-family="DM Mono, monospace">AS15169</text>

  <!-- record rows -->
  <g font-family="DM Mono, monospace" font-size="11" font-weight="500">
    <text x="158" y="76" fill="#9C9C9C">holder</text>
    <text x="290" y="76" fill="#E5E5E5" text-anchor="end">GOOGLE</text>
    <text x="158" y="93" fill="#9C9C9C">prefix</text>
    <text x="290" y="93" fill="#E5E5E5" text-anchor="end">8.8.8.0/24</text>
    <text x="158" y="110" fill="#9C9C9C">peers</text>
    <text x="290" y="110" fill="#E5E5E5" text-anchor="end">142</text>
  </g>

  <!-- query arrow from AS topology into the record card -->
  <g stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="112" y1="84" x2="142" y2="84"/>
    <path d="M136 80 L142 84 L136 88"/>
  </g>

  <!-- Footer -->
  <text x="160" y="146" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">autonomous system + peering</text>
</svg>
