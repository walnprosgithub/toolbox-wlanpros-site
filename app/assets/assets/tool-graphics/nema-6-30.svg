<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" width="640" height="560" font-family="IBM Plex Sans, sans-serif" fill="none">
  <!-- NEMA 6-30R receptacle FACE, drawn LARGE & centered. Style matched to the
       Vera-passed straight-blade tiles (6-15 / 6-50): viewBox 640x560, round bezel
       at (320,250) r=110, DM Mono identifiers, IBM Plex Sans words.
       CORRECTION (Pax 2026-06-08): the prior draft ANGLED the blades — WRONG.
       6-30 is a scaled-up STRAIGHT-blade face. Two flat HORIZONTAL, parallel,
       COLLINEAR hot blades (both hot, 250V, no neutral) + a single D-shaped /
       rounded ground centered on the vertical centerline ABOVE the blade pair.
       250V / 30A / 1-phase / 2-pole, 3-wire grounded.
       The "two hots, no neutral" mark -> ONE lime on the second hot.
       Palette: §8.20.7 swap-list only — scaffold #E5E5E5, muted #9C9C9C, ONE lime #A1CC3A.
       STANDING RULE: no label over any slot, ground, or other label. -->

  <!-- Header -->
  <text x="320" y="44" fill="#E5E5E5" font-size="30" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">6-30</text>
  <text x="320" y="76" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">240V appliance / tool outlet &#183; two hots, no neutral</text>

  <!-- ============ FACE: round bezel, centered (320,250), r=110 ============ -->
  <circle cx="320" cy="250" r="110" stroke="#E5E5E5" stroke-width="5"/>

  <!-- two HOT blades, both HORIZONTAL, parallel and COLLINEAR (same horizontal axis y=270),
       side-by-side. NOT angled. -->
  <rect x="238" y="261" width="53" height="17" rx="5" stroke="#E5E5E5" stroke-width="5"/>
  <rect x="349" y="261" width="53" height="17" rx="5" stroke="#A1CC3A" stroke-width="5"/>

  <!-- D-shaped / rounded ground, centered on the vertical centerline, ABOVE the blade pair -->
  <path d="M 303 212 L 303 200 A 17 17 0 0 1 337 200 L 337 212 Z"
        stroke="#E5E5E5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- pin callouts, outside the face / clear of blades / ground / ring -->
  <text x="170" y="274" fill="#9C9C9C" font-size="15" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">hot</text>
  <text x="470" y="274" fill="#A1CC3A" font-size="15" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">hot</text>
  <text x="320" y="160" fill="#9C9C9C" font-size="15" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">ground</text>

  <!-- ============ LABELS ============ -->
  <text x="320" y="448" fill="#E5E5E5" font-size="34" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">250 V &#183; 30 A</text>
  <text x="320" y="482" fill="#9C9C9C" font-size="18" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">single-phase &#183; 2-pole, 3-wire grounded</text>
  <text x="320" y="514" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">240V appliances and power tools</text>
</svg>
