<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Midpoint (type A spatial): two endpoint pins joined by a great-circle line,
       with the midpoint marked at the halfway point. Lime = the midpoint. -->

  <!-- Header -->
  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">great-circle midpoint</text>

  <!-- Curved graticule grid, neutral scaffold -->
  <g stroke="#9C9C9C" stroke-width="1" fill="none" opacity="0.55">
    <path d="M30 72 Q160 56 290 72"/>
    <path d="M30 100 Q160 84 290 100"/>
    <path d="M30 128 Q160 112 290 128"/>
    <path d="M85 46 Q75 90 85 138"/>
    <path d="M160 42 Q150 90 160 140"/>
    <path d="M235 46 Q225 90 235 138"/>
  </g>

  <!-- Endpoint A pin (left) -->
  <g>
    <path d="M58 104 C58 94 72 94 72 104 C72 112 65 120 65 120 C65 120 58 112 58 104 Z"
          stroke="#E5E5E5" stroke-width="1.75" fill="none" stroke-linejoin="round"/>
    <circle cx="65" cy="104" r="3" fill="#E5E5E5"/>
  </g>
  <text x="65" y="136" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">A</text>

  <!-- Endpoint B pin (right) -->
  <g>
    <path d="M248 88 C248 78 262 78 262 88 C262 96 255 104 255 104 C255 104 248 96 248 88 Z"
          stroke="#E5E5E5" stroke-width="1.75" fill="none" stroke-linejoin="round"/>
    <circle cx="255" cy="88" r="3" fill="#E5E5E5"/>
  </g>
  <text x="255" y="120" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">B</text>

  <!-- Great-circle line A -> B (neutral path) -->
  <path d="M68 102 Q162 70 252 86" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Half-span dimension ticks under the path, showing equal halves -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="68" y1="132" x2="160" y2="124"/>
    <line x1="160" y1="124" x2="252" y2="118"/>
    <path d="M74 130 L68 132 L73 136 M154 122 L160 124 L155 128"/>
    <path d="M166 122 L160 124 L165 128 M246 116 L252 118 L247 122"/>
  </g>
  <text x="112" y="150" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">d/2</text>
  <text x="206" y="146" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">d/2</text>

  <!-- The midpoint, marked on the line (lime) -->
  <line x1="160" y1="78" x2="160" y2="124" stroke="#A2CC3A" stroke-width="1.25" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.7"/>
  <circle cx="160" cy="78" r="5" fill="#A2CC3A"/>
  <circle cx="160" cy="78" r="10" stroke="#A2CC3A" stroke-width="1.5" opacity="0.5"/>
  <text x="160" y="62" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">midpoint</text>
</svg>
