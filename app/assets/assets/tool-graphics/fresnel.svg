<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Fresnel zone: two antennas, elliptical zone between them, radius r at midpoint, ground clearance, 60% rule -->

  <!-- Line-of-sight axis -->
  <line x1="44" y1="64" x2="276" y2="64" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="4 4"/>

  <!-- Fresnel ellipse (lime accent = the cleared zone, the measured region) with low-opacity wash -->
  <ellipse cx="160" cy="64" rx="116" ry="36" fill="#A2CC3A" fill-opacity="0.08" stroke="#A2CC3A" stroke-width="2"/>

  <!-- 60% clearance inner reference (dashed lime, thinner) -->
  <ellipse cx="160" cy="64" rx="116" ry="22" stroke="#A2CC3A" stroke-width="1.25" stroke-dasharray="3 4" fill="none" opacity="0.7"/>

  <!-- Radius r at midpoint -->
  <line x1="160" y1="64" x2="160" y2="100" stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round"/>
  <text x="168" y="86" fill="#A2CC3A" font-size="13" font-weight="500">r</text>

  <!-- Tx antenna (left) — schematic aerial symbol (mast + base + 3 splayed rays) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="44" y1="64" x2="44" y2="130"/>
    <line x1="38" y1="130" x2="50" y2="130"/>
    <path d="M44 64 L36 56 M44 64 V52 M44 64 L52 56"/>
  </g>
  <!-- Rx antenna (right) — schematic aerial symbol -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="276" y1="64" x2="276" y2="130"/>
    <line x1="270" y1="130" x2="282" y2="130"/>
    <path d="M276 64 L268 56 M276 64 V52 M276 64 L284 56"/>
  </g>

  <!-- Ground line -->
  <line x1="16" y1="130" x2="304" y2="130" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>

  <!-- Ground clearance gap cue: between ellipse bottom (y=100) and ground (y=130), drawn left of the zone -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="100" y1="100" x2="100" y2="130"/>
    <path d="M97 104 L100 100 L103 104 M97 126 L100 130 L103 126"/>
  </g>
  <text x="108" y="119" fill="#9C9C9C" font-size="11" font-weight="500">clearance</text>

  <!-- Labels -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">Fresnel zone</text>
  <text x="160" y="152" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">keep &#8805; 60% clear</text>
</svg>
