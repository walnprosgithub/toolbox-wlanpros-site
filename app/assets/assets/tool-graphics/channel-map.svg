<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Channel bonding map: 20/40/80/160 MHz blocks nested across channels; lime = a bonded channel. Archetype D. -->

  <!-- baseline of 20 MHz channels -->
  <g stroke="#E5E5E5" stroke-width="1.5">
    <rect x="22" y="98" width="62" height="18" rx="2"/>
    <rect x="86" y="98" width="62" height="18" rx="2"/>
    <rect x="150" y="98" width="62" height="18" rx="2"/>
    <rect x="214" y="98" width="62" height="18" rx="2"/>
  </g>
  <g fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="53"  y="111">36</text>
    <text x="117" y="111">40</text>
    <text x="181" y="111">44</text>
    <text x="245" y="111">48</text>
  </g>

  <!-- 40 MHz blocks (one bond pair lime = the bonded channel) -->
  <rect x="22"  y="74" width="126" height="18" rx="2" fill="#A2CC3A" fill-opacity="0.08" stroke="#A2CC3A" stroke-width="1.5"/>
  <rect x="150" y="74" width="126" height="18" rx="2" stroke="#E5E5E5" stroke-width="1.5"/>
  <text x="85"  y="87" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle">40 MHz</text>
  <text x="213" y="87" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">40</text>

  <!-- 80 MHz block -->
  <rect x="22" y="50" width="254" height="18" rx="2" stroke="#E5E5E5" stroke-width="1.5"/>
  <text x="149" y="63" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">80 MHz</text>

  <!-- 160 MHz span indicator -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="22" y1="128" x2="276" y2="128"/>
    <path d="M28 125 L22 128 L28 131 M270 125 L276 128 L270 131"/>
  </g>
  <text x="149" y="142" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">160 MHz</text>

  <!-- Header -->
  <text x="160" y="24" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">channel bonding: 20 / 40 / 80 / 160</text>
  <!-- right-edge channel-grows cue -->
  <text x="296" y="40" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="end">bonded</text>
</svg>
