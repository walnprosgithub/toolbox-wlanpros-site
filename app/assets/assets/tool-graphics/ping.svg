<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Ping: an echo to a host and the round-trip back. Request out (neutral), reply in (lime).
       Lime = the round-trip and its measured RTT. Archetype C (path / sequence). -->

  <!-- This device (left) -->
  <rect x="22" y="56" width="54" height="48" rx="4" stroke="#E5E5E5" stroke-width="1.75"/>
  <line x1="35" y1="96" x2="63" y2="96" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>
  <text x="49" y="124" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">this device</text>

  <!-- Host (right) -->
  <rect x="244" y="56" width="54" height="48" rx="4" stroke="#E5E5E5" stroke-width="1.75"/>
  <line x1="257" y1="96" x2="285" y2="96" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>
  <text x="271" y="124" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">host</text>

  <!-- Request out (neutral, upper arc) -->
  <path d="M78 66 Q160 38 242 66" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M236 60 L242 66 L233 70" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="160" y="40" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">echo request</text>

  <!-- Reply back (lime, lower arc = the measured round-trip) -->
  <path d="M242 94 Q160 122 78 94" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M84 88 L78 94 L87 98" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="160" y="120" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">echo reply</text>

  <!-- RTT readout (lime, the one measured quantity) -->
  <text x="160" y="152" fill="#A2CC3A" font-size="13" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">RTT = 24 ms</text>
</svg>
