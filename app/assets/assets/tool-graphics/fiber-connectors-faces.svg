<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" width="920" height="440" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Connector face silhouettes: LC / SC / ST / FC / MPO-MTP. Form-factor recognition.
       Ferrule size is the lime teaching element (1.25mm LC vs 2.5mm SC/ST/FC; rectangular MPO).
       Dark-baked palette per §8.20.7. Bright #E5E5E5 for all meaningful text. -->

  <!-- HEADER -->
  <text x="460" y="34" fill="#E5E5E5" font-size="18" font-weight="700" text-anchor="middle">Fiber connector faces &#8212; form factor &amp; ferrule</text>
  <text x="460" y="56" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">Lime = ferrule (the polished tip the fiber ends in). LC&#8217;s 1.25&#8201;mm ferrule is why it packs denser.</text>

  <!-- ===================== LC ===================== -->
  <!-- duplex: two stacked square housings, small 1.25mm ferrules -->
  <g transform="translate(40,110)">
    <!-- two simplex bodies forming a duplex clip -->
    <g stroke="#E5E5E5" stroke-width="2" stroke-linejoin="round">
      <rect x="6"  y="6"  width="52" height="46" rx="4"/>
      <rect x="6"  y="60" width="52" height="46" rx="4"/>
    </g>
    <!-- latch clips on top of each -->
    <g stroke="#E5E5E5" stroke-width="2" stroke-linecap="round">
      <path d="M20 6 L20 0 L44 0 L44 6"/>
      <path d="M20 60 L20 54 L44 54 L44 48"/>
    </g>
    <!-- small 1.25mm ferrules (lime) -->
    <g fill="#A2CC3A" stroke="none">
      <circle cx="32" cy="29" r="6.5"/>
      <circle cx="32" cy="83" r="6.5"/>
    </g>
    <text x="32" y="132" fill="#E5E5E5" font-size="16" font-weight="700" text-anchor="middle">LC</text>
    <text x="32" y="152" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">1.25&#8201;mm</text>
    <text x="32" y="170" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">simplex / duplex</text>
    <text x="32" y="188" fill="#A2CC3A" font-size="11" font-weight="600" text-anchor="middle">dominant today</text>
  </g>

  <!-- ===================== SC ===================== -->
  <!-- square push-pull body, 2.5mm ferrule -->
  <g transform="translate(225,110)">
    <g stroke="#E5E5E5" stroke-width="2" stroke-linejoin="round">
      <rect x="2" y="8" width="64" height="64" rx="5"/>
      <!-- inner keyed channel -->
      <rect x="14" y="20" width="40" height="40" rx="3" stroke-width="1.4" stroke="#9C9C9C"/>
    </g>
    <!-- 2.5mm ferrule (lime), visibly bigger than LC -->
    <circle cx="34" cy="40" r="12" fill="#A2CC3A" stroke="none"/>
    <text x="34" y="132" fill="#E5E5E5" font-size="16" font-weight="700" text-anchor="middle">SC</text>
    <text x="34" y="152" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">2.5&#8201;mm</text>
    <text x="34" y="170" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">simplex / duplex</text>
    <text x="34" y="188" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">push-pull snap</text>
  </g>

  <!-- ===================== ST ===================== -->
  <!-- round bayonet body, 2.5mm ferrule, twist key -->
  <g transform="translate(410,110)">
    <circle cx="36" cy="40" r="34" stroke="#E5E5E5" stroke-width="2"/>
    <!-- bayonet key tab on the rim -->
    <path d="M36 6 L30 -2 L42 -2 Z" fill="#E5E5E5" stroke="none"/>
    <!-- 2.5mm ferrule -->
    <circle cx="36" cy="40" r="12" fill="#A2CC3A" stroke="none"/>
    <text x="36" y="132" fill="#E5E5E5" font-size="16" font-weight="700" text-anchor="middle">ST</text>
    <text x="36" y="152" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">2.5&#8201;mm</text>
    <text x="36" y="170" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">simplex only</text>
    <text x="36" y="188" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">bayonet twist-lock</text>
  </g>

  <!-- ===================== FC ===================== -->
  <!-- round threaded body, 2.5mm ferrule, screw nut hint -->
  <g transform="translate(595,110)">
    <circle cx="36" cy="40" r="34" stroke="#E5E5E5" stroke-width="2"/>
    <!-- threaded nut: short ticks around rim -->
    <g stroke="#9C9C9C" stroke-width="1.6" stroke-linecap="round">
      <line x1="36" y1="6"  x2="36" y2="13"/>
      <line x1="60" y1="16" x2="55" y2="21"/>
      <line x1="70" y1="40" x2="63" y2="40"/>
      <line x1="60" y1="64" x2="55" y2="59"/>
      <line x1="36" y1="74" x2="36" y2="67"/>
      <line x1="12" y1="64" x2="17" y2="59"/>
      <line x1="2"  y1="40" x2="9"  y2="40"/>
      <line x1="12" y1="16" x2="17" y2="21"/>
    </g>
    <!-- 2.5mm ferrule -->
    <circle cx="36" cy="40" r="12" fill="#A2CC3A" stroke="none"/>
    <text x="36" y="132" fill="#E5E5E5" font-size="16" font-weight="700" text-anchor="middle">FC</text>
    <text x="36" y="152" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">2.5&#8201;mm</text>
    <text x="36" y="170" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">simplex only</text>
    <text x="36" y="188" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">threaded screw</text>
  </g>

  <!-- ===================== MPO / MTP ===================== -->
  <!-- rectangular multi-fiber body, row of small ferrule cores, keyed -->
  <g transform="translate(770,110)">
    <g stroke="#E5E5E5" stroke-width="2" stroke-linejoin="round">
      <rect x="0" y="20" width="100" height="40" rx="4"/>
    </g>
    <!-- key on top edge -->
    <rect x="44" y="13" width="12" height="7" rx="1.5" fill="#E5E5E5" stroke="none"/>
    <!-- row of 12 fiber cores (lime), the multi-fiber face -->
    <g fill="#A2CC3A" stroke="none">
      <circle cx="14" cy="40" r="2.4"/><circle cx="22.5" cy="40" r="2.4"/>
      <circle cx="31" cy="40" r="2.4"/><circle cx="39.5" cy="40" r="2.4"/>
      <circle cx="48" cy="40" r="2.4"/><circle cx="56.5" cy="40" r="2.4"/>
      <circle cx="65" cy="40" r="2.4"/><circle cx="73.5" cy="40" r="2.4"/>
      <circle cx="82" cy="40" r="2.4"/><circle cx="90.5" cy="40" r="2.4"/>
    </g>
    <text x="50" y="132" fill="#E5E5E5" font-size="16" font-weight="700" text-anchor="middle">MPO / MTP</text>
    <text x="50" y="152" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">8 / 12 / 24 fiber</text>
    <text x="50" y="170" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">ribbon, keyed</text>
    <text x="50" y="188" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">40/100/400G parallel</text>
  </g>

  <!-- FOOTER NOTE -->
  <line x1="40" y1="408" x2="880" y2="408" stroke="#3A3A3A" stroke-width="1"/>
  <text x="460" y="430" fill="#9C9C9C" font-size="11.5" font-weight="500" text-anchor="middle">MTP is US&#160;Conec&#8217;s tighter-tolerance, branded MPO &#8212; mechanically intermateable, not a separate standard.</text>
</svg>
