<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- 802.11 deauth/disassoc reason codes: a code -> meaning lookup list; lime = a representative code row. Archetype E. -->

  <!-- code -> meaning table -->
  <g font-family="DM Mono, monospace">
    <!-- header rule -->
    <line x1="22" y1="42" x2="298" y2="42" stroke="#9C9C9C" stroke-width="1.25"/>
    <text x="30" y="39" fill="#9C9C9C" font-size="10" font-weight="500">code</text>
    <text x="90" y="39" fill="#9C9C9C" font-size="10" font-weight="500">meaning</text>

    <!-- row 1 -->
    <text x="30" y="62" fill="#E5E5E5" font-size="12" font-weight="500">1</text>
    <text x="90" y="62" fill="#E5E5E5" font-size="12" font-weight="500" font-family="IBM Plex Sans, sans-serif">Unspecified</text>
    <!-- row 2 (representative, lime) -->
    <rect x="22" y="68" width="276" height="22" rx="3" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="30" y="84" fill="#A2CC3A" font-size="12" font-weight="500">3</text>
    <text x="90" y="84" fill="#A2CC3A" font-size="12" font-weight="500" font-family="IBM Plex Sans, sans-serif">STA leaving</text>
    <!-- row 3 -->
    <text x="30" y="106" fill="#E5E5E5" font-size="12" font-weight="500">4</text>
    <text x="90" y="106" fill="#E5E5E5" font-size="12" font-weight="500" font-family="IBM Plex Sans, sans-serif">Inactivity</text>
    <!-- row 4 -->
    <text x="30" y="128" fill="#E5E5E5" font-size="12" font-weight="500">15</text>
    <text x="90" y="128" fill="#E5E5E5" font-size="12" font-weight="500" font-family="IBM Plex Sans, sans-serif">4-way timeout</text>
  </g>
  <!-- row dividers -->
  <g stroke="#3A3A3A" stroke-width="1">
    <line x1="22" y1="68" x2="298" y2="68"/>
    <line x1="22" y1="90" x2="298" y2="90"/>
    <line x1="22" y1="112" x2="298" y2="112"/>
  </g>

  <!-- Header -->
  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">802.11 deauth / disassoc reason codes</text>
  <!-- Footer -->
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="83.3" y="150.0" text-anchor="start">reason code</text>
  <path d="M146.8 146.5 H154.8 M151.3 143.0 L154.8 146.5 L151.3 150.0" fill="none" stroke="#9C9C9C" stroke-width="1.2650000000000001" stroke-linecap="round" stroke-linejoin="round"/>
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="157.8" y="150.0" text-anchor="start">meaning lookup</text>
</svg>
