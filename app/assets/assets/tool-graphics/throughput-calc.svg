<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Throughput: PHY rate (full pipe) -> efficiency overhead (the funnel narrows) ->
       effective throughput (the usable portion). No hatching. Lime = the usable rate. -->

  <!-- Header / formula -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">effective = PHY &#215; efficiency</text>

  <!-- Full PHY-rate pipe (left, neutral = the advertised data rate) -->
  <rect x="22" y="50" width="86" height="64" rx="3" stroke="#E5E5E5" stroke-width="1.75" fill="none"/>
  <text x="65" y="40" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">PHY rate</text>

  <!-- Efficiency funnel: pipe narrows (overhead = contention, headers, MAC) -->
  <g stroke="#9C9C9C" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M108 50 L176 70"/>
    <path d="M108 114 L176 94"/>
  </g>
  <text x="142" y="130" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">overhead</text>

  <!-- Effective throughput gauge (right, lime = the usable portion) -->
  <rect x="176" y="68" width="116" height="28" rx="3" stroke="#E5E5E5" stroke-width="1.5" fill="none"/>
  <rect x="179" y="71" width="70" height="22" rx="2" fill="#A2CC3A" opacity="0.85"/>
  <text x="234" y="40" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">effective</text>

  <!-- Footer cue -->
  <text x="160" y="150" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">usable &lt; advertised rate</text>
</svg>
