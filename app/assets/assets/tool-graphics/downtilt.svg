<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Downtilt: mast at height h, beam centerline angled down to a target at distance d.
       Lime = the tilt angle arc + the beam. Re-laid-out wide (2:1) to show the h-vs-d triangle clearly. -->

  <!-- Ground line -->
  <line x1="20" y1="128" x2="304" y2="128" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round" opacity="0.7">
    <path d="M28 128 l5 6 M44 128 l5 6 M276 128 l5 6 M292 128 l5 6"/>
  </g>

  <!-- Mast at left, height h -->
  <line x1="52" y1="40" x2="52" y2="128" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Antenna head at top of mast -->
  <rect x="46" y="36" width="12" height="20" rx="2" stroke="#E5E5E5" stroke-width="1.75"/>

  <!-- Horizontal reference (dashed neutral) from antenna across the run -->
  <line x1="52" y1="46" x2="266" y2="46" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="4 4"/>

  <!-- Beam centerline angled down to the ground target (lime) -->
  <line x1="52" y1="46" x2="266" y2="128" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round"/>
  <!-- Target marker on ground -->
  <circle cx="266" cy="128" r="3.5" fill="#A2CC3A"/>
  <text x="266" y="120" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">target</text>

  <!-- Tilt angle arc between horizontal reference and beam (lime) -->
  <path d="M100 46 A48 48 0 0 1 92 64" stroke="#A2CC3A" stroke-width="1.75" fill="none"/>
  <!-- theta as a vector <path> (was &#952; in DM Mono, no Greek -> tofu); GL-003 8.6.1. -->
  <g fill="none" stroke="#A2CC3A" stroke-width="1.6" stroke-linecap="round">
    <ellipse cx="110" cy="57" rx="4.4" ry="6.4"/>
    <line x1="106" y1="57" x2="114" y2="57"/>
  </g>

  <!-- Height h dimension on the mast -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="32" y1="46" x2="32" y2="128"/>
    <path d="M29 52 L32 46 L35 52 M29 122 L32 128 L35 122"/>
  </g>
  <text x="22" y="88" fill="#9C9C9C" font-size="13" font-weight="500" text-anchor="middle" transform="rotate(-90 22 88)">h</text>

  <!-- Target distance d dimension on ground -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="52" y1="144" x2="266" y2="144"/>
    <path d="M58 141 L52 144 L58 147 M260 141 L266 144 L260 147"/>
  </g>
  <text x="159" y="156" fill="#9C9C9C" font-size="13" font-weight="500" text-anchor="middle">distance d</text>

  <!-- Header. theta is a vector <path> (was &#952;); the ASCII runs are
       start-anchored monospace with theta in the fixed gap (GL-003 8.6.1). -->
  <text x="81.9" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">tilt</text>
  <g fill="none" stroke="#E5E5E5" stroke-width="1.45" stroke-linecap="round">
    <ellipse cx="124.9" cy="15.8" rx="3.9" ry="5.9"/>
    <line x1="121.4" y1="15.8" x2="128.4" y2="15.8"/>
  </g>
  <text x="128.9" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace"> = atan(h / d)</text>
</svg>
