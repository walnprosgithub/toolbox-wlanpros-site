<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Cable loss: a coax run of length L; signal level dropping along it. Lime = the dB lost over distance. -->

  <!-- Input connector (left) -->
  <rect x="22" y="50" width="16" height="24" rx="2" stroke="#E5E5E5" stroke-width="1.75"/>
  <text x="30" y="40" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">in</text>

  <!-- Coax run (neutral, the conductor) -->
  <line x1="38" y1="62" x2="282" y2="62" stroke="#E5E5E5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Output connector (right) -->
  <rect x="282" y="50" width="16" height="24" rx="2" stroke="#E5E5E5" stroke-width="1.75"/>
  <text x="290" y="40" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">out</text>

  <!-- Signal level decaying along the run (lime) -->
  <path d="M40 92 C120 92 180 104 282 116" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- level tick marks dropping -->
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round">
    <line x1="40" y1="92" x2="40" y2="84"/>
    <line x1="282" y1="116" x2="282" y2="108"/>
  </g>
  <circle cx="40" cy="92" r="2.5" fill="#A2CC3A"/>
  <circle cx="282" cy="116" r="2.5" fill="#A2CC3A"/>

  <!-- dB lost gap marked at the far end -->
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round">
    <line x1="300" y1="92" x2="300" y2="116"/>
    <path d="M297 96 L300 92 L303 96 M297 112 L300 116 L303 112"/>
  </g>
  <text x="270" y="134" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="end">dB lost</text>

  <!-- Length dimension line -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="38" y1="142" x2="298" y2="142"/>
    <path d="M44 139 L38 142 L44 145 M292 139 L298 142 L292 145"/>
  </g>
  <text x="168" y="156" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">length L</text>

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">loss = dB/m &#215; L</text>
</svg>
