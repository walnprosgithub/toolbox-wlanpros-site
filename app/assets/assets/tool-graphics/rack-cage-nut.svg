<svg width="1180" height="600" viewBox="0 0 1180 600" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans', sans-serif">
  <defs>
    <marker id="cnArrow" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="9" refY="4.5" orient="auto">
      <path d="M1,1 L10,4.5 L1,8" fill="none" stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="60" y="44" font-size="22" font-weight="700" fill="#E5E5E5">Cage nut: turning a square hole into any thread you need</text>

  <!-- =========================================================
       Three-step assembly. Rails: x-blocks at 100, 450, 800; y=150..350 (h=200).
       Hole/cage centered at y=250 in each rail.
       Step labels live ABOVE the rails (y<=130), clear of all geometry.
       ========================================================= -->

  <!-- step number badges -->
  <text x="100" y="100" font-family="'DM Mono', monospace" font-size="16" font-weight="500" fill="#9C9C9C">STEP 1</text>
  <text x="450" y="100" font-family="'DM Mono', monospace" font-size="16" font-weight="500" fill="#9C9C9C">STEP 2</text>
  <text x="800" y="100" font-family="'DM Mono', monospace" font-size="16" font-weight="500" fill="#9C9C9C">STEP 3</text>

  <!-- sequence arrows between rails, at center height y=250 -->
  <line x1="306" y1="250" x2="378" y2="250" stroke="#E5E5E5" stroke-width="1.6" marker-end="url(#cnArrow)"/>
  <line x1="656" y1="250" x2="728" y2="250" stroke="#E5E5E5" stroke-width="1.6" marker-end="url(#cnArrow)"/>

  <!-- ---------- STEP 1: bare square hole in rail ---------- -->
  <rect x="100" y="150" width="200" height="200" fill="#222222" stroke="#E5E5E5" stroke-width="2" rx="4"/>
  <rect x="160" y="210" width="80" height="80" fill="#1A1A1A" stroke="#E5E5E5" stroke-width="2.2" rx="3"/>
  <!-- 3/8in square callout ABOVE the rail, clear -->
  <text x="200" y="130" text-anchor="middle" font-family="'DM Mono', monospace" font-size="15" font-weight="500" fill="#9C9C9C">3/8 in square hole</text>
  <text x="200" y="384" text-anchor="middle" font-size="15" font-weight="600" fill="#E5E5E5">Bare square hole</text>

  <!-- ---------- STEP 2: cage nut clipped into the hole ---------- -->
  <rect x="450" y="150" width="200" height="200" fill="#222222" stroke="#E5E5E5" stroke-width="2" rx="4"/>
  <!-- spring-steel cage (outer frame) - lime = the part that does the work -->
  <rect x="500" y="198" width="100" height="104" fill="none" stroke="#A1CC3A" stroke-width="2.4" rx="5"/>
  <!-- the two spring tabs gripping the hole edges (left + right) -->
  <path d="M500,216 q-12,4 -12,16 q0,12 12,16" fill="none" stroke="#A1CC3A" stroke-width="2" stroke-linecap="round"/>
  <path d="M600,216 q12,4 12,16 q0,12 -12,16" fill="none" stroke="#A1CC3A" stroke-width="2" stroke-linecap="round"/>
  <!-- captive nut (threaded center) -->
  <rect x="522" y="220" width="56" height="60" fill="#1A1A1A" stroke="#E5E5E5" stroke-width="2" rx="2"/>
  <circle cx="550" cy="250" r="17" fill="#1A1A1A" stroke="#E5E5E5" stroke-width="1.8"/>
  <g stroke="#9C9C9C" stroke-width="1.2">
    <line x1="536" y1="243" x2="564" y2="243"/>
    <line x1="536" y1="250" x2="564" y2="250"/>
    <line x1="536" y1="257" x2="564" y2="257"/>
  </g>
  <!-- spring-steel-cage label ABOVE rail, clear -->
  <text x="550" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#A1CC3A">spring-steel cage</text>
  <text x="550" y="384" text-anchor="middle" font-size="15" font-weight="600" fill="#E5E5E5">Cage nut clips in</text>

  <!-- ---------- STEP 3: screw threads through ---------- -->
  <rect x="800" y="150" width="200" height="200" fill="#222222" stroke="#E5E5E5" stroke-width="2" rx="4"/>
  <!-- installed cage nut (quiet neutral) -->
  <rect x="850" y="198" width="100" height="104" fill="none" stroke="#E5E5E5" stroke-width="2" rx="5"/>
  <rect x="872" y="220" width="56" height="60" fill="#1A1A1A" stroke="#E5E5E5" stroke-width="1.8" rx="2"/>
  <circle cx="900" cy="250" r="15" fill="#1A1A1A" stroke="#9C9C9C" stroke-width="1.4"/>
  <!-- screw entering from the left, threading into the nut (lime = the action) -->
  <rect x="790" y="236" width="24" height="28" fill="#A1CC3A" rx="2"/>
  <line x1="802" y1="240" x2="802" y2="260" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="814" y1="250" x2="900" y2="250" stroke="#A1CC3A" stroke-width="3.6"/>
  <g stroke="#1A1A1A" stroke-width="1.4">
    <line x1="828" y1="245" x2="832" y2="255"/>
    <line x1="846" y1="245" x2="850" y2="255"/>
    <line x1="864" y1="245" x2="868" y2="255"/>
    <line x1="882" y1="245" x2="886" y2="255"/>
  </g>
  <!-- screw-threads-in label ABOVE rail, clear -->
  <text x="900" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#A1CC3A">screw threads in</text>
  <text x="900" y="384" text-anchor="middle" font-size="15" font-weight="600" fill="#E5E5E5">Now a threaded hole</text>

  <!-- thread-choice note in its own clear band below the three captions -->
  <text x="550" y="420" text-anchor="middle" font-size="14" fill="#9C9C9C">Pick the cage nut to match the gear: 10-32, 12-24, or M6.</text>

  <!-- divider -->
  <line x1="60" y1="446" x2="1120" y2="446" stroke="#3A3A3A" stroke-width="1"/>

  <!-- =========================================================
       Bottom: contrast  square-hole (cage nut)  vs  tapped rail
       ========================================================= -->
  <text x="60" y="484" font-size="17" font-weight="700" fill="#E5E5E5">Square-hole (cage nut)</text>
  <text x="640" y="484" font-size="17" font-weight="700" fill="#E5E5E5">Tapped (threaded round holes)</text>

  <!-- LEFT: square-hole rail strip -->
  <rect x="60" y="500" width="64" height="84" fill="#222222" stroke="#E5E5E5" stroke-width="2" rx="3"/>
  <g fill="#1A1A1A" stroke="#E5E5E5" stroke-width="1.8">
    <rect x="80" y="514" width="24" height="24" rx="2"/>
    <rect x="80" y="546" width="24" height="24" rx="2"/>
  </g>
  <text x="146" y="522" font-size="14" fill="#E5E5E5">Thread-agnostic: swap the cage nut to suit the gear.</text>
  <text x="146" y="546" font-size="14" fill="#E5E5E5">Strip a nut? Replace the nut, not the rail.</text>
  <text x="146" y="570" font-size="14" fill="#E5E5E5">Modern default, but bring cage nuts; few ship with them.</text>

  <!-- RIGHT: tapped rail strip -->
  <rect x="640" y="500" width="64" height="84" fill="#222222" stroke="#E5E5E5" stroke-width="2" rx="3"/>
  <g fill="none" stroke="#E5E5E5" stroke-width="1.8">
    <circle cx="672" cy="526" r="12"/>
    <circle cx="672" cy="558" r="12"/>
  </g>
  <g stroke="#9C9C9C" stroke-width="1">
    <line x1="663" y1="521" x2="681" y2="521"/><line x1="663" y1="526" x2="681" y2="526"/><line x1="663" y1="531" x2="681" y2="531"/>
    <line x1="663" y1="553" x2="681" y2="553"/><line x1="663" y1="558" x2="681" y2="558"/><line x1="663" y1="563" x2="681" y2="563"/>
  </g>
  <text x="726" y="522" font-size="14" fill="#E5E5E5">Screw goes straight in: fast, no extra parts.</text>
  <text x="726" y="546" font-size="14" fill="#E5E5E5">Locked to ONE thread type.</text>
  <text x="726" y="570" font-size="14" fill="#E5E5E5">Strip a thread and that position is dead.</text>
</svg>
