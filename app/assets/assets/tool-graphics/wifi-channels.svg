<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Wi-Fi channels: per-band 20 MHz channel listing across 2.4 / 5 / 6 GHz.
       Lime = the non-overlapping channels. Distinct from channel-map (bonding blocks); this is the band listing.
       Archetype D (partition / block). -->

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">channels per band: 2.4 / 5 / 6 GHz</text>

  <!-- band label column (neutral) -->
  <g fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="end" font-family="DM Mono, monospace">
    <text x="48" y="50">2.4</text>
    <text x="48" y="86">5</text>
    <text x="48" y="122">6</text>
  </g>

  <!-- 2.4 GHz row: 1..11, non-overlapping 1 / 6 / 11 in lime -->
  <g font-family="DM Mono, monospace" font-size="10" font-weight="500" text-anchor="middle">
    <rect x="56"  y="38" width="22" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="67"  y="50" fill="#A2CC3A">1</text>
    <rect x="84"  y="38" width="22" height="16" rx="2" stroke="#9C9C9C" stroke-width="1.25"/>
    <text x="95"  y="50" fill="#9C9C9C">3</text>
    <rect x="112" y="38" width="22" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="123" y="50" fill="#A2CC3A">6</text>
    <rect x="140" y="38" width="22" height="16" rx="2" stroke="#9C9C9C" stroke-width="1.25"/>
    <text x="151" y="50" fill="#9C9C9C">9</text>
    <rect x="168" y="38" width="22" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="179" y="50" fill="#A2CC3A">11</text>
  </g>

  <!-- 5 GHz row: representative UNII channels, all 20 MHz non-overlap (lime) -->
  <g font-family="DM Mono, monospace" font-size="10" font-weight="500" text-anchor="middle">
    <rect x="56"  y="74" width="26" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="69"  y="86" fill="#A2CC3A">36</text>
    <rect x="88"  y="74" width="26" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="101" y="86" fill="#A2CC3A">40</text>
    <rect x="120" y="74" width="26" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="133" y="86" fill="#A2CC3A">44</text>
    <rect x="152" y="74" width="26" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="165" y="86" fill="#A2CC3A">149</text>
    <rect x="184" y="74" width="26" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="197" y="86" fill="#A2CC3A">153</text>
    <text x="240" y="86" fill="#9C9C9C">+DFS</text>
  </g>

  <!-- 6 GHz row: 5 / 6 / 7 ... PSC channels (lime), wide listing -->
  <g font-family="DM Mono, monospace" font-size="10" font-weight="500" text-anchor="middle">
    <rect x="56"  y="110" width="26" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="69"  y="122" fill="#A2CC3A">1</text>
    <rect x="88"  y="110" width="26" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="101" y="122" fill="#A2CC3A">5</text>
    <rect x="120" y="110" width="26" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="133" y="122" fill="#A2CC3A">9</text>
    <rect x="152" y="110" width="26" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="165" y="122" fill="#A2CC3A">13</text>
    <rect x="184" y="110" width="26" height="16" rx="2" stroke="#A2CC3A" stroke-width="1.75" fill="#A2CC3A" fill-opacity="0.08"/>
    <text x="197" y="122" fill="#A2CC3A">17</text>
    <text x="246" y="122" fill="#9C9C9C">PSC...</text>
  </g>

  <!-- Footer / legend -->
  <text x="56" y="148" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="start">lime = non-overlapping 20 MHz</text>
</svg>
