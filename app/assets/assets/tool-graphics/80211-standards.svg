<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- 802.11 generations timeline: a/b/g/n/ac/ax/be mapped to the Wi-Fi 4-7 marketing names,
       with peak rate climbing along the line. Lime = the rate progression (latest, fastest generation).
       Archetype E/timeline. -->

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">802.11 generations timeline</text>

  <!-- Timeline axis (neutral) -->
  <line x1="22" y1="100" x2="294" y2="100" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <path d="M288 96 l6 4 l-6 4" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Rising peak-rate trend line (lime = the rate progression) -->
  <polyline points="38,90 78,86 118,80 158,70 198,58 238,46 278,36"
            stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Generation nodes on the axis (early gens neutral, Wi-Fi 4-7 named) -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="38"  y1="96" x2="38"  y2="104"/>
    <line x1="78"  y1="96" x2="78"  y2="104"/>
    <line x1="118" y1="96" x2="118" y2="104"/>
  </g>

  <!-- Wi-Fi 4-7 nodes (lime dots on the trend) -->
  <g fill="#A2CC3A">
    <circle cx="158" cy="70" r="3"/>
    <circle cx="198" cy="58" r="3"/>
    <circle cx="238" cy="46" r="3"/>
    <circle cx="278" cy="36" r="3"/>
  </g>

  <!-- 802.11 letter labels (below axis, DM Mono, neutral) -->
  <g fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="38"  y="118">b</text>
    <text x="78"  y="118">a</text>
    <text x="118" y="118">g</text>
    <text x="158" y="118">n</text>
    <text x="198" y="118">ac</text>
    <text x="238" y="118">ax</text>
    <text x="278" y="118">be</text>
  </g>

  <!-- Wi-Fi generation names (Wi-Fi 4-7, lime where named) -->
  <g font-size="10" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="158" y="134" fill="#A2CC3A">Wi-Fi 4</text>
    <text x="198" y="134" fill="#A2CC3A">5</text>
    <text x="238" y="134" fill="#A2CC3A">6</text>
    <text x="278" y="134" fill="#A2CC3A">7</text>
  </g>

  <!-- Footer -->
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="22.0" y="150.0" text-anchor="start">peak rate climbs each generation</text>
  <path d="M188.7 146.5 H196.7 M193.2 143.0 L196.7 146.5 L193.2 150.0" fill="none" stroke="#9C9C9C" stroke-width="1.2650000000000001" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
