<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" width="640" height="560" font-family="IBM Plex Sans, sans-serif" fill="none">
  <!-- NEMA 5-20R receptacle FACE, drawn LARGE & centered. Geometry reused from the
       Vera-passed composite (5-20 tile), scaled ~2.4x. 5-series = neutral + hot + U-ground.
       The 20A giveaway is the T-SLOT neutral (vertical + horizontal foot) -> ONE lime.
       125V / 20A / 1-phase.
       Palette: §8.20.7 swap-list only — scaffold #E5E5E5, muted #9C9C9C, ONE lime #A1CC3A.
       STANDING RULE: no label over any slot, ground, or other label. -->

  <!-- Header -->
  <text x="320" y="44" fill="#E5E5E5" font-size="30" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">5-20</text>
  <text x="320" y="76" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">20A household / shop outlet &#183; the T-slot tells you</text>

  <!-- ============ FACE: round bezel, centered (320,250), r=110 ============ -->
  <circle cx="320" cy="250" r="110" stroke="#E5E5E5" stroke-width="5"/>
  <!-- neutral slot: T-SLOT (vertical + horizontal foot) — the 20A mark (LIME) -->
  <path d="M 273 204 L 273 257 M 273 257 L 249 257"
        stroke="#A1CC3A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- hot slot: RIGHT, vertical -->
  <rect x="358" y="214" width="15" height="43" rx="5" stroke="#E5E5E5" stroke-width="5"/>
  <!-- U-ground below center -->
  <path d="M 303 305 L 303 286 A 17 17 0 0 1 337 286 L 337 305"
        stroke="#E5E5E5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- pin callouts, outside the face / clear of slots / ground / ring -->
  <text x="150" y="230" fill="#A1CC3A" font-size="15" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">T-slot</text>
  <text x="150" y="250" fill="#A1CC3A" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">neutral</text>
  <text x="472" y="234" fill="#9C9C9C" font-size="15" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">hot</text>
  <text x="320" y="392" fill="#9C9C9C" font-size="15" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">ground</text>

  <!-- ============ LABELS ============ -->
  <text x="320" y="448" fill="#E5E5E5" font-size="34" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">125 V &#183; 20 A</text>
  <text x="320" y="482" fill="#9C9C9C" font-size="18" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">single-phase &#183; 2-pole, 3-wire</text>
  <text x="320" y="514" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">Window AC, shop tools, 20A branch circuits</text>
</svg>
