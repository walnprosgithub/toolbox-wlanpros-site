<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Metric conversion (type F flow): a measured segment read on two aligned unit scales,
       with a swap/transform between them. Lime = the converted reading. -->

  <!-- Header. Rightwards arrow (was &#8594;) is a vector <path>: DM Mono carries no
       arrow so a font arrow tofu'd. "ft" and "m" stay as start-anchored
       monospace text with the arrow in the fixed center gap (GL-003 8.6.1). -->
  <text x="142" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">ft</text>
  <path d="M161 18 H174 M170.5 14 L174 18 L170.5 22" fill="none" stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="180" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">m</text>

  <!-- Top scale: feet (neutral source) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round">
    <line x1="40" y1="58" x2="280" y2="58"/>
    <!-- major ticks (every 60px), minor between -->
    <line x1="40" y1="58" x2="40" y2="46"/>
    <line x1="100" y1="58" x2="100" y2="46"/>
    <line x1="160" y1="58" x2="160" y2="46"/>
    <line x1="220" y1="58" x2="220" y2="46"/>
    <line x1="280" y1="58" x2="280" y2="46"/>
  </g>
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="70" y1="58" x2="70" y2="51"/>
    <line x1="130" y1="58" x2="130" y2="51"/>
    <line x1="190" y1="58" x2="190" y2="51"/>
    <line x1="250" y1="58" x2="250" y2="51"/>
  </g>
  <text x="40" y="40" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">ft</text>

  <!-- The measured segment, called out on the source scale -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="40" y1="70" x2="232" y2="70"/>
    <path d="M46 67 L40 70 L46 73 M226 67 L232 70 L226 73"/>
  </g>
  <text x="136" y="84" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">100 ft</text>

  <!-- Transform / swap arrow between the two scales -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 92 L150 104 M145 99 L150 104 L155 99"/>
    <path d="M170 116 L170 104 M165 109 L170 104 L175 109"/>
  </g>

  <!-- Bottom scale: meters (lime, the converted reading) -->
  <g stroke="#A2CC3A" stroke-width="1.75" stroke-linecap="round">
    <line x1="40" y1="124" x2="280" y2="124"/>
    <line x1="40" y1="124" x2="40" y2="136"/>
    <line x1="119" y1="124" x2="119" y2="136"/>
    <line x1="198" y1="124" x2="198" y2="136"/>
    <line x1="277" y1="124" x2="277" y2="136"/>
  </g>
  <g stroke="#A2CC3A" stroke-width="1.25" stroke-linecap="round" opacity="0.7">
    <line x1="79" y1="124" x2="79" y2="131"/>
    <line x1="158" y1="124" x2="158" y2="131"/>
    <line x1="237" y1="124" x2="237" y2="131"/>
  </g>
  <text x="40" y="151" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">m</text>

  <!-- Converted reading marked on the meter scale (100 ft = 30.48 m) -->
  <line x1="40" y1="118" x2="40" y2="124" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round"/>
  <line x1="161" y1="118" x2="161" y2="124" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round"/>
  <text x="240" y="151" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">30.48 m</text>
</svg>
