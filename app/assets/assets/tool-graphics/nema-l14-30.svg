<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" width="640" height="560" font-family="IBM Plex Sans, sans-serif" fill="none">
  <!-- NEMA L14-30R twist-lock FACE, drawn LARGE & centered. Geometry reused from the
       Vera-passed composite (L14-30 tile + shared twistblade def), scaled ~2.4x.
       L14-30 = 4 hooked locking blades 90 deg apart: 2 hots + neutral + ground.
       125/250V / 30A / single-phase split (4-wire). Generator/transfer-switch outlet.
       Highlight ONE blade lime. POLE COUNT = 4 (this is the identifier vs L5/L6's 3).
       Palette: §8.20.7 swap-list only — scaffold #E5E5E5, muted #9C9C9C, ONE lime #A1CC3A.
       STANDING RULE: no label over any slot, ground, or other label. -->

  <defs>
    <path id="tb" d="M -21.6 -61.2 A 64.8 64.8 0 0 1 27.6 -58.8 L 18.5 -39.4 A 43.2 43.2 0 0 0 -14.4 -40.8 Z"
          fill="#E5E5E5" stroke="#E5E5E5" stroke-width="3.4" stroke-linejoin="round"/>
    <path id="tbL" d="M -21.6 -61.2 A 64.8 64.8 0 0 1 27.6 -58.8 L 18.5 -39.4 A 43.2 43.2 0 0 0 -14.4 -40.8 Z"
          fill="#A1CC3A" stroke="#A1CC3A" stroke-width="3.4" stroke-linejoin="round"/>
  </defs>

  <!-- Header -->
  <text x="320" y="44" fill="#E5E5E5" font-size="30" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">L14-30</text>
  <text x="320" y="76" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">Twist-lock &#183; 4 poles: 2 hots + neutral + ground</text>

  <!-- ============ FACE: round bezel, centered (320,250), r=110 ============ -->
  <circle cx="320" cy="250" r="110" stroke="#E5E5E5" stroke-width="5"/>
  <g transform="translate(320,250)">
    <use href="#tbL"/>
    <use href="#tb" transform="rotate(90)"/>
    <use href="#tb" transform="rotate(180)"/>
    <use href="#tb" transform="rotate(270)"/>
  </g>

  <!-- (no in-face callout: the lime blade reads as the curved locking-slot highlight;
       pole count is carried by the subtitle + bottom labels — keeps the face clear of any
       label-over-geometry overlap per the standing rule) -->

  <!-- ============ LABELS ============ -->
  <text x="320" y="448" fill="#E5E5E5" font-size="34" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">125/250 V &#183; 30 A</text>
  <text x="320" y="482" fill="#9C9C9C" font-size="18" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">single-phase split &#183; 3-pole, 4-wire &#183; locking</text>
  <text x="320" y="514" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">Portable generators, transfer switches &#183; 4-wire</text>
</svg>
