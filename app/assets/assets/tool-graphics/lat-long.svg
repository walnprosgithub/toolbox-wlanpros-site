<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Lat/Long formats (type F flow): one point on a globe-grid shown three ways
       (DD / DDM / DMS), a transform between the formats. Lime = the active format + the point. -->

  <!-- Header -->
  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">DD / DDM / DMS</text>

  <!-- Globe-grid (left): a sphere with lat/long graticule, neutral scaffold -->
  <circle cx="74" cy="92" r="46" stroke="#E5E5E5" stroke-width="1.75"/>
  <!-- latitude lines (ellipses) -->
  <g stroke="#9C9C9C" stroke-width="1" fill="none" opacity="0.85">
    <ellipse cx="74" cy="92" rx="46" ry="15"/>
    <path d="M30 78 A 60 30 0 0 0 118 78"/>
    <path d="M30 106 A 60 30 0 0 1 118 106"/>
  </g>
  <!-- longitude lines (vertical ellipses) -->
  <g stroke="#9C9C9C" stroke-width="1" fill="none" opacity="0.85">
    <line x1="74" y1="46" x2="74" y2="138"/>
    <ellipse cx="74" cy="92" rx="15" ry="46"/>
    <ellipse cx="74" cy="92" rx="32" ry="46"/>
  </g>

  <!-- The located point (lime) -->
  <circle cx="96" cy="70" r="4.5" fill="#A2CC3A"/>
  <circle cx="96" cy="70" r="9" stroke="#A2CC3A" stroke-width="1.5" opacity="0.5"/>

  <!-- Transform arrow from globe to the format stack -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="124" y1="92" x2="148" y2="92"/>
    <path d="M143 87 L148 92 L143 97"/>
  </g>

  <!-- Three format rows (right), stacked. Active format = DD in lime, others neutral. -->
  <!-- Row 1: DD (active, lime) -->
  <text x="160" y="62" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">DD</text>
  <text x="186" y="62" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">40.7128, -74.0060</text>

  <!-- Row 2: DDM -->
  <text x="160" y="92" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">DDM</text>
  <text x="186" y="92" fill="#E5E5E5" font-size="12" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">40&#176;42.768' N</text>

  <!-- Row 3: DMS -->
  <text x="160" y="122" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">DMS</text>
  <text x="186" y="122" fill="#E5E5E5" font-size="12" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">40&#176;42'46" N</text>

  <!-- vertical connector tying the three formats as one point -->
  <line x1="152" y1="52" x2="152" y2="126" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round" opacity="0.6"/>
</svg>
