<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- PoE reference: the 802.3 standards/classes as rising power steps (af -> at -> bt).
       Lime = the class power level at the top of the ladder. -->

  <!-- Power axis (Watts), vertical (neutral) -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="40" y1="26" x2="40" y2="120"/>
    <path d="M36 32 L40 26 L44 32"/>
  </g>
  <text x="28" y="30" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" transform="rotate(-90 28 30)">Watts</text>
  <line x1="40" y1="120" x2="252" y2="120" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>

  <!-- Power steps (rising staircase, neutral) -->
  <!-- 802.3af step -->
  <rect x="52" y="98" width="50" height="22" stroke="#E5E5E5" stroke-width="1.75"/>
  <text x="77" y="134" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">802.3af</text>
  <text x="77" y="148" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">15.4 W</text>

  <!-- 802.3at step -->
  <rect x="112" y="78" width="50" height="42" stroke="#E5E5E5" stroke-width="1.75"/>
  <text x="137" y="134" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">802.3at</text>
  <text x="137" y="148" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">30 W</text>

  <!-- 802.3bt step (top class, lime = the measured/key quantity) -->
  <rect x="172" y="46" width="50" height="74" stroke="#A2CC3A" stroke-width="2" fill="#A2CC3A" fill-opacity="0.08"/>
  <text x="197" y="134" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">802.3bt</text>
  <text x="197" y="148" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">90 W</text>

  <!-- RJ45 plug with a power bolt (right, neutral jack + lime bolt = power) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M264 50 h26 v30 h-26 v-8 h-6 v-14 h6 z"/>
    <line x1="270" y1="50" x2="270" y2="44"/>
    <line x1="284" y1="50" x2="284" y2="44"/>
  </g>
  <path d="M279 56 L271 67 L277 67 L274 76 L283 64 L277 64 Z" fill="#A2CC3A"/>

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">PoE power by 802.3 class</text>
</svg>
