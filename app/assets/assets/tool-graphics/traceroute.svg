<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Traceroute: the hop-by-hop path from this device to a destination, with per-hop latency.
       Lime = the hops and their measured latencies. Archetype C (path / sequence). -->

  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">path to destination</text>

  <!-- Path connectors (neutral) -->
  <g stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round">
    <line x1="46"  y1="80" x2="106" y2="80"/>
    <line x1="124" y1="80" x2="174" y2="80"/>
    <line x1="192" y1="80" x2="242" y2="80"/>
  </g>
  <!-- arrowheads along the path -->
  <g stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M100 76 L106 80 L100 84"/>
    <path d="M168 76 L174 80 L168 84"/>
    <path d="M236 76 L242 80 L236 84"/>
  </g>

  <!-- This device (start) -->
  <rect x="22" y="68" width="24" height="24" rx="3" stroke="#E5E5E5" stroke-width="1.75"/>
  <text x="34" y="108" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">device</text>

  <!-- Intermediate hops (lime nodes = the measured hops) -->
  <g>
    <circle cx="115" cy="80" r="9" fill="#A2CC3A" fill-opacity="0.12" stroke="#A2CC3A" stroke-width="2"/>
    <circle cx="183" cy="80" r="9" fill="#A2CC3A" fill-opacity="0.12" stroke="#A2CC3A" stroke-width="2"/>
  </g>
  <g font-family="DM Mono, monospace" font-size="11" font-weight="500" fill="#A2CC3A" text-anchor="middle">
    <text x="115" y="84">1</text>
    <text x="183" y="84">2</text>
  </g>

  <!-- Destination (end) -->
  <rect x="252" y="68" width="24" height="24" rx="3" stroke="#E5E5E5" stroke-width="1.75"/>
  <line x1="258" y1="86" x2="270" y2="86" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>
  <text x="264" y="108" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">dest</text>

  <!-- Per-hop latency readouts (lime, the measured quantity) -->
  <g font-family="DM Mono, monospace" font-size="11" font-weight="500" fill="#A2CC3A" text-anchor="middle">
    <text x="115" y="124">3 ms</text>
    <text x="183" y="124">11 ms</text>
    <text x="264" y="124">19 ms</text>
  </g>

  <text x="160" y="148" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">latency per hop</text>
</svg>
