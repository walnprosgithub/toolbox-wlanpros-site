<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- dBm <-> Watt: a level scale showing the log relationship. dBm is linear on the scale; Watts multiply x10 every +10 dB. -->

  <!-- Scale axis -->
  <line x1="40" y1="92" x2="288" y2="92" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <path d="M282 88 l6 4 l-6 4" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Anchor ticks: evenly spaced dBm (linear), with the non-linear Watt value above (lime = the converted quantity) -->
  <g stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round">
    <line x1="56"  y1="86" x2="56"  y2="98"/>
    <line x1="114" y1="86" x2="114" y2="98"/>
    <line x1="172" y1="86" x2="172" y2="98"/>
    <line x1="230" y1="86" x2="230" y2="98"/>
  </g>

  <!-- dBm labels (below, even spacing = linear) -->
  <g fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="56"  y="116">0 dBm</text>
    <text x="114" y="116">10</text>
    <text x="172" y="116">20</text>
    <text x="230" y="116">30 dBm</text>
  </g>

  <!-- Watt values (above, ×10 each step = the log relationship, in lime) -->
  <g fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="56"  y="74">1 mW</text>
    <text x="114" y="74">10 mW</text>
    <text x="172" y="74">100 mW</text>
    <text x="230" y="74">1 W</text>
  </g>

  <!-- "×10 per +10 dB" multiplier cues between anchors -->
  <g fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle" opacity="0.85">
    <text x="85"  y="52">&#215;10</text>
    <text x="143" y="52">&#215;10</text>
    <text x="201" y="52">&#215;10</text>
  </g>
  <g stroke="#A2CC3A" stroke-width="1" stroke-linecap="round" opacity="0.5" fill="none">
    <path d="M70 58 q15 -8 30 0"/>
    <path d="M128 58 q15 -8 30 0"/>
    <path d="M186 58 q15 -8 30 0"/>
  </g>

  <!-- Title / relationship -->
  <text x="160" y="26" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">+10 dB = 10&#215; the power</text>
  <text x="160" y="144" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">linear dBm scale, logarithmic power</text>
</svg>
