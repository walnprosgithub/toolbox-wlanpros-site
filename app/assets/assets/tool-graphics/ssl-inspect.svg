<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- SSL inspect: a TLS handshake returning a certificate (validity, SAN, chain); lime = the cert fields. Archetype G. -->

  <!-- client (left) -->
  <rect x="18" y="44" width="22" height="30" rx="3" stroke="#E5E5E5" stroke-width="1.5"/>
  <text x="29" y="88" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">client</text>

  <!-- TLS handshake: ClientHello out (neutral), cert back -->
  <g stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="42" y1="52" x2="78" y2="52"/>
    <path d="M72 48 L78 52 L72 56"/>
  </g>
  <text x="60" y="44" fill="#9C9C9C" font-size="8.5" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">hello</text>
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="78" y1="66" x2="42" y2="66"/>
    <path d="M48 62 L42 66 L48 70"/>
  </g>
  <text x="60" y="80" fill="#A2CC3A" font-size="8.5" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">cert</text>

  <!-- server (right of handshake) -->
  <rect x="80" y="44" width="22" height="30" rx="3" stroke="#E5E5E5" stroke-width="1.5"/>
  <text x="91" y="88" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">server</text>

  <!-- returned certificate card -->
  <rect x="150" y="32" width="152" height="100" rx="4" stroke="#A2CC3A" stroke-width="1.5"/>
  <line x1="150" y1="52" x2="302" y2="52" stroke="#9C9C9C" stroke-width="1.25"/>
  <text x="160" y="47" fill="#A2CC3A" font-size="10" font-weight="500" font-family="DM Mono, monospace">x509 certificate</text>
  <g font-family="DM Mono, monospace">
    <text x="160" y="68" fill="#9C9C9C" font-size="9.5" font-weight="500">CN</text>
    <text x="200" y="68" fill="#A2CC3A" font-size="10.5" font-weight="500">wlanpros.com</text>

    <text x="160" y="86" fill="#9C9C9C" font-size="9.5" font-weight="500">SAN</text>
    <text x="200" y="86" fill="#E5E5E5" font-size="10.5" font-weight="500">*.wlanpros</text>

    <text x="160" y="104" fill="#9C9C9C" font-size="9.5" font-weight="500">valid</text>
    <text x="200" y="104" fill="#E5E5E5" font-size="10.5" font-weight="500">to 2027-01</text>

    <text x="160" y="122" fill="#9C9C9C" font-size="9.5" font-weight="500">chain</text>
    <text fill="#E5E5E5" font-size="10.5" font-weight="500" x="200.0" y="122.0" text-anchor="start">R3</text>
  <path d="M216.0 118.6 H224.0 M220.5 115.1 L224.0 118.6 L220.5 122.1" fill="none" stroke="#E5E5E5" stroke-width="1.2075" stroke-linecap="round" stroke-linejoin="round"/>
  <text fill="#E5E5E5" font-size="10.5" font-weight="500" x="227.0" y="122.0" text-anchor="start">ISRG</text>
  </g>
  <g stroke="#3A3A3A" stroke-width="1">
    <line x1="150" y1="74" x2="302" y2="74"/>
    <line x1="150" y1="92" x2="302" y2="92"/>
    <line x1="150" y1="110" x2="302" y2="110"/>
  </g>

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">SSL / TLS inspect</text>
  <!-- Footer -->
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="90.7" y="150.0" text-anchor="start">TLS handshake</text>
  <path d="M168.5 146.5 H176.5 M173.0 143.0 L176.5 146.5 L173.0 150.0" fill="none" stroke="#9C9C9C" stroke-width="1.2650000000000001" stroke-linecap="round" stroke-linejoin="round"/>
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="179.5" y="150.0" text-anchor="start">certificate</text>
</svg>
