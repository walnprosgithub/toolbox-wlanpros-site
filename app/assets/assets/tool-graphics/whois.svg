<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- WHOIS: a domain query returning a registration record; lime = the registration record. Archetype G. -->

  <!-- domain query field (left) -->
  <rect x="18" y="40" width="92" height="26" rx="4" stroke="#E5E5E5" stroke-width="1.5"/>
  <text x="28" y="57" fill="#A2CC3A" font-size="11" font-weight="500" font-family="DM Mono, monospace">wlanpros.com</text>

  <!-- query arrow into the registration record -->
  <g stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="110" y1="53" x2="142" y2="53"/>
    <path d="M136 49 L142 53 L136 57"/>
  </g>

  <!-- registration record card (right), field : value pairs -->
  <rect x="146" y="32" width="156" height="100" rx="4" stroke="#A2CC3A" stroke-width="1.5"/>
  <rect x="146" y="32" width="156" height="100" rx="4" fill="#A2CC3A" fill-opacity="0.08"/>
  <line x1="146" y1="52" x2="302" y2="52" stroke="#9C9C9C" stroke-width="1.25"/>
  <text x="156" y="47" fill="#A2CC3A" font-size="10" font-weight="500" font-family="DM Mono, monospace">registration</text>
  <g font-family="DM Mono, monospace">
    <text x="156" y="68" fill="#9C9C9C" font-size="9.5" font-weight="500">registrar</text>
    <text x="210" y="68" fill="#A2CC3A" font-size="11" font-weight="500">Gandi</text>

    <text x="156" y="88" fill="#9C9C9C" font-size="9.5" font-weight="500">created</text>
    <text x="210" y="88" fill="#E5E5E5" font-size="11" font-weight="500">2009-04</text>

    <text x="156" y="108" fill="#9C9C9C" font-size="9.5" font-weight="500">expires</text>
    <text x="210" y="108" fill="#E5E5E5" font-size="11" font-weight="500">2027-04</text>

    <text x="156" y="124" fill="#9C9C9C" font-size="9.5" font-weight="500">status</text>
    <text x="210" y="124" fill="#E5E5E5" font-size="10" font-weight="500">clientHold</text>
  </g>

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">WHOIS lookup</text>
  <!-- Footer -->
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="88.7" y="150.0" text-anchor="start">domain</text>
  <path d="M128.7 146.5 H136.7 M133.2 143.0 L136.7 146.5 L133.2 150.0" fill="none" stroke="#9C9C9C" stroke-width="1.2650000000000001" stroke-linecap="round" stroke-linejoin="round"/>
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="139.7" y="150.0" text-anchor="start">registration record</text>
</svg>
