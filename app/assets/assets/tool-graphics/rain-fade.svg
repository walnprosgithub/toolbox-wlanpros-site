<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Rain fade (ITU): a link path crossing a rain cell, signal attenuating through it.
       Lime = the rain attenuation. -->

  <!-- Tx dish (left) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="30" y1="72" x2="30" y2="120"/>
    <line x1="22" y1="120" x2="38" y2="120"/>
    <path d="M30 72 A14 14 0 0 1 44 86"/>
    <line x1="30" y1="79" x2="40" y2="84"/>
  </g>
  <!-- Rx dish (right) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="290" y1="72" x2="290" y2="120"/>
    <line x1="282" y1="120" x2="298" y2="120"/>
    <path d="M290 72 A14 14 0 0 0 276 86"/>
    <line x1="290" y1="79" x2="280" y2="84"/>
  </g>

  <!-- Path: full-strength before the cell (neutral), attenuated after (lime, the rain attenuation) -->
  <line x1="44" y1="80" x2="130" y2="80" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round"/>
  <line x1="190" y1="80" x2="276" y2="80" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- inside the cell the path passes through (dashed lime = the attenuating segment) -->
  <line x1="130" y1="80" x2="190" y2="80" stroke="#A2CC3A" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round"/>

  <!-- Rain cell (cloud outline, neutral) over the midpath -->
  <path d="M128 50 a16 16 0 0 1 30 -6 a14 14 0 0 1 26 6 a12 12 0 0 1 -4 24 L132 74 a12 12 0 0 1 -4 -24 Z"
        stroke="#E5E5E5" stroke-width="1.75" fill="none" stroke-linejoin="round"/>
  <!-- rain streaks falling through the path -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="138" y1="78" x2="134" y2="92"/>
    <line x1="152" y1="78" x2="148" y2="92"/>
    <line x1="166" y1="78" x2="162" y2="92"/>
    <line x1="180" y1="78" x2="176" y2="92"/>
  </g>

  <!-- Attenuation marker (lime) on the weakened side -->
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round">
    <line x1="232" y1="80" x2="232" y2="100"/>
    <path d="M229 96 L232 100 L235 96"/>
  </g>
  <text x="232" y="116" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">rain atten.</text>

  <!-- Header -->
  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">rain cell across the link</text>
  <!-- Footer -->
  <text x="160" y="148" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">ITU rain model: dB/km &#215; path</text>
</svg>
