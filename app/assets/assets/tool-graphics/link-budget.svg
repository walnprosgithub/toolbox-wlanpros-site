<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Link Budget. Redrawn to §8.6.2.1 so EVERY metric in the calc is drawn and
       labeled along a link between two AERIAL antennas (the §8.6.2.1 mast + splayed
       rays glyph at both ends):
         Tx power     — the starting signal level at the Tx antenna feed
         + Tx gain    — bump up at the transmit antenna
         - path loss  — the long downward slope across the span
         + Rx gain    — bump up at the receive antenna
         = Rx level   — where the signal arrives
         Rx sensitivity — the dashed floor the radio needs
         fade margin  — the lime gap between Rx level and sensitivity (the answer)
       Signal flows left -> right (source -> destination). Lime = fade margin. -->

  <!-- Header -->
  <text x="160" y="15" fill="#E5E5E5" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">Rx = Tx + gains &#8722; path loss</text>

  <!-- ============================================================= -->
  <!-- Tx aerial antenna (left) -->
  <!-- ============================================================= -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 64 V104"/>            <!-- mast -->
    <path d="M24 104 H36"/>            <!-- base -->
    <path d="M30 64 L22 56"/>          <!-- splayed rays -->
    <path d="M30 64 V52"/>
    <path d="M30 64 L38 56"/>
  </g>
  <text x="30" y="118" fill="#9C9C9C" font-size="9" text-anchor="middle">Tx</text>

  <!-- Rx aerial antenna (right) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M290 64 V104"/>
    <path d="M284 104 H296"/>
    <path d="M290 64 L282 56"/>
    <path d="M290 64 V52"/>
    <path d="M290 64 L298 56"/>
  </g>
  <text x="290" y="118" fill="#9C9C9C" font-size="9" text-anchor="middle">Rx</text>

  <!-- ============================================================= -->
  <!-- Signal-level line across the span: small up-step at Tx (Tx gain), -->
  <!-- long downward slope (path loss), small up-step at Rx (Rx gain),   -->
  <!-- arriving at the Rx level dot.                                     -->
  <!-- ============================================================= -->
  <!-- Tx power start marker -->
  <circle cx="42" cy="52" r="2.5" fill="#E5E5E5"/>
  <text x="58" y="44" fill="#9C9C9C" font-size="9" font-weight="500">Tx power</text>

  <!-- the level profile -->
  <path d="M42 52 L52 44 L268 92 L278 86" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- + Tx gain (the up-step at the transmit antenna) -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <path d="M48 48 L48 40 M45 43 L48 40 L51 43"/>
  </g>
  <text x="48" y="34" fill="#9C9C9C" font-size="8.5" text-anchor="middle">+ Tx gain</text>

  <!-- - path loss (the long slope) -->
  <text x="160" y="62" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">&#8722; path loss (distance)</text>

  <!-- + Rx gain (the up-step at the receive antenna) -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <path d="M272 90 L272 82 M269 85 L272 82 L275 85"/>
  </g>
  <text x="250" y="70" fill="#9C9C9C" font-size="8.5" text-anchor="middle">+ Rx gain</text>

  <!-- Rx level dot (where the signal arrives) -->
  <circle cx="278" cy="86" r="2.5" fill="#A2CC3A"/>
  <text x="228" y="104" fill="#9C9C9C" font-size="9" text-anchor="middle">Rx level</text>

  <!-- ============================================================= -->
  <!-- Rx sensitivity floor (dashed) — the minimum the radio needs -->
  <!-- ============================================================= -->
  <line x1="170" y1="118" x2="298" y2="118" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="4 4"/>
  <text x="200" y="131" fill="#9C9C9C" font-size="9.5" font-weight="500" text-anchor="middle">Rx sensitivity (floor)</text>

  <!-- ============================================================= -->
  <!-- FADE MARGIN (lime) — gap between Rx level (86) and floor (118) -->
  <!-- ============================================================= -->
  <g stroke="#A2CC3A" stroke-width="1.75" stroke-linecap="round">
    <line x1="278" y1="88" x2="278" y2="116"/>
    <path d="M275 92 L278 88 L281 92 M275 112 L278 116 L281 112"/>
  </g>
  <text x="271" y="100" fill="#A2CC3A" font-size="10" font-weight="500" text-anchor="end">fade</text>
  <text x="271" y="112" fill="#A2CC3A" font-size="10" font-weight="500" text-anchor="end">margin</text>

  <!-- Footer: the answer -->
  <text x="160" y="152" fill="#E5E5E5" font-size="10.5" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">fade margin = Rx level &#8722; Rx sensitivity</text>
</svg>
