<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- AP placement, redrawn to §8.6.2.1 (BF6-5: "the humpy thing no one understood").
       Two ceiling-mounted Access Points (rounded body + two dipoles per Rule 3),
       each radiating a primary coverage circle drawn as a dome from the ceiling.
       The APs are spaced close enough (centers 105 / 215, radius 86) that the two
       domes genuinely intersect, forming a real lens-shaped overlap region around
       the floor. That lens is the only filled region (single sanctioned lime wash,
       §8.6.2 / Rule 1) and carries the word "overlap" inside it. No percentages
       (Keith: percent overlap is meaningless). No humpy/leaf shape. Every mark is on
       the §8.20.7 light-swap allow-list so the runtime swap recolors it for light. -->

  <!-- Title -->
  <text x="160" y="14" fill="#E5E5E5" font-size="11.5" font-weight="500" text-anchor="middle">Space APs so their coverage cells overlap</text>

  <!-- Ceiling line (where the APs mount) -->
  <line x1="14" y1="30" x2="306" y2="30" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="4 4"/>
  <text x="306" y="27" fill="#9C9C9C" font-size="8" text-anchor="end">ceiling</text>

  <!-- ============================================================= -->
  <!-- Generic ceiling-mounted Access Point: rounded body + two dipoles -->
  <!-- ============================================================= -->
  <defs>
    <g id="ceil-ap">
      <!-- body flush under the ceiling -->
      <rect x="-15" y="0" width="30" height="11" rx="3" stroke="#E5E5E5" stroke-width="1.75"/>
      <!-- two short dipoles hanging down (a ceiling AP radiates downward) -->
      <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round">
        <line x1="-7" y1="11" x2="-7" y2="18"/>
        <line x1="7"  y1="11" x2="7"  y2="18"/>
      </g>
      <circle cx="-7" cy="19" r="1.4" fill="#E5E5E5"/>
      <circle cx="7"  cy="19" r="1.4" fill="#E5E5E5"/>
    </g>
  </defs>

  <use href="#ceil-ap" transform="translate(105,30)"/>
  <use href="#ceil-ap" transform="translate(215,30)"/>
  <text x="80" y="35" fill="#9C9C9C" font-size="9" text-anchor="end">AP 1</text>
  <text x="240" y="35" fill="#9C9C9C" font-size="9" text-anchor="start">AP 2</text>

  <!-- floor line -->
  <line x1="14" y1="116" x2="306" y2="116" stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round"/>
  <text x="14" y="127" fill="#9C9C9C" font-size="8">floor</text>

  <!-- ============================================================= -->
  <!-- OVERLAP REGION first (under the dome outlines so the strokes sit -->
  <!-- on top). Lens = intersection of the two coverage circles.       -->
  <!-- Bottom edge on the floor from x=129 to x=191; tip at (160,96.1). -->
  <!-- Left edge = arc of AP 2's circle; right edge = arc of AP 1's.    -->
  <!-- Single sanctioned lime wash, the lone permitted fill (§8.6.2).   -->
  <!-- ============================================================= -->
  <path d="M129 116
           A86 86 0 0 1 160 96.11
           A86 86 0 0 1 191 116 Z"
        fill="#A2CC3A" fill-opacity="0.08"/>

  <!-- ============================================================= -->
  <!-- Coverage circles, drawn as domes from the ceiling. Centers at    -->
  <!-- (105,30) and (215,30), radius 86 -> floor. They cross at         -->
  <!-- (160,96.11), so the domes visibly intersect.                     -->
  <!-- ============================================================= -->
  <!-- AP 1 coverage dome (left), spans floor 19 -> 191 -->
  <path d="M19 116 A86 86 0 0 1 191 116" stroke="#E5E5E5" stroke-width="1.75" fill="none"/>
  <!-- AP 2 coverage dome (right), spans floor 129 -> 301 -->
  <path d="M129 116 A86 86 0 0 1 301 116" stroke="#E5E5E5" stroke-width="1.75" fill="none"/>

  <!-- coverage-cell labels, clear of the overlap -->
  <text x="58"  y="98" fill="#9C9C9C" font-size="9" text-anchor="middle">coverage</text>
  <text x="262" y="98" fill="#9C9C9C" font-size="9" text-anchor="middle">coverage</text>

  <!-- the word sits inside the lens (the intersection region) -->
  <text x="160" y="112" fill="#A2CC3A" font-size="9.5" font-weight="500" text-anchor="middle">overlap</text>

  <!-- ============================================================= -->
  <!-- AP spacing dimension between the two AP centers -->
  <!-- ============================================================= -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="105" y1="138" x2="215" y2="138"/>
    <path d="M105 134 L105 142 M215 134 L215 142"/>
    <path d="M111 135 L105 138 L111 141 M209 135 L215 138 L209 141"/>
  </g>
  <text x="160" y="153" fill="#9C9C9C" font-size="9.5" font-weight="500" text-anchor="middle">AP spacing</text>
</svg>
