<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Final point / destination (type A spatial): a start pin, a bearing vector (angle from north)
       carrying a distance, arriving at the computed destination pin. Lime = the vector + the endpoint. -->

  <!-- Header. Rightwards arrow (was &#8594;) is a vector <path>: DM Mono carries no
       arrow, so a font arrow tofu'd. Header is split into two start-anchored
       monospace runs with the arrow in the fixed gap (GL-003 8.6.1). -->
  <text x="64" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">bearing + distance</text>
  <path d="M208 18 H221 M217.5 14 L221 18 L217.5 22" fill="none" stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="227" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">point</text>

  <!-- Curved graticule grid, neutral scaffold -->
  <g stroke="#9C9C9C" stroke-width="1" fill="none" opacity="0.5">
    <path d="M30 74 Q160 58 290 74"/>
    <path d="M30 102 Q160 86 290 102"/>
    <path d="M30 130 Q160 114 290 130"/>
    <path d="M85 48 Q75 92 85 140"/>
    <path d="M160 44 Q150 92 160 142"/>
    <path d="M235 48 Q225 92 235 140"/>
  </g>

  <!-- Start pin (left) -->
  <g>
    <path d="M62 110 C62 100 76 100 76 110 C76 118 69 126 69 126 C69 126 62 118 62 110 Z"
          stroke="#E5E5E5" stroke-width="1.75" fill="none" stroke-linejoin="round"/>
    <circle cx="69" cy="110" r="3" fill="#E5E5E5"/>
  </g>
  <text x="69" y="142" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">start</text>

  <!-- North reference at start -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <line x1="69" y1="108" x2="69" y2="62"/>
    <path d="M65 67 L69 62 L73 67"/>
  </g>
  <text x="69" y="56" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">N</text>

  <!-- Bearing angle arc from north (lime) -->
  <path d="M69 86 A22 22 0 0 1 88 98" stroke="#A2CC3A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- theta as a vector <path> (was &#952; in DM Mono <text>, which lacks Greek so
       it tofu'd): an oval with a horizontal crossbar (GL-003 8.6.1). -->
  <g fill="none" stroke="#A2CC3A" stroke-width="1.4" stroke-linecap="round">
    <ellipse cx="98" cy="78" rx="3.6" ry="5.2"/>
    <line x1="94.8" y1="78" x2="101.2" y2="78"/>
  </g>

  <!-- Bearing/distance vector arrow (lime) from start to destination -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="74" y1="108" x2="236" y2="80"/>
    <path d="M228 75 L236 80 L230 87"/>
  </g>
  <!-- distance label along the vector -->
  <text x="156" y="86" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">d (km)</text>

  <!-- Computed destination pin (right, lime = the result) -->
  <g>
    <path d="M236 64 C236 53 252 53 252 64 C252 73 244 82 244 82 C244 82 236 73 236 64 Z"
          stroke="#A2CC3A" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <circle cx="244" cy="64" r="3.5" fill="#A2CC3A"/>
  </g>
  <text x="244" y="100" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">destination</text>
</svg>
