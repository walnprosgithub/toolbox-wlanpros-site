<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- 208V Three-Phase (Wye): three hots 120 deg apart. Line-to-neutral = 120V;
       line-to-line = sqrt(3) x 120 ~ 208V (the measured span, lime). Original WLAN Pros schematic.
       Lime bracket is anchored at x=100, the instant L2 crosses zero while L1 sits at +103.9V (y=50.56)
       and L3 at -103.9V (y=109.44). The line-to-line difference there is +103.9 - (-103.9) = 207.8V = 120 x sqrt(3),
       the true sqrt(3) line-to-line value. (At an L1 peak the L-L difference would only be 1.5x amplitude = 180V,
       not 208 — so the bracket is placed where physics puts the sqrt(3) instant, the exact point the page teaches.) -->


