<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Wi-Fi band spectrum: 2.4 / 5 / 6 GHz allocations on a frequency axis; lime = a highlighted band. Archetype D. -->

  <!-- frequency axis -->
  <line x1="22" y1="104" x2="288" y2="104" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <path d="M282 100 l6 4 l-6 4" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- band allocation segments (proportional, schematic) -->
  <!-- 2.4 GHz (narrow) -->
  <rect x="34" y="70" width="40" height="26" rx="2" stroke="#E5E5E5" stroke-width="1.5"/>
  <text x="54" y="87" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">2.4</text>
  <!-- 5 GHz (wider) -->
  <rect x="98" y="70" width="86" height="26" rx="2" stroke="#E5E5E5" stroke-width="1.5"/>
  <text x="141" y="87" fill="#E5E5E5" font-size="11" font-weight="500" text-anchor="middle">5</text>
  <!-- 6 GHz (widest, lime = highlighted allocation) -->
  <rect x="200" y="70" width="76" height="26" rx="2" fill="#A2CC3A" fill-opacity="0.08" stroke="#A2CC3A" stroke-width="1.5"/>
  <text x="238" y="87" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle">6</text>

  <!-- band tick marks down to axis -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="54"  y1="100" x2="54"  y2="108"/>
    <line x1="141" y1="100" x2="141" y2="108"/>
    <line x1="238" y1="100" x2="238" y2="108"/>
  </g>

  <!-- frequency labels (below, DM Mono) -->
  <g fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">
    <text x="54"  y="124">2.4 GHz</text>
    <text x="141" y="124">5 GHz</text>
    <text x="238" y="124">6 GHz</text>
  </g>

  <!-- Header -->
  <text x="160" y="24" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">Wi-Fi band spectrum allocation</text>
  <!-- Footer -->
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="62.9" y="146.0" text-anchor="start">increasing frequency</text>
  <path d="M168.8 142.5 H176.8 M173.3 139.0 L176.8 142.5 L173.3 146.0" fill="none" stroke="#9C9C9C" stroke-width="1.2650000000000001" stroke-linecap="round" stroke-linejoin="round"/>
  <text fill="#9C9C9C" font-size="11" font-weight="500" x="179.8" y="146.0" text-anchor="start">wider spectrum</text>
</svg>
