<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" width="1120" height="760" font-family="IBM Plex Sans, sans-serif" fill="none">
  <!-- =====================================================================
       NEMA CONNECTOR FACES, front-view receptacle face plate schematic.
       WLAN Pros Toolbox "NEMA Connectors" reference page. Original schematic
       built from NEMA WD-6 standard blade/slot geometry (verified in
       RESEARCH-BRIEF.md, Topic 4). NOT derived from any cheat-sheet layout.

       Two-layer build: HTML/SVG face tiles + connector/leader geometry.
       Palette per GL-003 §8.20.7 allow-list ONLY:
         scaffold  #E5E5E5  (face ring, slot strokes, type label)
         muted     #9C9C9C  (sub-labels, footnotes, decode key)
         lime      #A1CC3A  (ONE highlight: the 14-50 split-phase callout +
                             the L21 three-phase wye callout, the two faces
                             a tech most often misidentifies)
       Fonts: IBM Plex Sans for words; DM Mono for type codes + V/A specs.

       GEOMETRY KEY (front view of the RECEPTACLE face = what is on the wall):
         5-series : neutral slot (longer/left) + hot slot + U-ground.  125V 1Ø
         6-series : two hot slots, NO neutral + U-ground.              250V 1Ø
         14-series: 2 hots + neutral + U-ground (4-wire).  125/250V 1Ø SPLIT
         L-series : curved/arc locking slots around a center.  twist-lock
       ===================================================================== -->

  <!-- ===== TITLE BLOCK ===== -->
  <text x="40" y="44" fill="#E5E5E5" font-size="26" font-weight="700">NEMA Connector Faces</text>
  <text x="40" y="68" fill="#9C9C9C" font-size="14" font-weight="400">Front view of the receptacle: identify the connector by its blade &amp; slot pattern</text>

  <!-- decode key (top-right) -->
  <g font-family="DM Mono, monospace">
    <text x="1080" y="40" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="end">[L] CLASS - AMPS  P|R</text>
    <text x="1080" y="58" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="end" font-family="IBM Plex Sans, sans-serif">L = locking (twist) &#183; class = volt/pole code &#183; amps = current</text>
  </g>

  <!-- ===== SHARED FACE SYMBOLS =====
       A face = round bezel (r=44) centered at the tile origin. Slots and the
       U-ground are drawn relative to that center. markerUnits not needed; no
       arrowheads, leaders are plain lines. -->
  <defs>
    <!-- U-shaped (D) ground contact, drawn at center, opening up -->
    <path id="uground" d="M -7 6 L -7 -2 A 7 7 0 0 1 7 -2 L 7 6"
          stroke="#E5E5E5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- TWIST-LOCK BLADE SLOT, a bold, solid, kidney/comma-shaped locking
         contact slot, like a real NEMA twist-lock face. Drawn at the
         12-o'clock position (top of the face) as a filled curved slot with
         visible width: an outer arc (r=27) and an inner arc (r=18) joined at
         both ends by rounded caps, so the slot reads as a chunky comma, not a
         thin line. Instanced and rotated to N positions around the hub; the
         COUNT is the identifier, so each slot must read clearly at display
         size. Origin = face center. -->
    <path id="twistblade"
          d="M -9.0 -25.5
             A 27 27 0 0 1 11.5 -24.5
             L 7.7 -16.4
             A 18 18 0 0 0 -6.0 -17.0
             Z"
          fill="#E5E5E5" stroke="#E5E5E5" stroke-width="1.4" stroke-linejoin="round"/>
  </defs>

  <!-- =====================================================================
       ROW 1, STRAIGHT BLADE  5-series & 6-series (15/20A)
       ===================================================================== -->

  <!-- ---------- TILE: 5-15R ---------- -->
  <g transform="translate(120,200)">
    <circle cx="0" cy="0" r="46" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- neutral slot: left, LONGER (the wider/taller blade) -->
    <rect x="-22" y="-19" width="6" height="22" rx="2" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- hot slot: right, shorter -->
    <rect x="16" y="-15" width="6" height="18" rx="2" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- U-ground below center -->
    <use href="#uground" transform="translate(0,16)"/>
  </g>
  <text x="120" y="278" fill="#E5E5E5" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">5-15</text>
  <text x="120" y="297" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">125V &#183; 15A &#183; 1&#216;</text>
  <text x="120" y="313" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="middle">household plug</text>

  <!-- ---------- TILE: 5-20R ---------- -->
  <g transform="translate(330,200)">
    <circle cx="0" cy="0" r="46" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- neutral slot: T-SLOT (vertical + horizontal foot), the 20A giveaway -->
    <path d="M -19 -19 L -19 3 M -19 3 L -29 3" stroke="#E5E5E5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- hot slot: right, vertical -->
    <rect x="16" y="-15" width="6" height="18" rx="2" stroke="#E5E5E5" stroke-width="2.5"/>
    <use href="#uground" transform="translate(0,16)"/>
  </g>
  <text x="330" y="278" fill="#E5E5E5" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">5-20</text>
  <text x="330" y="297" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">125V &#183; 20A &#183; 1&#216;</text>
  <text x="330" y="313" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="middle">T-slot neutral</text>

  <!-- ---------- TILE: 6-15R ---------- -->
  <g transform="translate(540,200)">
    <circle cx="0" cy="0" r="46" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- two HOT slots, both VERTICAL, side-by-side at the SAME level, no
         neutral (6-series mark; mirrors 5-15 geometry but both slots equal) -->
    <rect x="-22" y="-17" width="6" height="20" rx="2" stroke="#E5E5E5" stroke-width="2.5"/>
    <rect x="16"  y="-17" width="6" height="20" rx="2" stroke="#E5E5E5" stroke-width="2.5"/>
    <use href="#uground" transform="translate(0,16)"/>
  </g>
  <text x="540" y="278" fill="#E5E5E5" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">6-15</text>
  <text x="540" y="297" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">250V &#183; 15A &#183; 1&#216;</text>
  <text x="540" y="313" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="middle">two hots, no neutral</text>

  <!-- ---------- TILE: 6-20R ---------- -->
  <g transform="translate(750,200)">
    <circle cx="0" cy="0" r="46" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- one HORIZONTAL hot + one VERTICAL hot (perpendicular = 6-20 mark) -->
    <rect x="-25" y="-3" width="20" height="6" rx="2" stroke="#E5E5E5" stroke-width="2.5"/>
    <rect x="13" y="-13" width="6" height="20" rx="2" stroke="#E5E5E5" stroke-width="2.5"/>
    <use href="#uground" transform="translate(0,16)"/>
  </g>
  <text x="750" y="278" fill="#E5E5E5" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">6-20</text>
  <text x="750" y="297" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">250V &#183; 20A &#183; 1&#216;</text>
  <!-- "perpendicular" up-tack as a vector <path> (was &#8869; U+22A5, which no
       bundled font carries -> guaranteed tofu); GL-003 8.6.1. -->
  <text x="717" y="313" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="start">hot blades</text>
  <path d="M774 305.5 V313 M769.5 313 H778.5" fill="none" stroke="#9C9C9C" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ---------- TILE: 6-50R ---------- -->
  <g transform="translate(960,200)">
    <circle cx="0" cy="0" r="46" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- 6-50R: two STRAIGHT vertical parallel hot blades + ground at bottom.
         Heavy 50A. NOT angled (angled = 14-50/10-50 pattern). -->
    <rect x="-22" y="-18" width="7" height="22" rx="2" stroke="#E5E5E5" stroke-width="2.5"/>
    <rect x="15"  y="-18" width="7" height="22" rx="2" stroke="#E5E5E5" stroke-width="2.5"/>
    <use href="#uground" transform="translate(0,18)"/>
  </g>
  <text x="960" y="278" fill="#E5E5E5" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">6-50</text>
  <text x="960" y="297" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">250V &#183; 50A &#183; 1&#216;</text>
  <text x="960" y="313" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="middle">welder / heavy</text>

  <!-- row divider -->
  <line x1="40" y1="340" x2="1080" y2="340" stroke="#3A3A3A" stroke-width="1"/>
  <text x="40" y="364" fill="#9C9C9C" font-size="12" font-weight="500" font-family="DM Mono, monospace">14-SERIES: 4-WIRE SPLIT-PHASE (2 hots + neutral + ground)</text>

  <!-- =====================================================================
       ROW 2, 14-series (4-wire split-phase) + start of TWIST-LOCK
       ===================================================================== -->

  <!-- ---------- TILE: 14-30R ---------- -->
  <g transform="translate(120,440)">
    <circle cx="0" cy="0" r="46" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- two hots (angled outward at top) + neutral (L-slot at bottom) + ground (U top) -->
    <!-- hot 1 (upper-left, angled) -->
    <rect x="-26" y="-22" width="6" height="17" rx="2" stroke="#E5E5E5" stroke-width="2.5" transform="rotate(-30 -23 -13)"/>
    <!-- hot 2 (upper-right, angled) -->
    <rect x="20" y="-22" width="6" height="17" rx="2" stroke="#E5E5E5" stroke-width="2.5" transform="rotate(30 23 -13)"/>
    <!-- neutral: L-shaped slot at bottom -->
    <path d="M -8 20 L 8 20 L 8 6" stroke="#E5E5E5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- ground: U at top center -->
    <use href="#uground" transform="translate(0,-8) rotate(180)"/>
  </g>
  <text x="120" y="518" fill="#E5E5E5" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">14-30</text>
  <text x="120" y="537" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">125/250V &#183; 30A</text>
  <text x="120" y="553" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="middle">dryer</text>

  <!-- ---------- TILE: 14-50R  (LIME hero #1, the misidentified one) ---------- -->
  <g transform="translate(330,440)">
    <circle cx="0" cy="0" r="46" stroke="#A1CC3A" stroke-width="2.5"/>
    <!-- two hots angled + neutral L-slot + U-ground -->
    <rect x="-26" y="-22" width="6" height="17" rx="2" stroke="#E5E5E5" stroke-width="2.5" transform="rotate(-30 -23 -13)"/>
    <rect x="20" y="-22" width="6" height="17" rx="2" stroke="#E5E5E5" stroke-width="2.5" transform="rotate(30 23 -13)"/>
    <path d="M -8 20 L 8 20 L 8 6" stroke="#E5E5E5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <use href="#uground" transform="translate(0,-8) rotate(180)"/>
  </g>
  <text x="330" y="518" fill="#A1CC3A" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">14-50</text>
  <text x="330" y="537" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">125/250V &#183; 50A</text>
  <text x="330" y="553" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="middle">range / EV charger</text>

  <!-- ---------- TILE: L5-30R ---------- -->
  <g transform="translate(540,440)">
    <circle cx="0" cy="0" r="46" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- L5-30 = 3 hooked locking blades, 120° apart: hot + neutral + ground. 125V -->
    <use href="#twistblade"/>
    <use href="#twistblade" transform="rotate(120)"/>
    <use href="#twistblade" transform="rotate(240)"/>
  </g>
  <text x="540" y="518" fill="#E5E5E5" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">L5-30</text>
  <text x="540" y="537" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">125V &#183; 30A &#183; 1&#216;</text>
  <text x="540" y="553" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="middle">twist-lock</text>

  <!-- ---------- TILE: L6-30R ---------- -->
  <g transform="translate(750,440)">
    <circle cx="0" cy="0" r="46" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- L6-30 = 3 hooked locking blades, 120° apart: 2 hots + ground, NO neutral. 250V -->
    <use href="#twistblade"/>
    <use href="#twistblade" transform="rotate(120)"/>
    <use href="#twistblade" transform="rotate(240)"/>
  </g>
  <text x="750" y="518" fill="#E5E5E5" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">L6-30</text>
  <text x="750" y="537" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">250V &#183; 30A &#183; 1&#216;</text>
  <text x="750" y="553" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="middle">twist-lock, 2 hots</text>

  <!-- ---------- TILE: L14-30R ---------- -->
  <g transform="translate(960,440)">
    <circle cx="0" cy="0" r="46" stroke="#E5E5E5" stroke-width="2.5"/>
    <!-- L14-30 = 4 hooked locking blades, 90° apart: 2 hots + neutral + ground. 125/250V split -->
    <use href="#twistblade"/>
    <use href="#twistblade" transform="rotate(90)"/>
    <use href="#twistblade" transform="rotate(180)"/>
    <use href="#twistblade" transform="rotate(270)"/>
  </g>
  <text x="960" y="518" fill="#E5E5E5" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">L14-30</text>
  <text x="960" y="537" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">125/250V &#183; 30A</text>
  <text x="960" y="553" fill="#9C9C9C" font-size="11" font-weight="400" text-anchor="middle">4-wire split</text>

  <!-- row divider -->
  <line x1="40" y1="582" x2="1080" y2="582" stroke="#3A3A3A" stroke-width="1"/>

  <!-- =====================================================================
       ROW 3, the 3-PHASE twist-lock + the accuracy callouts
       ===================================================================== -->

  <!-- ---------- TILE: L21-30R  (LIME hero #2, the 3-phase wye one) ---------- -->
  <g transform="translate(120,660)">
    <circle cx="0" cy="0" r="46" stroke="#A1CC3A" stroke-width="2.5"/>
    <!-- L21-30 = 5 hooked locking blades, 72° apart: 3 hots + neutral + ground. 120/208V 3Ø wye -->
    <use href="#twistblade"/>
    <use href="#twistblade" transform="rotate(72)"/>
    <use href="#twistblade" transform="rotate(144)"/>
    <use href="#twistblade" transform="rotate(216)"/>
    <use href="#twistblade" transform="rotate(288)"/>
  </g>
  <text x="120" y="738" fill="#A1CC3A" font-size="17" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">L21-30</text>
  <text x="120" y="757" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">120/208V &#183; 30A</text>

  <!-- ---------- ACCURACY CALLOUT PANEL (right of L21 tile) ---------- -->
  <g transform="translate(250,612)">
    <!-- panel: the two faces a tech most often misreads -->
    <rect x="0" y="0" width="830" height="120" rx="10" stroke="#3A3A3A" stroke-width="1.25"/>

    <!-- lime swatch marker -->
    <rect x="22" y="22" width="14" height="14" rx="3" stroke="#A1CC3A" stroke-width="2.5"/>
    <text x="48" y="34" fill="#A1CC3A" font-size="13" font-weight="600">Read these two carefully</text>

    <!-- 14-50 note -->
    <text x="22" y="66" fill="#E5E5E5" font-size="13" font-weight="700" font-family="DM Mono, monospace">14-50</text>
    <text x="104" y="66" fill="#9C9C9C" font-size="13" font-weight="400">is single-phase <tspan fill="#E5E5E5" font-weight="500">SPLIT</tspan>: two hots 180&#176; apart + neutral + ground. NOT three-phase.</text>

    <!-- L21 note -->
    <text x="22" y="98" fill="#E5E5E5" font-size="13" font-weight="700" font-family="DM Mono, monospace">L21</text>
    <text x="104" y="98" fill="#9C9C9C" font-size="13" font-weight="400">is true <tspan fill="#E5E5E5" font-weight="500">three-phase wye</tspan>: three hots 120&#176; apart + neutral + ground (4P/5W, 120/208V).</text>
  </g>

  <!-- legend strip (bottom-left, under L21) -->
  <text x="40" y="752" fill="#9C9C9C" font-size="0" font-weight="400"> </text>
</svg>
