<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- RP-SMA vs SMA: the identifying feature is the CENTER-CONTACT GENDER SWAP.
       Both shown as MALE connectors (same outer coupling nut / thread gender).
       Standard SMA male = center PIN. RP-SMA male = center SOCKET.
       Lime marks the one thing that tells them apart: the center contact. -->

  <!-- ================= LEFT: standard SMA male ================= -->
  <text x="100" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">SMA male</text>

  <!-- coupling nut (hex) + body, scaffold neutral -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <!-- hex coupling nut outline -->
    <path d="M58 70 L70 56 L106 56 L118 70 L106 84 L70 84 Z"/>
    <!-- thread barrel behind nut -->
    <path d="M118 60 L150 60 L150 80 L118 80"/>
    <!-- internal thread ticks (female-thread coupling = standard MALE body) -->
  </g>
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round">
    <line x1="124" y1="62" x2="124" y2="78"/>
    <line x1="132" y1="62" x2="132" y2="78"/>
    <line x1="140" y1="62" x2="140" y2="78"/>
  </g>

  <!-- center contact = PIN (lime, the identifying feature) -->
  <line x1="84" y1="70" x2="84" y2="120" stroke="#A2CC3A" stroke-width="3.5" stroke-linecap="round"/>
  <text x="84" y="140" fill="#A2CC3A" font-size="13" font-weight="600" text-anchor="middle">center PIN</text>

  <!-- ================= RIGHT: RP-SMA male ================= -->
  <text x="300" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">RP-SMA male</text>

  <!-- SAME coupling nut + body as the standard male (thread gender unchanged) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M258 70 L270 56 L306 56 L318 70 L306 84 L270 84 Z"/>
    <path d="M318 60 L350 60 L350 80 L318 80"/>
  </g>
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round">
    <line x1="324" y1="62" x2="324" y2="78"/>
    <line x1="332" y1="62" x2="332" y2="78"/>
    <line x1="340" y1="62" x2="340" y2="78"/>
  </g>

  <!-- center contact = SOCKET / hole (lime ring, the identifying feature) -->
  <circle cx="284" cy="70" r="9" stroke="#A2CC3A" stroke-width="3" fill="none"/>
  <circle cx="284" cy="70" r="2.5" fill="#A2CC3A"/>
  <text x="284" y="140" fill="#A2CC3A" font-size="13" font-weight="600" text-anchor="middle">center SOCKET</text>

  <!-- ================= the rule strip ================= -->
  <line x1="200" y1="44" x2="200" y2="150" stroke="#9C9C9C" stroke-width="1" stroke-dasharray="3 4"/>

  <text x="200" y="176" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">Reverse polarity swaps the GENDER of the center contact.</text>
  <text x="200" y="196" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">The outer threads stay the same. They will mate mechanically</text>
  <text x="200" y="212" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">but the center contacts will not connect electrically.</text>
</svg>
