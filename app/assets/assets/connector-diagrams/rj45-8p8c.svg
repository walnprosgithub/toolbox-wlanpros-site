<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- RJ45 - 8P8C. Front mating-face view, latch on top. 8-position body
       (widest in the family); all 8 gold contacts loaded. Lime marks the
       identifying Ethernet feature: the wide 8P8C body + latch. -->

  <text x="200" y="22" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle">RJ45 - 8P8C</text>

  <!-- latch / spring tab (LIME = identifying feature of the Ethernet plug) -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M176 52 L176 40 L224 40 L224 52"/>
  </g>

  <!-- 8-position body housing (widest: x 116 to 284) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M116 52 L284 52 L284 138 L116 138 Z"/>
  </g>
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
    <path d="M160 138 L160 152 L240 152 L240 138"/>
  </g>

  <!-- 8 position slot dividers (centers 130,150,...,270) -->
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round">
    <line x1="140" y1="60" x2="140" y2="120"/>
    <line x1="160" y1="60" x2="160" y2="120"/>
    <line x1="180" y1="60" x2="180" y2="120"/>
    <line x1="200" y1="60" x2="200" y2="120"/>
    <line x1="220" y1="60" x2="220" y2="120"/>
    <line x1="240" y1="60" x2="240" y2="120"/>
    <line x1="260" y1="60" x2="260" y2="120"/>
  </g>

  <!-- all 8 gold contacts loaded (centers 130,150,170,190,210,230,250,270) -->
  <g stroke="#C9A227" stroke-width="3.5" stroke-linecap="round">
    <line x1="130" y1="64" x2="130" y2="116"/>
    <line x1="150" y1="64" x2="150" y2="116"/>
    <line x1="170" y1="64" x2="170" y2="116"/>
    <line x1="190" y1="64" x2="190" y2="116"/>
    <line x1="210" y1="64" x2="210" y2="116"/>
    <line x1="230" y1="64" x2="230" y2="116"/>
    <line x1="250" y1="64" x2="250" y2="116"/>
    <line x1="270" y1="64" x2="270" y2="116"/>
  </g>

  <line x1="248" y1="46" x2="280" y2="46" stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round"/>
  <text x="300" y="44" fill="#A2CC3A" font-size="12" font-weight="600" text-anchor="start">latch</text>
  <text x="200" y="176" fill="#A2CC3A" font-size="13" font-weight="600" text-anchor="middle">8 contacts loaded (8 of 8)</text>

  <text x="200" y="194" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">Ethernet over twisted pair. "RJ45" is the common name for 8P8C.</text>
</svg>
