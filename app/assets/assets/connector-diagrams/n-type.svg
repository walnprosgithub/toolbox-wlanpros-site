<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- N-Type: rugged outdoor threaded connector. Large 5/8-24 threaded coupling, weatherproof body.
       Silhouette emphasizes the big knurled coupling nut + sealed body. Lime marks the
       threaded coupling (the identifying feature / the outdoor weatherproof workhorse). -->

  <text x="200" y="24" fill="#E5E5E5" font-size="14" font-weight="600" text-anchor="middle">N-Type (male)</text>

  <!-- ===== side-profile silhouette ===== -->
  <!-- cable entry (right) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <!-- strain-relief / cable boot -->
    <path d="M340 78 L364 84 L364 112 L340 118"/>
    <!-- rear body barrel -->
    <path d="M280 70 L340 78 L340 118 L280 126 Z"/>
    <!-- knurled grip body (mid) -->
    <path d="M236 66 L280 70 L280 126 L236 130 Z"/>
  </g>
  <!-- knurl grip ticks (texture cue) -->
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round">
    <line x1="246" y1="70" x2="246" y2="126"/>
    <line x1="256" y1="69" x2="256" y2="127"/>
    <line x1="266" y1="69" x2="266" y2="127"/>
  </g>

  <!-- ===== threaded coupling nut (LIME = identifying feature: large weatherproof thread) ===== -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 56 L236 66 L236 130 L150 140 Z"/>
  </g>
  <!-- thread ticks inside coupling -->
  <g stroke="#A2CC3A" stroke-width="1.4" stroke-linecap="round">
    <line x1="166" y1="62" x2="166" y2="135"/>
    <line x1="182" y1="60" x2="182" y2="137"/>
    <line x1="198" y1="60" x2="198" y2="138"/>
    <line x1="214" y1="61" x2="214" y2="136"/>
  </g>

  <!-- front mating face + center pin -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 64 L150 56 L150 140 L120 132 Z"/>
  </g>
  <!-- center pin -->
  <line x1="112" y1="98" x2="135" y2="98" stroke="#E5E5E5" stroke-width="3" stroke-linecap="round"/>

  <!-- ===== labels ===== -->
  <!-- pointer to coupling -->
  <line x1="193" y1="146" x2="193" y2="166" stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round"/>
  <text x="193" y="182" fill="#A2CC3A" font-size="13" font-weight="600" text-anchor="middle">large 5/8-24 weatherproof thread</text>

  <text x="200" y="44" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">Rugged, low loss. The default for outdoor APs &amp; point-to-point bridges.</text>
</svg>
