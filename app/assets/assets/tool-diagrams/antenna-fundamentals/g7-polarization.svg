<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" role="img" aria-label="Polarization: matched vertical-to-vertical antennas pass full signal; a 90-degree mismatch (vertical to horizontal) is the worst case with crossed fields; and a wall-clock-mounted AP tips the donut so its strongest energy fires into the floors above and below with a roughly 6 dB cross-polarization penalty">
<defs >
  </defs><text x="40" y="34" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="18" fill="#E5E5E5" text-anchor="start" font-weight="700" letter-spacing="0" dominant-baseline="middle">Match the polarization, or pay</text><text x="40" y="56" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#9C9C9C" text-anchor="start" font-weight="400" letter-spacing="0" dominant-baseline="middle">E-field orientation is set by the antenna's axis</text><rect x="60" y="92" width="330" height="150" rx="8" stroke="#9C9C9C" stroke-width="1.2" fill="none"/><text x="225" y="110" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="13" fill="#E5E5E5" text-anchor="middle" font-weight="600" letter-spacing="0" dominant-baseline="middle">Polarization match</text><line x1="130" y1="177" x2="130" y2="123" stroke="#E5E5E5" stroke-width="3" stroke-linecap="round" opacity="1"/><circle cx="130" cy="150" r="3" stroke="#E5E5E5" stroke-width="2" fill="#E5E5E5" opacity="1"/><line x1="146" y1="177" x2="146" y2="123" stroke="#A2CC3A" stroke-width="2"/><line x1="320" y1="177" x2="320" y2="123" stroke="#E5E5E5" stroke-width="3" stroke-linecap="round" opacity="1"/><circle cx="320" cy="150" r="3" stroke="#E5E5E5" stroke-width="2" fill="#E5E5E5" opacity="1"/><line x1="336" y1="177" x2="336" y2="123" stroke="#A2CC3A" stroke-width="2"/><path d="M154 150 L154 150 L157.55 155.29 L161.1 158.56 L164.65 158.56 L168.2 155.29 L171.75 150 L175.3 144.71 L178.85 141.44 L182.4 141.44 L185.95 144.71 L189.5 150 L193.05 155.29 L196.6 158.56 L200.15 158.56 L203.7 155.29 L207.25 150 L210.8 144.71 L214.35 141.44 L217.9 141.44 L221.45 144.71 L225 150 L228.55 155.29 L232.1 158.56 L235.65 158.56 L239.2 155.29 L242.75 150 L246.3 144.71 L249.85 141.44 L253.4 141.44 L256.95 144.71 L260.5 150 L264.05 155.29 L267.6 158.56 L271.15 158.56 L274.7 155.29 L278.25 150 L281.8 144.71 L285.35 141.44 L288.9 141.44 L292.45 144.71 L296 150" stroke="#A2CC3A" stroke-width="1.6" fill="none" opacity="0.85"/><text x="130" y="206" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#9C9C9C" text-anchor="middle" font-weight="400" letter-spacing="0" dominant-baseline="middle">Tx · vertical</text><text x="320" y="206" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#9C9C9C" text-anchor="middle" font-weight="400" letter-spacing="0" dominant-baseline="middle">Rx · vertical</text><text x="225" y="226" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#A2CC3A" text-anchor="middle" font-weight="600" letter-spacing="0" dominant-baseline="middle">fields aligned → full signal</text><rect x="430" y="92" width="330" height="150" rx="8" stroke="#F26E6E" stroke-width="1.2" fill="none" stroke-dasharray="6 4"/><text x="595" y="110" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="13" fill="#F26E6E" text-anchor="middle" font-weight="600" letter-spacing="0" dominant-baseline="middle">90° mismatch — worst case</text><line x1="490" y1="177" x2="490" y2="123" stroke="#E5E5E5" stroke-width="3" stroke-linecap="round" opacity="1"/><circle cx="490" cy="150" r="3" stroke="#E5E5E5" stroke-width="2" fill="#E5E5E5" opacity="1"/><line x1="506" y1="177" x2="506" y2="123" stroke="#A2CC3A" stroke-width="2"/><line x1="663" y1="150" x2="717" y2="150" stroke="#E5E5E5" stroke-width="3" stroke-linecap="round" opacity="1"/><circle cx="690" cy="150" r="3" stroke="#E5E5E5" stroke-width="2" fill="#E5E5E5" opacity="1"/><line x1="663" y1="166" x2="717" y2="166" stroke="#F26E6E" stroke-width="2"/><path d="M514 150 L514 150 L517.65 155.29 L521.3 158.56 L524.95 158.56 L528.6 155.29 L532.25 150 L535.9 144.71 L539.55 141.44 L543.2 141.44 L546.85 144.71 L550.5 150 L554.15 155.29 L557.8 158.56 L561.45 158.56 L565.1 155.29 L568.75 150 L572.4 144.71 L576.05 141.44 L579.7 141.44 L583.35 144.71 L587 150 L590.65 155.29 L594.3 158.56 L597.95 158.56 L601.6 155.29 L605.25 150 L608.9 144.71 L612.55 141.44 L616.2 141.44 L619.85 144.71 L623.5 150 L627.15 155.29 L630.8 158.56 L634.45 158.56 L638.1 155.29 L641.75 150 L645.4 144.71 L649.05 141.44 L652.7 141.44 L656.35 144.71 L660 150" stroke="#9C9C9C" stroke-width="1.6" fill="none" opacity="0.85"/><text x="490" y="206" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#9C9C9C" text-anchor="middle" font-weight="400" letter-spacing="0" dominant-baseline="middle">Tx · vertical</text><text x="690" y="206" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#9C9C9C" text-anchor="middle" font-weight="400" letter-spacing="0" dominant-baseline="middle">Rx · horizontal</text><text x="595" y="226" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#F26E6E" text-anchor="middle" font-weight="600" letter-spacing="0" dominant-baseline="middle">fields crossed → signal lost</text><text x="410" y="262" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#9C9C9C" text-anchor="middle" font-weight="400" letter-spacing="0" dominant-baseline="middle">Theoretical total loss at 90°; in practice you keep some signal but pay heavily.</text><line x1="40" y1="296" x2="780" y2="296" stroke="#9C9C9C" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 6" opacity="0.4"/><text x="40" y="320" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="14" fill="#E5E5E5" text-anchor="start" font-weight="700" letter-spacing="0" dominant-baseline="middle">The wall-clock mistake</text><line x1="100" y1="350" x2="420" y2="350" stroke="#E5E5E5" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="4 4" opacity="0.75"/><line x1="100" y1="400" x2="420" y2="400" stroke="#E5E5E5" stroke-width="1.6" stroke-linecap="round" opacity="0.95"/><line x1="100" y1="450" x2="420" y2="450" stroke="#E5E5E5" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="4 4" opacity="0.75"/><line x1="100" y1="350" x2="100" y2="450" stroke="#E5E5E5" stroke-width="2.2" stroke-linecap="round" opacity="1"/><rect x="100" y="387" width="11" height="26" rx="3" stroke="#E5E5E5" stroke-width="2" fill="none"/><ellipse cx="166" cy="400" rx="24" ry="64" stroke="#F26E6E" stroke-width="1.8" fill="none" stroke-dasharray="5 4"/><line x1="166" y1="382" x2="166" y2="358" stroke="#F26E6E" stroke-width="1.6"/><line x1="166" y1="418" x2="166" y2="442" stroke="#F26E6E" stroke-width="1.6"/><text x="200" y="364" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#F26E6E" text-anchor="start" font-weight="400" letter-spacing="0" dominant-baseline="middle">into the floor above</text><text x="200" y="436" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#F26E6E" text-anchor="start" font-weight="400" letter-spacing="0" dominant-baseline="middle">into the floor below</text><text x="460" y="354" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#E5E5E5" text-anchor="start" font-weight="600" letter-spacing="0" dominant-baseline="middle">Mounted flat on a wall, the donut tips 90°.</text><text x="460" y="372" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#9C9C9C" text-anchor="start" font-weight="400" letter-spacing="0" dominant-baseline="middle">Its strongest energy now fires up and</text><text x="460" y="390" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#9C9C9C" text-anchor="start" font-weight="400" letter-spacing="0" dominant-baseline="middle">down — into the floors you didn't want</text><text x="460" y="408" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#9C9C9C" text-anchor="start" font-weight="400" letter-spacing="0" dominant-baseline="middle">covered — not out across the floor.</text><rect x="460" y="428" width="240" height="50" rx="8" stroke="#F26E6E" stroke-width="1.4" fill="none"/><text x="478" y="454" font-family="'DM Mono','IBM Plex Mono',ui-monospace,monospace" font-size="18" fill="#F26E6E" text-anchor="start" font-weight="700" letter-spacing="0" dominant-baseline="middle">≈ 6 dB</text><text x="570" y="448" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#9C9C9C" text-anchor="start" font-weight="400" letter-spacing="0" dominant-baseline="middle">cross-polarization</text><text x="570" y="462" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#9C9C9C" text-anchor="start" font-weight="400" letter-spacing="0" dominant-baseline="middle">penalty, too</text>

