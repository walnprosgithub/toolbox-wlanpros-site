<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560" role="img" aria-label="The same floor plan with four antenna choices: ceiling omni even circle, wall patch filling one room and stopping at the back wall, directional stretched down a corridor, and a high-gain omni in a multi-story section bleeding into floors above and below as the anti-pattern">
