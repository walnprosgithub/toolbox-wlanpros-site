<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440" role="img" aria-label="Side-view downtilt geometry: a high-mounted directional at 0 degrees fires at the far wall and misses the floor, versus downtilted so the main lobe lands on the floor where clients are; a ceiling antenna straight down is 90 degrees of downtilt">
<text x="40" y="34" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="18" fill="#E5E5E5" text-anchor="start" font-weight="700" letter-spacing="0" dominant-baseline="middle">Downtilt aims the lobe at the floor</text><text x="40" y="56" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#9C9C9C" text-anchor="start" font-weight="400" letter-spacing="0" dominant-baseline="middle">Side view — same high-mounted directional, two aim angles</text><line x1="40" y1="350" x2="370" y2="350" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" opacity="1"/><line x1="70" y1="350" x2="70" y2="116" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" opacity="1"/><line x1="370" y1="350" x2="370" y2="122" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" opacity="0.9"/><line x1="196" y1="350" x2="196" y2="339" stroke="#9C9C9C" stroke-width="1.4" stroke-linecap="round" opacity="1"/><circle cx="196" cy="334" r="3" stroke="#9C9C9C" stroke-width="1.4" fill="none" opacity="1"/><line x1="244" y1="350" x2="244" y2="339" stroke="#9C9C9C" stroke-width="1.4" stroke-linecap="round" opacity="1"/><circle cx="244" cy="334" r="3" stroke="#9C9C9C" stroke-width="1.4" fill="none" opacity="1"/><line x1="292" y1="350" x2="292" y2="339" stroke="#9C9C9C" stroke-width="1.4" stroke-linecap="round" opacity="1"/><circle cx="292" cy="334" r="3" stroke="#9C9C9C" stroke-width="1.4" fill="none" opacity="1"/><g ><path d="M74 130 L74 120" stroke="#E5E5E5" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><circle cx="74" cy="120" r="1.1" stroke="#E5E5E5" stroke-width="2" fill="#E5E5E5" opacity="1"/><ellipse cx="74" cy="130" rx="3.5" ry="1.47" stroke="#E5E5E5" stroke-width="2" fill="none"/></g><path d="M78 128 L370 92.15 L370 128 L370 163.85 Z" stroke="#F26E6E" stroke-width="1.6" fill="none" stroke-dasharray="5 4"/><line x1="78" y1="128" x2="362" y2="128" stroke="#F26E6E" stroke-width="1.4" stroke-dasharr