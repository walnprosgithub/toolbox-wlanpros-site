<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- QR Generator: the unmistakable QR silhouette — three corner FINDER squares plus a
         few data modules. Three nested-corner squares is a read no other icon in the set
         carries. Finder squares drawn as small rounded rects (outline survives 20px); data
         modules as solid blocks so the "code" texture reads at small size. -->
    <!-- top-left finder -->
    <rect x="3" y="3" width="6" height="6" rx="1"/>
    <!-- top-right finder -->
    <rect x="15" y="3" width="6" height="6" rx="1"/>
    <!-- bottom-left finder -->
    <rect x="3" y="15" width="6" height="6" rx="1"/>
  </g>
  <!-- data modules (solid) -->
  <g fill="currentColor" stroke="none">
    <rect x="14.5" y="14.5" width="3" height="3" rx="0.5"/>
    <rect x="18.5" y="18.5" width="3" height="3" rx="0.5"/>
    <rect x="14.5" y="18.5" width="2" height="2" rx="0.4"/>
    <rect x="18.5" y="14.5" width="2" height="2" rx="0.4"/>
  </g>
</svg>
