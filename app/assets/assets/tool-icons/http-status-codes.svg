<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- HTTP Status Codes: a response-status badge/tag carrying a status
         indicator (the check = a 2xx OK verdict), evoking "200 / 404".
         A rounded badge silhouette is grossly distinct from the list/table/
         document silhouettes of port-reference, db-reference, reason-codes
         and http-headers. The notched left edge reads as a hung status tag. -->
    <path d="M5 4 H20 V20 H5 L9 12 Z"/>
    <path d="M11 12.4 L13.2 14.6 L17 10"/>
  </g>
</svg>
