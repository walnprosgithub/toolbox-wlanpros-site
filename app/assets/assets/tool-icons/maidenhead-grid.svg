<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Maidenhead Grid (grid locator). A subdivided map-grid square (rounded
         outer field + a 2x2 cross subdivision) with a dominant location PIN
         marking the spot. The grid says "map grid / locator square", the pin
         says "your location". GL-003 section 8.6.1: 24x24 master, single
         currentColor, fill=none, 2px stroke, round cap/join, legible at 20px.
         Differentiated by GROSS silhouette from the other grid icons
         (channel-map, cidr-table, channel-map are bare grids): the dominant
         map-pin teardrop is the differentiator, not a small accent. -->
    <!-- grid field: rounded outer square -->
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <!-- 2x2 subdivision (subdivided locator square) -->
    <path d="M12 3 V21"/>
    <path d="M3 12 H21"/>
    <!-- location pin: teardrop outline, point at bottom, centered on the grid -->
    <path d="M12 18 C9.1 14 8.6 12.8 8.6 10.5 A3.4 3.4 0 1 1 15.4 10.5 C15.4 12.8 14.9 14 12 18 Z" fill="none"/>
    <!-- pin center dot -->
    <circle cx="12" cy="10.5" r="1.3" fill="currentColor" stroke="none"/>
  </g>
</svg>
