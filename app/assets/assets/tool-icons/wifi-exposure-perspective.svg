<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- How Strong Is Wi-Fi, Really? — Wi-Fi RF exposure in perspective against
         everyday sunlight: a SUN (the dominant everyday source) upper-left beside
         a small WI-FI fan lower-right. GL-005 honest: big everyday source next to
         the small one. Vera FAIL history: six 1.5px rays detached into a speckle
         at 20px and 11 path elements overran the box. Fix: element count cut to 7
         (sun core + 4 cardinal rays + 2 Wi-Fi arcs); the small Wi-Fi base dot was
         dropped (the two arcs already read as Wi-Fi) to recover space; the sun
         core is enlarged and the rays are 4 cardinal, full stroke-width-2, set
         close to the core so they read as connected rays, not floating dots.
         Verified at 20px: sun and Wi-Fi fan each survive as distinct legible blobs. -->
    <!-- sun: enlarged filled core, upper-left -->
    <circle cx="7" cy="7" r="3.5" fill="currentColor" stroke="none"/>
    <!-- four cardinal rays, thick and close to the core -->
    <path d="M7 1 V2.6"/>
    <path d="M7 11.4 V13"/>
    <path d="M1 7 H2.6"/>
    <path d="M11.4 7 H13"/>
    <!-- Wi-Fi signal fan, lower-right (the small source put in perspective) -->
    <path d="M12.5 14.5 A7 7 0 0 1 22.5 14.5"/>
    <path d="M15 17.2 A3.3 3.3 0 0 1 20 17.2"/>
  </g>
</svg>
