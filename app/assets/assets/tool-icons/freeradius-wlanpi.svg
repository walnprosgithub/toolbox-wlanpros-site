<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- FreeRADIUS on WLAN Pi: a single-board computer standing up a RADIUS
         authentication server — the board with a GPIO header tick row PLUS an
         auth shield with a check, the 802.1X "who gets on" verdict. Board+shield
         is honest to "lab RADIUS auth server" and reads apart from the
         other Guides how-to icon. -->
    <!-- WLAN Pi board -->
    <rect x="3" y="12" width="18" height="8" rx="1.5"/>
    <!-- GPIO header pin row -->
    <path d="M6 12 V10"/>
    <path d="M9 12 V10"/>
    <path d="M12 12 V10"/>
    <!-- auth shield with a check, rising off the board -->
    <path d="M16.5 2.5 L21 4 V7 C21 9.8 19 11.5 16.5 12.3 C14 11.5 12 9.8 12 7 V4 Z"/>
    <path d="M14.6 7 L16 8.4 L18.6 5.6"/>
  </g>
</svg>
