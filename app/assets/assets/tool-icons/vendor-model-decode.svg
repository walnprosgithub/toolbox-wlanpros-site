<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vendor / Model Decode (read the rating plate: parse vendor + model number).
         Concept = a bolt-on equipment NAMEPLATE: a wide landscape metal PLATE with
         a MOUNTING SCREW at each end (the "riveted to the device" tell) and two
         printed text rows inside - a shorter VENDOR line over a longer MODEL-number
         line. The rectangular plate + two flanking screws is the load-bearing gross
         silhouette that says "hardware rating plate," deliberately unlike:
           - mac-oui-lookup   (an ANGLED hang-tag with ONE pointed end + eyelet)
           - plan-set-literacy (a PORTRAIT drawing sheet with a dog-ear + title block)
           - structured-cabling (a patch panel: rack ears + a row of PORT rectangles)
           - interface-info    (a NIC card + an EXTERNAL info circle + bottom pins)
         Text rows are HORIZONTAL lines (printed model string), never vertical bars,
         so it never reads as a barcode.
         GL-003 8.6.1: 24x24 master, single currentColor, fill=none, 2px stroke,
         round cap/join, silhouette-first, legible at 20px. QA in headless Chrome
         (never ImageMagick) at 20/24/28px, lime #A1CC3A on app surface #222222. -->
    <!-- nameplate body (landscape plate) -->
    <rect x="2.5" y="6" width="19" height="12" rx="2"/>
    <!-- mounting screws at each end (bolted to the equipment) -->
    <circle cx="5.5" cy="12" r="1.2" fill="currentColor" stroke="none"/>
    <circle cx="18.5" cy="12" r="1.2" fill="currentColor" stroke="none"/>
    <!-- vendor line (shorter) -->
    <path d="M9 10.2 H14"/>
    <!-- model-number line (longer, the string being decoded) -->
    <path d="M9 13.8 H16"/>
  </g>
</svg>
