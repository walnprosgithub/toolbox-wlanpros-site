<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mobile-traceroute: a HANDSET (left) emitting a route path out to a far hop (upper-right). -->
    <!-- Gross silhouette = phone body + swept path + endpoint pin. Categorically unlike the bare -->
    <!-- node-chain (traceroute), the diagonal staircase (mcs-index), and the radial star (network-discovery). -->
    <!-- Phone outline: portrait rounded-rect, lower-left of the canvas. -->
    <rect x="3" y="9" width="8" height="12" rx="1.5"/>
    <!-- Speaker/home line so it reads unambiguously as a handset, not a card. -->
    <line x1="6" y1="18.5" x2="8" y2="18.5"/>
    <!-- Route swept up-and-out from the phone's top edge to the distant hop. -->
    <path d="M11 11 Q17 11 19 5"/>
    <!-- Far-hop endpoint pin (the traced destination). -->
    <circle cx="19" cy="4" r="1.8"/>
  </g>
</svg>
