<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wi-Fi HaLow (802.11ah): long-range sub-GHz. A source node on the LEFT emits
         long, low-frequency wave crests that sweep horizontally across DISTANCE to a
         small receiver node on the RIGHT. Horizontal long-wavelength sweep = "long
         reach, low frequency" — distinct silhouette from the upward Wi-Fi fans
         (wifi-info, wifi-exposure) and the vertical bars (signal-bars/channels).
         Element budget kept low for the 20px floor: 2 nodes + 3 nested wave crests. -->
    <!-- transmitting source node, left -->
    <circle cx="4" cy="12" r="1.6" fill="currentColor" stroke="none"/>
    <!-- three long low-frequency wave crests, opening rightward, growing wavelength -->
    <path d="M7 8.5 Q9.4 12 7 15.5"/>
    <path d="M10.8 6.5 Q14.6 12 10.8 17.5"/>
    <path d="M14.8 5 Q19.6 12 14.8 19"/>
    <!-- distant receiver node, far right (clear of the outermost crest) -->
    <circle cx="20.6" cy="12" r="1.3" fill="currentColor" stroke="none"/>
  </g>
</svg>
