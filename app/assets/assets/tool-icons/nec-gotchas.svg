<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- NEC Gotchas (National Electrical Code articles a WLAN installer must
         recognize: conduit fill, plenum, raceways, bonding). Concept = an
         electrical CONDUIT ELBOW (rigid raceway bending 90 deg) with two COUPLING
         bands, plus a LIGHTNING BOLT to mark it "electrical." Deliberately built
         on an L-PIPE + ZIGZAG silhouette, NOT a warning triangle (per brief:
         distinct from any Tier-1 warning-triangle glyph) and NOT a box (distinct
         from enclosure-ratings). The bolt is the electrical caution mark; the
         couplings say "raceway sections", i.e. code-governed conduit.
         GL-003 8.6.1: 24x24, single currentColor, fill=none, 2px stroke, round
         cap/join, legible at 20px. QA headless Chrome at 20/24/28px, lime
         #A1CC3A on #222222. -->
    <!-- conduit run: down, then 90-deg elbow to the right -->
    <path d="M7 4 V13 Q7 17 11 17 H20"/>
    <!-- coupling bands (two joined raceway sections) -->
    <path d="M5.2 8 H8.8"/>
    <path d="M15 15.2 V18.8"/>
    <!-- lightning bolt (electrical caution mark) -->
    <path d="M18.5 3 L15.5 7.5 H18 L14.5 12.5"/>
  </g>
</svg>
