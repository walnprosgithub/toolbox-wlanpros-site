<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top-Level Domains: a globe (TLDs = the internet's name space) with a domain "dot"
         marker. Silhouette = closed globe circle + a curved meridian + the equator, plus
         one solid dot at lower-right standing in for the leading "." of ".com". Distinct
         from dns-lookup (globe with a magnifier HANDLE), lat-long (straight grid + crosshair),
         bgp-asn (three separate nodes). -->
    <!-- globe outline -->
    <circle cx="11" cy="11" r="8"/>
    <!-- equator -->
    <line x1="3" y1="11" x2="19" y2="11"/>
    <!-- curved meridian (longitude) -->
    <path d="M11 3 C7 6 7 16 11 19"/>
    <path d="M11 3 C15 6 15 16 11 19"/>
    <!-- the domain "dot" -->
    <circle cx="20" cy="19" r="1.1" fill="currentColor" stroke="none"/>
  </g>
</svg>
