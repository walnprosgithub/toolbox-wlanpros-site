<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- macOS menu-bar Wi-Fi: a horizontal menu-bar strip with a Wi-Fi glyph sitting in
         its right-hand status area. Silhouette = a wide bar rule along the top + Wi-Fi
         fan beneath. Reads as "status-bar Wi-Fi" at 20px via the bar + arcs pairing. -->
    <!-- menu bar strip -->
    <rect x="3" y="4" width="18" height="4" rx="1"/>
    <!-- a couple of menu items on the left of the bar -->
    <line x1="5.5" y1="6" x2="7.5" y2="6"/>
    <line x1="9.5" y1="6" x2="11.5" y2="6"/>
    <!-- Wi-Fi glyph hanging below the bar's right/status area -->
    <path d="M8 13.5 a6.5 6.5 0 0 1 8 0"/>
    <path d="M9.8 16 a3.6 3.6 0 0 1 4.4 0"/>
    <circle cx="12" cy="18.5" r="1.1" fill="currentColor" stroke="none"/>
  </g>
</svg>
