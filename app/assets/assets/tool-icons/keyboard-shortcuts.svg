<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Keyboard shortcuts: a keycap bearing the command (⌘) glyph — a center square with
         four corner loops. Silhouette = rounded keycap + looped-square knot. Universal
         "shortcut" read; not confusable with grid/table icons. -->
    <!-- keycap -->
    <rect x="2.5" y="2.5" width="19" height="19" rx="3"/>
    <!-- center square of the command knot -->
    <rect x="10" y="10" width="4" height="4"/>
    <!-- four corner loops -->
    <path d="M10 10 H7.6 a1.6 1.6 0 1 1 1.6 -1.6 V10"/>
    <path d="M14 10 H16.4 a1.6 1.6 0 1 0 -1.6 -1.6 V10"/>
    <path d="M10 14 H7.6 a1.6 1.6 0 1 0 1.6 1.6 V14"/>
    <path d="M14 14 H16.4 a1.6 1.6 0 1 1 -1.6 1.6 V14"/>
  </g>
</svg>
