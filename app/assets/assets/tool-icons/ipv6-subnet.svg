<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- address block (sibling of ipv4-subnet) -->
    <rect x="3" y="6" width="18" height="12" rx="2"/>
    <!-- prefix cut: doubled slash to read as the longer v6 /64 prefix -->
    <line x1="13" y1="4.5" x2="8" y2="19.5"/>
    <line x1="16" y1="4.5" x2="11" y2="19.5"/>
    <!-- group-divider ticks (more divisions = longer prefix cue) -->
    <line x1="5" y1="11" x2="7" y2="11"/>
    <line x1="17" y1="13" x2="19" y2="13"/>
  </g>
</svg>
