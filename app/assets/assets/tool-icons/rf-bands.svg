<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- frequency axis baseline -->
    <line x1="3" y1="20" x2="21" y2="20"/>
    <!-- ascending spectrum bars (low -> high frequency), graduated heights -->
    <line x1="5" y1="20" x2="5" y2="16"/>
    <line x1="9" y1="20" x2="9" y2="12.5"/>
    <line x1="13" y1="20" x2="13" y2="8.5"/>
    <line x1="17" y1="20" x2="17" y2="5"/>
    <line x1="20.5" y1="20" x2="20.5" y2="9"/>
  </g>
</svg>
