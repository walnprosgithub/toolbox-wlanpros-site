<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wi-Fi Glossary: a Wi-Fi broadcast mark ABOVE an open book (look up a
         Wi-Fi term). Two strong stacked silhouettes so BOTH the Wi-Fi signal and
         the open book survive the 20px legibility floor (GL-003 §8.6.1) — the
         earlier on-page arc was a sub-pixel casualty and read as a generic book. -->
    <!-- open book (lower): left page, spine valley, right page -->
    <path d="M12 12 C 10 10.5 6.5 10.5 4 11 L 4 19.5 C 6.5 19 10 19 12 20.5 C 14 19 17.5 19 20 19.5 L 20 11 C 17.5 10.5 14 10.5 12 12 Z"/>
    <line x1="12" y1="12" x2="12" y2="20.5"/>
    <!-- Wi-Fi broadcast (upper), centered over the book: two arcs + node dot -->
    <path d="M6.5 6 C 9.1 3.5 14.9 3.5 17.5 6"/>
    <path d="M8.8 8.1 C 10.4 6.7 13.6 6.7 15.2 8.1"/>
    <line x1="12" y1="9.9" x2="12" y2="9.9"/>
  </g>
</svg>
