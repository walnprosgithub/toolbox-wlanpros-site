<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Diffie-Hellman shared secret: two overlapping party rings forming a venn, with a
         solid key/secret marker filling the shared lens. The two distinct rings + a filled
         center lens read as "two parties derive one common secret" at 20px. -->
    <!-- party A ring -->
    <circle cx="8.5" cy="12" r="6"/>
    <!-- party B ring -->
    <circle cx="15.5" cy="12" r="6"/>
    <!-- shared secret marker in the overlap lens -->
    <circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/>
  </g>
</svg>
