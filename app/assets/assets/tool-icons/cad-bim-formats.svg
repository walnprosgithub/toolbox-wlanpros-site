<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- CAD & BIM Formats. Concept = a 3D WIREFRAME CUBE: a front square and a
         back square offset up-and-right, joined by four edge lines. A two-square
         wireframe reads unmistakably as "3D model / CAD geometry" (the thing a
         DWG / IFC / RVT file carries) more strongly than a solid isometric box,
         which can read as a physical package. Deliberately distinct from:
           - plan-set-literacy    (a flat PORTRAIT drawing sheet, dog-eared)
           - architectural-scale  (a graduated ruler stacked over a floor plan)
           - enclosure-ratings    (a LANDSCAPE box + water droplet)
           - antenna-connectors   (a single HEXAGON + concentric circle & pin)
         Only this icon is a two-square wireframe cube - a rectangular gross
         silhouette, not a hexagon and not a single flat rectangle.
         GL-003 §8.6.1: 24x24 master, single currentColor, fill=none, 2px stroke,
         round cap/join, silhouette-first, legible at 20px. QA rendered in headless
         Chrome (never ImageMagick) at 20/24/28px, lime #A1CC3A on app surface
         #222222. -->
    <!-- front face -->
    <path d="M4 9 H15 V20 H4 Z"/>
    <!-- back face (offset up and to the right) -->
    <path d="M9 4 H20 V15 H9 Z"/>
    <!-- the four connecting edges -->
    <path d="M4 9 L9 4"/>
    <path d="M15 9 L20 4"/>
    <path d="M15 20 L20 15"/>
    <path d="M4 20 L9 15"/>
  </g>
</svg>
