<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- roaming log: recorded hand-off sequence stepping between APs over a timeline -->
    <!-- timeline / log baseline -->
    <path d="M3 21 H21"/>
    <!-- stepped hand-off trail: client jumps between AP levels at logged events -->
    <path d="M4 14 H9 V8 H15 V14 H20"/>
    <!-- logged hand-off event nodes -->
    <circle cx="9" cy="8" r="1.8" fill="currentColor" stroke="none"/>
    <circle cx="15" cy="14" r="1.8" fill="currentColor" stroke="none"/>
  </g>
</svg>
