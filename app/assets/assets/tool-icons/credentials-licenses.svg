<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Credentials & Licenses (the badge / license that authorizes you to do the
         work). Concept = an ID BADGE hanging from a LANYARD. The inverted-V
         lanyard cord meeting at a clip ring above a portrait card is the
         load-bearing gross silhouette - the hanging cord is the tell and is
         UNIQUE in the set. Deliberately distinct from site-access (a BOOM BARRIER
         gate: post + descending arm, no card) and device-info (a bare phone slab
         with an info mark, no lanyard, no portrait). A lanyard + portrait card is
         unmistakably "credential", not "device" or "gate".
         GL-003 8.6.1: 24x24 master, single currentColor, fill=none, 2px stroke,
         round cap/join, silhouette-first, legible at 20px. QA in headless Chrome
         (never ImageMagick) at 20/24/28px, lime #A1CC3A on app surface #222222. -->
    <!-- lanyard cord (inverted V up to the clip) -->
    <path d="M8 8.5 L12 3.6 L16 8.5"/>
    <!-- lanyard clip ring -->
    <circle cx="12" cy="3.4" r="0.9" fill="currentColor" stroke="none"/>
    <!-- ID card body (portrait) -->
    <rect x="7" y="8.5" width="10" height="11.8" rx="2"/>
    <!-- portrait head -->
    <circle cx="12" cy="13" r="1.7"/>
    <!-- portrait shoulders -->
    <path d="M9.4 17.4 a2.6 2.6 0 0 1 5.2 0"/>
  </g>
</svg>
