<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- NATO/maritime phonetic alphabet: a signal flag on a pole. Silhouette = vertical
         pole with a base + a pennant/flag furling off the top. Matches the maritime-flag
         theme; reads as "signaling" at 20px via the pole + triangular flag mass. -->
    <!-- pole -->
    <line x1="6" y1="3" x2="6" y2="21"/>
    <!-- ground base -->
    <line x1="3" y1="21" x2="9" y2="21"/>
    <!-- swallowtail signal flag -->
    <path d="M6 4 H19 L15.5 7.5 L19 11 H6 Z"/>
  </g>
</svg>
