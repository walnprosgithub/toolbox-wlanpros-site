<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Enclosure Ratings (IP / NEMA ingress protection). Concept = a sealed
         weatherproof ENCLOSURE keeping WATER out: a landscape enclosure body
         with a gasketed LID SEAM near the top, and a large WATER DROPLET as the
         ingress-test motif. The droplet is the load-bearing silhouette element
         and survives 20px. Deliberately LANDSCAPE (18x14) so its gross shape
         reads apart from plan-set-literacy (a PORTRAIT sheet) and from cli-commands
         (a terminal chevron, no droplet); the droplet appears in no other icon.
         GL-003 8.6.1: 24x24 master, single currentColor, fill=none, 2px stroke,
         round cap/join, silhouette-first, legible at 20px. QA in headless Chrome
         (never ImageMagick) at 20/24/28px, lime #A1CC3A on app surface #222222. -->
    <!-- enclosure body (landscape) -->
    <rect x="3" y="6" width="18" height="14" rx="2"/>
    <!-- gasketed lid seam -->
    <path d="M4 10 H20"/>
    <!-- water droplet (ingress-protection test) -->
    <path d="M12 12 C 9.6 15, 8.9 16.4, 8.9 17.7 A 3.1 3.1 0 0 0 15.1 17.7 C 15.1 16.4 14.4 15 12 12 Z"/>
  </g>
</svg>
