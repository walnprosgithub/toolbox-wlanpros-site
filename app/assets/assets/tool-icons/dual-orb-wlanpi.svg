<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Dual Orbs on WLAN Pi: TWO matching sensor orbs are the symmetric
         subject (the "dual orb" idea — two Orb probes on one device).
         Redrawn from the board + GPIO-ticks + third raised node version that
         read as "router + antenna + two LEDs": the competing third node and
         the GPIO pin row (which read as an antenna) are gone. Now a single
         board carries two identical orbs, each a ringed sensor with a filled
         core, sitting level and symmetric. Reads apart from freeradius-wlanpi
         (board + a single auth shield with a check). -->
    <!-- WLAN Pi board -->
    <rect x="2.5" y="14" width="19" height="6.5" rx="1.5"/>
    <!-- two matching sensor orbs, symmetric on the board (ring + filled core) -->
    <circle cx="8" cy="8" r="3.6"/>
    <circle cx="8" cy="8" r="1.1" fill="currentColor" stroke="none"/>
    <circle cx="16" cy="8" r="3.6"/>
    <circle cx="16" cy="8" r="1.1" fill="currentColor" stroke="none"/>
    <!-- short stems seating each orb on the board -->
    <path d="M8 11.6 V14"/>
    <path d="M16 11.6 V14"/>
  </g>
</svg>
